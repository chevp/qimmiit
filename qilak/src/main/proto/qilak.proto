syntax = "proto3";

package io.qimmiit.qilak;

option java_multiple_files = true;
option java_package = "io.qimmiit.qilak.grpc";

/**
 * Qilak Service - Server-side AI Agent
 *
 * gRPC service for communication between Nanook (C++) and Qilak (Java)
 */
service QilakService {
  // Request AI-based decision
  rpc MakeDecision(DecisionRequest) returns (DecisionResponse);

  // Stream of decisions for long-running tasks
  rpc MakeDecisionStream(DecisionRequest) returns (stream DecisionResponse);

  // Health check
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);

  // Get agent status
  rpc GetStatus(StatusRequest) returns (StatusResponse);
}

/**
 * Decision Request
 */
message DecisionRequest {
  enum DecisionType {
    OPTIMIZE_ASSET = 0;
    ANALYZE_PERFORMANCE = 1;
    RECOMMEND_LOD = 2;
    GENERATE_SHADER_VARIANT = 3;
    COMPUTE_LIGHTING = 4;
  }

  DecisionType type = 1;
  string request_id = 2;
  int64 timestamp = 3;
  map<string, string> parameters = 4;
}

/**
 * Decision Response
 */
message DecisionResponse {
  string status = 1;
  string recommendation = 2;
  double confidence = 3;
  map<string, string> metadata = 4;
  int64 timestamp = 5;
  string request_id = 6;
}

/**
 * Health Check
 */
message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  enum Status {
    SERVING = 0;
    NOT_SERVING = 1;
    UNKNOWN = 2;
  }

  Status status = 1;
  string message = 2;
}

/**
 * Status Request
 */
message StatusRequest {
  bool include_modules = 1;
}

/**
 * Status Response
 */
message StatusResponse {
  string agent_name = 1;
  string version = 2;
  bool running = 3;
  int64 uptime_seconds = 4;
  repeated ModuleStatus modules = 5;
}

/**
 * Module Status
 */
message ModuleStatus {
  string name = 1;
  string type = 2;
  bool initialized = 3;
}
