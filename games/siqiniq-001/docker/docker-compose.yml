version: '3.8'

services:
  # MariaDB Database
  mariadb:
    image: mariadb:11.4
    container_name: siqiniq-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: siqiniq
      MARIADB_USER: siqiniq
      MARIADB_PASSWORD: siqiniq
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - siqiniq-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: siqiniq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - siqiniq-network
    restart: unless-stopped

  # Siqiniq Game Server (JVM)
  siqiniq-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jvm
    image: siqiniq-server:latest
    container_name: siqiniq-server
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"  # HTTP/REST/WebSocket
      - "9000:9000"  # gRPC (RenderStreamService + ShaderGraphStreamingService)
    environment:
      QUARKUS_PROFILE: prod
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:mariadb://mariadb:3306/siqiniq
      QUARKUS_DATASOURCE_USERNAME: siqiniq
      QUARKUS_DATASOURCE_PASSWORD: siqiniq
      QUARKUS_REDIS_HOSTS: redis://redis:6379
      JAVA_OPTS: -Xms512m -Xmx1024m -XX:+UseG1GC
    volumes:
      - siqiniq-data:/deployments/data
    networks:
      - siqiniq-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # phpMyAdmin (Database Admin UI)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: siqiniq-phpmyadmin
    depends_on:
      - mariadb
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mariadb
      PMA_USER: siqiniq
      PMA_PASSWORD: siqiniq
    networks:
      - siqiniq-network
    profiles:
      - admin

  # Redis Commander
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: siqiniq-redis-commander
    depends_on:
      - redis
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    networks:
      - siqiniq-network
    profiles:
      - admin

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: siqiniq-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - siqiniq-network
    profiles:
      - monitoring

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: siqiniq-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - siqiniq-network
    profiles:
      - monitoring

networks:
  siqiniq-network:
    driver: bridge

volumes:
  mariadb-data:
  redis-data:
  siqiniq-data:
  prometheus-data:
  grafana-data:
