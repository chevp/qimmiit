# Siqiniq-001 Application Configuration

# Application
quarkus.application.name=siqiniq-001
quarkus.application.version=1.0.0

# HTTP
quarkus.http.port=8080
quarkus.http.host=0.0.0.0
quarkus.http.cors=true

# WebSocket
quarkus.websocket.max-frame-size=1048576

# Database - MariaDB
quarkus.datasource.db-kind=mariadb
quarkus.datasource.username=siqiniq
quarkus.datasource.password=siqiniq
quarkus.datasource.jdbc.url=jdbc:mariadb://localhost:3306/siqiniq
quarkus.datasource.jdbc.max-size=20

# Redis
quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.timeout=10s

# Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# Logging
quarkus.log.level=INFO
quarkus.log.category."io.qimmiit.siqiniq".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.json=false

# Health checks
quarkus.smallrye-health.ui.enable=true

# Metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Dev Services (disabled in prod)
quarkus.devservices.enabled=true
quarkus.datasource.devservices.enabled=true

# Game Configuration
siqiniq.game.max-players=100
siqiniq.game.tick-rate=60
siqiniq.game.autosave-interval=60000
siqiniq.game.default-world=sunny_plains_001

# Content
siqiniq.content.root=content
siqiniq.content.hot-reload=true
siqiniq.content.validate-on-load=true

# gRPC Configuration
# RenderStreamService (Core) - Port 9000
quarkus.grpc.server.port=9000
quarkus.grpc.server.host=0.0.0.0
quarkus.grpc.server.max-inbound-message-size=4194304
quarkus.grpc.server.enable-reflection-service=true

# ShaderGraphStreamingService (Advanced) - Port 9001
# Note: Quarkus gRPC doesn't support multiple ports natively
# We'll need to use a separate gRPC server instance or route via single port
# For now, both services will run on port 9000
# Production deployments should use a reverse proxy to route to separate services

# Shader Graph Configuration
siqiniq.shader.lod.auto-adapt=true
siqiniq.shader.lod.target-frame-time-ms=16.67
siqiniq.shader.lod.initial-level=0
siqiniq.shader.lod.change-cooldown-ms=2000
