---
apiVersion: v1
kind: ConfigMap
metadata:
  name: siqiniq-config
  namespace: siqiniq-001
data:
  application.properties: |
    quarkus.datasource.db-kind=mariadb
    quarkus.datasource.jdbc.url=jdbc:mariadb://mariadb:3306/siqiniq
    quarkus.redis.hosts=redis://redis:6379
    siqiniq.game.max-players=100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: siqiniq-server
  namespace: siqiniq-001
spec:
  replicas: 2
  selector:
    matchLabels:
      app: siqiniq-server
  template:
    metadata:
      labels:
        app: siqiniq-server
    spec:
      containers:
      - name: siqiniq-server
        image: siqiniq-server:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9000
          name: grpc
        env:
        - name: QUARKUS_PROFILE
          value: "prod"
        - name: QUARKUS_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: username
        - name: QUARKUS_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: password
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx1024m -XX:+UseG1GC"
        resources:
          requests:
            memory: "768Mi"
            cpu: "500m"
          limits:
            memory: "1536Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /q/health/live
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /q/health/ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /q/health/started
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata:
  name: siqiniq-server
  namespace: siqiniq-001
spec:
  selector:
    app: siqiniq-server
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
    name: http
  - protocol: TCP
    port: 9000
    targetPort: 9000
    name: grpc
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: siqiniq-server-lb
  namespace: siqiniq-001
spec:
  selector:
    app: siqiniq-server
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    name: http
  - protocol: TCP
    port: 9000
    targetPort: 9000
    name: grpc
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: siqiniq-server-hpa
  namespace: siqiniq-001
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: siqiniq-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
