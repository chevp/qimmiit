# Siqiniq-001 Game Server Configuration
quarkus:
  application:
    name: siqiniq-001-studio
    version: 1.0.0-SNAPSHOT

  # HTTP Configuration
  http:
    port: 8080
    host: 0.0.0.0
    cors:
      ~: true
      origins: "*"
      methods: GET,POST,PUT,DELETE,OPTIONS
      headers: "*"

  # Static Resources - Game Data
  http:
    static-resources:
      include-hidden: false
      cache-control: "max-age=3600"
      enable-compression: true

  # OpenAPI / Swagger UI
  smallrye-openapi:
    path: /openapi
    info-title: Siqiniq-001 Game Studio API
    info-version: 1.0.0
    info-description: Cloud-native game server and studio for Siqiniq-001
    info-contact-name: Qimmiit Team
  swagger-ui:
    always-include: true
    path: /swagger-ui
    title: Siqiniq-001 API

  # Logging
  log:
    level: INFO
    category:
      "io.qimmiit": DEBUG
      "io.quarkus": INFO
    console:
      enable: true
      format: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n"
      color: true

  # gRPC Configuration
  grpc:
    server:
      port: 9090
      host: 0.0.0.0
      enable-reflection-service: true

  # Database Configuration (MariaDB)
  datasource:
    db-kind: mariadb
    username: siqiniq
    password: ${DB_PASSWORD:siqiniq_dev}
    jdbc:
      url: jdbc:mariadb://${DB_HOST:localhost}:3306/${DB_NAME:siqiniq_001}
      max-size: 20
      min-size: 5

  hibernate-orm:
    database:
      generation: none
    log:
      sql: false
    dialect: org.hibernate.dialect.MariaDBDialect

  # Flyway Migration
  flyway:
    migrate-at-start: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1.0.0

  # Redis Configuration
  redis:
    hosts: redis://${REDIS_HOST:localhost}:6379
    timeout: 10s
    max-pool-size: 20

  # Health & Metrics
  smallrye-health:
    ui:
      enable: true
      root-path: /health-ui

  # Development Mode Settings
  dev:
    ui:
      enabled: true
    services:
      enabled: true

# Custom Application Configuration
siqiniq:
  game:
    name: "Siqiniq-001"
    version: "1.0.0-SNAPSHOT"
    max-players: 100
    tick-rate: 20

  # Game Data Paths
  data:
    base-path: "/META-INF/resources/game-data"
    templates-path: "${siqiniq.data.base-path}/templates"
    worlds-path: "${siqiniq.data.base-path}/worlds"
    items-path: "${siqiniq.data.base-path}/items"
    frames-path: "${siqiniq.data.base-path}/frames"

  # Network Settings
  network:
    websocket-port: 8081
    max-message-size: 1048576  # 1MB
    heartbeat-interval: 30s

  # Cryo Protocol Settings
  cryo:
    frame-buffer-size: 1000
    delta-compression: true
    state-sync-interval: 100ms

# Profile-specific configurations
"%dev":
  quarkus:
    log:
      level: DEBUG
      category:
        "io.qimmiit": TRACE
    http:
      port: 8080

"%test":
  quarkus:
    datasource:
      db-kind: h2
      jdbc:
        url: jdbc:h2:mem:test
    hibernate-orm:
      database:
        generation: drop-and-create

"%prod":
  quarkus:
    log:
      level: INFO
    http:
      port: ${PORT:8080}
    datasource:
      username: ${DB_USER}
      password: ${DB_PASSWORD}
