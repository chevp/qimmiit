version: '3.8'

services:
  avannaaq-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    image: avannaaq-server:latest
    container_name: avannaaq-server
    ports:
      - "8080:8080"
    volumes:
      - avannaaq-data:/opt/avannaaq/data
      - avannaaq-logs:/opt/avannaaq/logs
    environment:
      - SERVER_PORT=8080
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Monitoring
  # prometheus:
