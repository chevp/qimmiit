# Nanook Engine Configuration
# Minimal, module-agnostic configuration

[Engine]
name = Nanook
version = 1.0.0

[Core]
thread_count = 8
memory_pool_mb = 512

[Logging]
log_level = INFO
log_to_console = true

# Module-specific settings are read by each module independently
# Modules can access ConfigManager via CentralAgent to read their own keys
