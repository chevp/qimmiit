// ============================================================================
// USER REQUEST DEFINITIONS (from userStream17.proto)
// ============================================================================

message UserRequest {
    oneof action {
        FormAction formAction = 1;
        JoinRequest join = 2;
        WatchRequest watch = 3;
        ReconnectRequest reconnect = 4;
        MoveAction moveAction = 5;
        ClickAction clickAction = 6;
        CamMoveAction camMoveAction = 7;
        CharacterAction characterAction = 8;
        LoadInitialSceneRequest loadInitialSceneRequest = 9;
        LoadLayoutRequest loadLayoutRequest = 10;
        LoadGameEnvironmentRequest loadGameEnvironmentRequest = 11; // Layout, Environment and Nodes
        LoadUserStubRequest loadUserStubRequest = 12;
    }
}

message FormAction { // z.B. Button
    string name = 1;
    map<string, PrimitiveValue> params = 2;
}

message LoadGameEnvironmentRequest {
    string gameEnvironmentId = 1;
    string userUuid = 2;
    map<string, PrimitiveValue> params = 3;
}

message LoadUserStubRequest {
    string userStubId = 1;
    string userUuid = 2;
    map<string, PrimitiveValue> params = 3;
}

message MoveAction {
    string name = 1;
    PairRepeatedFloatList cam = 2;
    map<string, PrimitiveValue> params = 3;
}

message ClickAction { // z.B. Click somewhere without a button
    repeated float pointOnMap = 1;
}

message JoinRequest {
    string route = 1;
    string gameModeId = 2;
    string userUuid = 3;
    string gameAppUuid = 4;
    string gameAppVersion = 5;
}

message WatchRequest {
    string userUuid = 1;
    string gameAppUuid = 2;
    string watchUuid = 3; // uuid for watching
}

message ReconnectRequest {
    string userUuid = 1;
}

message CamMoveAction {
    string name = 1;
    PairRepeatedFloatList cam = 2;
    map<string, PrimitiveValue> params = 3;
}

message CharacterAction {
    string name = 1;
    PairRepeatedFloatList cam = 2;
    repeated float pos = 3;
    repeated float rot = 4;
    map<string, PrimitiveValue> params = 5;
}

message LoadInitialSceneRequest {
    uint32 id = 1;
    string route = 2;
    string userUuid = 3;
    uint32 appId = 4;
    string version = 5;
    string initialPocId = 6;
    string initialStubId = 7;
}

message LoadLayoutRequest {
    string name = 1;
    map<string, PrimitiveValue> params = 2;
}

// ============================================================================
// RPC SERVICE DEFINITIONS (from ipcoe17.proto)
// ============================================================================

message ValueStreamRequest {
    oneof action {
        JoinRequest join = 1;
        WatchRequest watch = 2;
        ReconnectRequest reconnect = 3;
    }
}

service IPCOE17Service
{
    rpc ping(RpcVoid) returns (RpcVoid);
    rpc pipe(stream UserRequest) returns (stream ValueStream);
    rpc sink(stream UserRequest) returns (Value);
    rpc getValueStream(ValueStreamRequest) returns (stream ValueStream);
    rpc getValue(IdStruct) returns (Value);
    rpc getStruct(IdStruct) returns (Struct);
    rpc send(UserRequest) returns (Value);

    // DEPRECATED: rpc check(JobElmnt) returns (RpcVoid); // JobElmnt from scoe17.proto removed
    // DEPRECATED: rpc receive(RpcVoid) returns (stream JobElmnt); // JobElmnt from scoe17.proto removed
}

// ============================================================================
// UNIFIED TYPE SYSTEM - GLM & VULKAN INTEROP (Zero-Copy Conversions)
// ============================================================================

// CRITICAL: Vec2f, Vec3f, Vec4f, Mat3x3, Mat4x4, Color are designed for zero-copy interop with GLM
// Memory layout matches glm::vec2/vec3/vec4/mat3/mat4 exactly
// Use ONLY these types - never create custom vector types!
// NOTE: Vec2f, Vec3f, Quaternion, Mat3x3, Mat4x4, Color are already defined above

// Type conversion metadata for code generation
message TypeConversionHints {
    bool generate_glm_conversions = 1;      // Generate to/from glm::vec3
    bool generate_glm_operators = 2;        // Generate operator overloads (+, -, *, dot, cross)
    bool generate_vulkan_conversions = 3;   // Generate to/from VkExtent3D, etc.
    bool generate_imgui_conversions = 4;    // Generate to/from ImVec2/ImVec4
}

// ============================================================================
// VULKAN INTEROP TYPES (Native Vulkan struct equivalents)
// ============================================================================

message VkExtent3DProto {
    uint32 width = 1;
    uint32 height = 2;
    uint32 depth = 3;
}

message VkExtent2DProto {
    uint32 width = 1;
    uint32 height = 2;
}

message VkOffset3DProto {
    int32 x = 1;
    int32 y = 2;
    int32 z = 3;
}

message VkOffset2DProto {
    int32 x = 1;
    int32 y = 2;
}

message VkViewportProto {
    float x = 1;
    float y = 2;
    float width = 3;
    float height = 4;
    float min_depth = 5;
    float max_depth = 6;
}

message VkRect2DProto {
    VkOffset2DProto offset = 1;
    VkExtent2DProto extent = 2;
}

// ============================================================================
// VULKAN RESOURCE LIFECYCLE MANAGEMENT
// ============================================================================

message VulkanDeviceInfo {
    string device_name = 1;
    uint32 vendor_id = 2;
    uint32 device_id = 3;
    string driver_version = 4;
    uint32 api_version = 5;
    VulkanMemoryInfo memory_info = 6;
}

message VulkanMemoryInfo {
    uint64 total_device_memory = 1;
    uint64 available_device_memory = 2;
    repeated VulkanMemoryHeap heaps = 3;
}

message VulkanMemoryHeap {
    uint64 size = 1;
    uint32 flags = 2;
}

message VulkanBufferDescriptor {
    string buffer_id = 1;
    uint64 size = 2;
    uint32 usage_flags = 3;          // VkBufferUsageFlags
    uint32 memory_property_flags = 4; // VkMemoryPropertyFlags
    bool dedicated_allocation = 5;
}

message VulkanTextureDescriptor {
    string texture_id = 1;
    uint32 width = 2;
    uint32 height = 3;
    uint32 depth = 4;
    uint32 mip_levels = 5;
    uint32 array_layers = 6;
    VulkanFormat format = 7;
    uint32 usage_flags = 8;
    VulkanSampleCount samples = 9;
}

enum VulkanFormat {
    VK_FORMAT_UNDEFINED = 0;
    VK_FORMAT_R8G8B8A8_UNORM = 37;
    VK_FORMAT_R8G8B8A8_SRGB = 43;
    VK_FORMAT_B8G8R8A8_SRGB = 50;
    VK_FORMAT_D32_SFLOAT = 126;
    VK_FORMAT_D24_UNORM_S8_UINT = 129;
    VK_FORMAT_R16G16B16A16_SFLOAT = 97;
    VK_FORMAT_R32G32B32A32_SFLOAT = 109;
}

enum VulkanSampleCount {
    VK_SAMPLE_COUNT_UNSPECIFIED = 0;
    VK_SAMPLE_COUNT_1_BIT = 1;
    VK_SAMPLE_COUNT_2_BIT = 2;
    VK_SAMPLE_COUNT_4_BIT = 4;
    VK_SAMPLE_COUNT_8_BIT = 8;
    VK_SAMPLE_COUNT_16_BIT = 16;
}

message VulkanPipelineDescriptor {
    string pipeline_id = 1;
    string vertex_shader = 2;
    string fragment_shader = 3;
    VulkanRenderPassDescriptor render_pass = 4;
    repeated VulkanVertexInputBinding vertex_bindings = 5;
    repeated VulkanVertexInputAttribute vertex_attributes = 6;
    VulkanRasterizationState rasterization = 7;
    VulkanDepthStencilState depth_stencil = 8;
    VulkanBlendState blend_state = 9;
}

message VulkanVertexInputBinding {
    uint32 binding = 1;
    uint32 stride = 2;
    VulkanVertexInputRate input_rate = 3;
}

enum VulkanVertexInputRate {
    VK_VERTEX_INPUT_RATE_VERTEX = 0;
    VK_VERTEX_INPUT_RATE_INSTANCE = 1;
}

message VulkanVertexInputAttribute {
    uint32 location = 1;
    uint32 binding = 2;
    VulkanFormat format = 3;
    uint32 offset = 4;
}

message VulkanRenderPassDescriptor {
    string render_pass_id = 1;
    repeated VulkanAttachmentDescription attachments = 2;
    repeated VulkanSubpassDescription subpasses = 3;
    repeated VulkanSubpassDependency dependencies = 4;
}

message VulkanAttachmentDescription {
    VulkanFormat format = 1;
    VulkanSampleCount samples = 2;
    VulkanLoadOp load_op = 3;
    VulkanStoreOp store_op = 4;
    VulkanImageLayout initial_layout = 5;
    VulkanImageLayout final_layout = 6;
}

enum VulkanLoadOp {
    VK_ATTACHMENT_LOAD_OP_LOAD = 0;
    VK_ATTACHMENT_LOAD_OP_CLEAR = 1;
    VK_ATTACHMENT_LOAD_OP_DONT_CARE = 2;
}

enum VulkanStoreOp {
    VK_ATTACHMENT_STORE_OP_STORE = 0;
    VK_ATTACHMENT_STORE_OP_DONT_CARE = 1;
}

enum VulkanImageLayout {
    VK_IMAGE_LAYOUT_UNDEFINED = 0;
    VK_IMAGE_LAYOUT_GENERAL = 1;
    VK_IMAGE_LAYOUT_COLOR_ATTACHMENT_OPTIMAL = 2;
    VK_IMAGE_LAYOUT_DEPTH_STENCIL_ATTACHMENT_OPTIMAL = 3;
    VK_IMAGE_LAYOUT_DEPTH_STENCIL_READ_ONLY_OPTIMAL = 4;
    VK_IMAGE_LAYOUT_SHADER_READ_ONLY_OPTIMAL = 5;
    VK_IMAGE_LAYOUT_TRANSFER_SRC_OPTIMAL = 6;
    VK_IMAGE_LAYOUT_TRANSFER_DST_OPTIMAL = 7;
    VK_IMAGE_LAYOUT_PRESENT_SRC_KHR = 1000001002;
}

message VulkanSubpassDescription {
    repeated uint32 color_attachments = 1;
    uint32 depth_attachment = 2;
}

message VulkanSubpassDependency {
    uint32 src_subpass = 1;
    uint32 dst_subpass = 2;
    uint32 src_stage_mask = 3;
    uint32 dst_stage_mask = 4;
    uint32 src_access_mask = 5;
    uint32 dst_access_mask = 6;
}

message VulkanRasterizationState {
    VulkanPolygonMode polygon_mode = 1;
    VulkanCullMode cull_mode = 2;
    VulkanFrontFace front_face = 3;
    float line_width = 4;
    bool depth_clamp_enable = 5;
    bool depth_bias_enable = 6;
}

enum VulkanPolygonMode {
    VK_POLYGON_MODE_FILL = 0;
    VK_POLYGON_MODE_LINE = 1;
    VK_POLYGON_MODE_POINT = 2;
}

enum VulkanCullMode {
    VK_CULL_MODE_NONE = 0;
    VK_CULL_MODE_FRONT_BIT = 1;
    VK_CULL_MODE_BACK_BIT = 2;
    VK_CULL_MODE_FRONT_AND_BACK = 3;
}

enum VulkanFrontFace {
    VK_FRONT_FACE_COUNTER_CLOCKWISE = 0;
    VK_FRONT_FACE_CLOCKWISE = 1;
}

message VulkanDepthStencilState {
    bool depth_test_enable = 1;
    bool depth_write_enable = 2;
    VulkanCompareOp depth_compare_op = 3;
    bool stencil_test_enable = 4;
    float min_depth_bounds = 5;
    float max_depth_bounds = 6;
}

enum VulkanCompareOp {
    VK_COMPARE_OP_NEVER = 0;
    VK_COMPARE_OP_LESS = 1;
    VK_COMPARE_OP_EQUAL = 2;
    VK_COMPARE_OP_LESS_OR_EQUAL = 3;
    VK_COMPARE_OP_GREATER = 4;
    VK_COMPARE_OP_NOT_EQUAL = 5;
    VK_COMPARE_OP_GREATER_OR_EQUAL = 6;
    VK_COMPARE_OP_ALWAYS = 7;
}

message VulkanBlendState {
    bool blend_enable = 1;
    VulkanBlendFactor src_color_blend_factor = 2;
    VulkanBlendFactor dst_color_blend_factor = 3;
    VulkanBlendOp color_blend_op = 4;
    VulkanBlendFactor src_alpha_blend_factor = 5;
    VulkanBlendFactor dst_alpha_blend_factor = 6;
    VulkanBlendOp alpha_blend_op = 7;
}

enum VulkanBlendFactor {
    VK_BLEND_FACTOR_ZERO = 0;
    VK_BLEND_FACTOR_ONE = 1;
    VK_BLEND_FACTOR_SRC_COLOR = 2;
    VK_BLEND_FACTOR_ONE_MINUS_SRC_COLOR = 3;
    VK_BLEND_FACTOR_DST_COLOR = 4;
    VK_BLEND_FACTOR_ONE_MINUS_DST_COLOR = 5;
    VK_BLEND_FACTOR_SRC_ALPHA = 6;
    VK_BLEND_FACTOR_ONE_MINUS_SRC_ALPHA = 7;
    VK_BLEND_FACTOR_DST_ALPHA = 8;
    VK_BLEND_FACTOR_ONE_MINUS_DST_ALPHA = 9;
}

enum VulkanBlendOp {
    VK_BLEND_OP_ADD = 0;
    VK_BLEND_OP_SUBTRACT = 1;
    VK_BLEND_OP_REVERSE_SUBTRACT = 2;
    VK_BLEND_OP_MIN = 3;
    VK_BLEND_OP_MAX = 4;
}

// ============================================================================
// CONFIGURATION MANAGEMENT
// ============================================================================

// Configuration section (key-value pairs from XML)
message ConfigSection {
    map<string, string> values = 1;
}

// Tool information for Arctic Studio tooling
message ToolInfo {
    string id = 1;
    string name = 2;
    string url = 3;
    string local_path = 4;
    string route = 5;  // arctic-tool-runner route (e.g., "/io-monitor")
}

// Studio mode configuration
message StudioConfig {
    string overlay_ui_path = 1;
    string tool_runner_path = 2;
    bool auto_launch_overlay = 3;
    repeated ToolInfo tools = 4;
    int32 http_server_port = 5;
}

// Complete application configuration loaded from arctic.config.xml
message AppConfig {
    map<string, ConfigSection> sections = 1;
    StudioConfig studio_config = 2;
    bool is_valid = 3;
    repeated string errors = 4;
    string file_path = 5;
}

// Root configuration message (loaded from arctic.config.xml)
message CoregfxConfig {
    ConfigVariables variables = 1;
    ConfigPaths paths = 2;
    SceneConfig scene = 3;
    AppSettings settings = 4;
    DebugConfig debug = 5;
    CameraConfig camera = 6;
    HttpServerConfig http_server = 7;
    StateDumpConfig state_dump = 8;
    StudioConfig studio = 9;  // Added studio config here too
}

message ConfigVariables {
    int32 thread_count = 1;
    map<string, string> custom_vars = 2;
}

message ConfigPaths {
    string asset_root = 1;
    string shader_dir = 2;
    string log_dir = 3;
    string temp_dir = 4;
    string cache_dir = 5;
}

message SceneConfig {
    string default_input_file = 1;
    bool auto_load = 2;
}

// Application runtime settings (command-line args + config overrides)
message AppSettings {
    // Input/Output
    string input_file = 1;                 // Scene file to load
    bool show_specification = 2;           // Print renderer spec and exit

    // Camera settings
    bool custom_camera = 3;                // Use custom camera position/rotation
    float cam_pos_x = 4;
    float cam_pos_y = 5;
    float cam_pos_z = 6;
    float cam_rot_x = 7;
    float cam_rot_y = 8;
    float cam_rot_z = 9;

    // HTTP Server settings
    bool enable_http_server = 10;
    int32 http_port = 11;

    // State dump settings
    bool dump_state = 12;
    string dump_state_file = 13;
    int32 dump_delay_seconds = 14;

    // Mode flags
    bool edit_mode = 15;                   // Enable edit mode (formerly studio_mode)
    bool headless_mode = 16;               // Run without window
    bool mock_mode = 17;                   // Mock mode for testing

    // Auto-close settings
    bool auto_close = 18;
    int32 auto_close_timeout = 19;

    // Rendering settings
    int32 target_fps = 20;
    bool vsync_enabled = 21;

    // Command-line override tracking flags
    bool http_port_set_by_command_line = 30;
    bool edit_mode_set_by_command_line = 31;
    bool headless_mode_set_by_command_line = 32;
    bool auto_close_set_by_command_line = 33;
    bool auto_close_timeout_set_by_command_line = 34;
}

message DebugConfig {
    LogLevel log_level = 1;
    bool log_to_console = 2;
    bool log_to_file = 3;
    bool json_logging = 4;
    bool vulkan_validation = 5;
    bool compact_logging = 6;
}

enum LogLevel {
    LOG_LEVEL_TRACE = 0;
