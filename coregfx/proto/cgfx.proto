enum BufferType {
    BUFFER_TYPE_UNIFORM = 0;
    BUFFER_TYPE_STORAGE = 1;
    BUFFER_TYPE_PUSH_CONSTANT = 2;
}

message ShaderInputAttribute {
    string name = 1;
    uint32 location = 2;
    ShaderDataType data_type = 3;
}

message ShaderOutputAttribute {
    string name = 1;
    uint32 location = 2;
    ShaderDataType data_type = 3;
}

enum ShaderDataType {
    SHADER_DATA_FLOAT = 0;
    SHADER_DATA_VEC2 = 1;
    SHADER_DATA_VEC3 = 2;
    SHADER_DATA_VEC4 = 3;
    SHADER_DATA_MAT3 = 4;
    SHADER_DATA_MAT4 = 5;
    SHADER_DATA_INT = 6;
    SHADER_DATA_IVEC2 = 7;
    SHADER_DATA_IVEC3 = 8;
    SHADER_DATA_IVEC4 = 9;
}

message ShaderValidationRequest {
    bytes spirv_binary = 1;
}

message ShaderValidationResponse {
    bool valid = 1;
    repeated ShaderCompilationError errors = 2;
}

message ShaderReflectionRequest {
    bytes spirv_binary = 1;
}

// ============================================================================
// RENDERER STATE & TELEMETRY
