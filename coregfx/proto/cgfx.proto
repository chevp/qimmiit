    string message = 2;
}

message ShaderReflectionInfo {
    repeated ShaderUniformBinding uniforms = 1;
    repeated ShaderTextureBinding textures = 2;
    repeated ShaderBufferBinding buffers = 3;
    repeated ShaderInputAttribute inputs = 4;
    repeated ShaderOutputAttribute outputs = 5;
