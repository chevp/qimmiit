enum RendererMode {
    RENDERER_MODE_NORMAL = 0;
    RENDERER_MODE_HEADLESS = 1;
    RENDERER_MODE_DEBUG = 2;
    RENDERER_MODE_PROFILING = 3;
}

message RenderStats {
    uint64 frame_number = 1;
    float frame_time_ms = 2;
    float cpu_time_ms = 3;
    float gpu_time_ms = 4;
    uint32 draw_calls = 5;
    uint32 triangles = 6;
    uint32 vertices = 7;
    MemoryStats memory = 8;
}

message MemoryStats {
    uint64 allocated_bytes = 1;
    uint64 used_bytes = 2;
    uint32 allocation_count = 3;
}

message RenderPass {
    string pass_name = 1;
    uint32 attachments_count = 2;
    float duration_ms = 3;
}

message CameraState {
    Vec3f position = 1;
    Vec3f rotation = 2;
    float fov = 3;
    float near_plane = 4;
    float far_plane = 5;
    Mat4x4 view_matrix = 6;
    Mat4x4 projection_matrix = 7;
}

message PerformanceMetricsRequest {
    int32 last_n_frames = 1;
}

message PerformanceMetricsResponse {
    repeated RenderStats frame_stats = 1;
    RenderStats average = 2;
    RenderStats min = 3;
    RenderStats max = 4;
}

// ============================================================================
// GRPC SERVICES
// ============================================================================

service CoregfxConfigService {
    rpc GetConfig(RpcVoid) returns (CoregfxConfig);
    rpc UpdateConfig(CoregfxConfig) returns (ConfigUpdateResponse);
    rpc ReloadConfig(RpcVoid) returns (ConfigUpdateResponse);
    rpc ValidateConfig(CoregfxConfig) returns (ConfigValidationResponse);
}

service AssetService {
    rpc LoadAsset(AssetLoadRequest) returns (AssetLoadResponse);
    rpc UnloadAsset(AssetUnloadRequest) returns (AssetUnloadResponse);
    rpc GetAssetInfo(AssetInfoRequest) returns (Asset);
    rpc ListAssets(ListAssetsRequest) returns (ListAssetsResponse);
    rpc StreamAssetLoading(stream AssetLoadRequest) returns (stream AssetLoadResponse);
}

service ShaderCompilerService {
    rpc CompileShader(ShaderCompilationRequest) returns (ShaderCompilationResponse);
    rpc ValidateShader(ShaderValidationRequest) returns (ShaderValidationResponse);
    rpc ReflectShader(ShaderReflectionRequest) returns (ShaderReflectionInfo);
}

service RendererTelemetryService {
    rpc GetRendererState(RpcVoid) returns (RendererState);
    rpc StreamRendererState(RpcVoid) returns (stream RendererState);
    rpc GetPerformanceMetrics(PerformanceMetricsRequest) returns (PerformanceMetricsResponse);
}