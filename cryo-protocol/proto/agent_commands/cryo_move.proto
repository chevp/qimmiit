// cryo_move.proto - Move command for agents
// Defines messages for agent movement and pathfinding
syntax = "proto3";

package cryo.agent.command;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";

// ==============================================================================
// MOVE COMMAND
// ==============================================================================

message MoveCommand {
  string agent_id = 1;
  MoveTarget target = 2;
  MoveOptions options = 3;
}

message MoveTarget {
  oneof target {
    common.CryoVec3 position = 1;               // Move to position
    string entity_id = 2;                       // Move to entity
    string waypoint_name = 3;                   // Move to named waypoint
  }
  float acceptance_radius = 10;                 // Distance at which target is reached
}

message MoveOptions {
  MovementType movement_type = 1;
  float speed = 2;                              // Movement speed
  float acceleration = 3;
  float max_speed = 4;
  bool use_pathfinding = 5;
  PathfindingOptions pathfinding = 6;
  RotationMode rotation = 7;
  bool stop_on_arrival = 8;

  enum MovementType {
    WALK = 0;
    RUN = 1;
    SPRINT = 2;
    CROUCH = 3;
    FLY = 4;
    TELEPORT = 5;
  }

  enum RotationMode {
    NO_ROTATION = 0;
    FACE_MOVEMENT_DIRECTION = 1;
    FACE_TARGET = 2;
    FACE_CAMERA = 3;
  }
}

message PathfindingOptions {
  bool avoid_obstacles = 1;
  bool avoid_other_agents = 2;
  float obstacle_avoidance_radius = 3;
  int32 pathfinding_area_mask = 4;
  float corner_slowdown = 5;
  bool dynamic_repath = 6;                      // Recalculate path if blocked
  float repath_interval = 7;
}

message MoveResponse {
  bool success = 1;
  string movement_handle = 2;                   // Handle to query/cancel movement
  float estimated_duration = 3;
  repeated common.CryoVec3 path = 4;            // Calculated path
  string error_message = 5;
}

// ==============================================================================
// FOLLOW COMMAND
// ==============================================================================

message FollowCommand {
  string agent_id = 1;
  string target_entity_id = 2;
  FollowOptions options = 3;
}

message FollowOptions {
  float follow_distance = 1;                    // Distance to maintain
  float max_distance = 2;                       // Stop following if farther
  float speed = 3;
  FollowMode mode = 4;
  bool use_pathfinding = 5;

  enum FollowMode {
    DIRECT = 0;                                 // Move directly toward target
    BEHIND = 1;                                 // Follow behind target
    BESIDE = 2;                                 // Follow beside target
    ORBIT = 3;                                  // Orbit around target
  }
}

message FollowResponse {
  bool success = 1;
  string follow_handle = 2;
  string error_message = 3;
}

message StopFollowingCommand {
  string follow_handle = 1;
}

message StopFollowingResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// PATROL COMMAND
// ==============================================================================

message PatrolCommand {
  string agent_id = 1;
  repeated common.CryoVec3 waypoints = 2;
  PatrolOptions options = 3;
}

message PatrolOptions {
  bool loop = 1;                                // Return to start after end
  bool ping_pong = 2;                           // Reverse direction at ends
  float speed = 3;
  float wait_time_at_waypoint = 4;
  bool use_pathfinding = 5;
}

message PatrolResponse {
  bool success = 1;
  string patrol_handle = 2;
  string error_message = 3;
}

message StopPatrolCommand {
  string patrol_handle = 1;
}

message StopPatrolResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// MOVEMENT QUERIES
// ==============================================================================

message GetMovementStateCommand {
  string agent_id = 1;
}

message GetMovementStateResponse {
  bool success = 1;
  MovementState state = 2;
  string error_message = 3;
}

message MovementState {
  bool is_moving = 1;
  common.CryoVec3 current_position = 2;
  common.CryoVec3 velocity = 3;
  float speed = 4;
  common.CryoVec3 target_position = 5;
  float distance_to_target = 6;
  float estimated_time_to_arrival = 7;
  repeated common.CryoVec3 remaining_path = 8;
}

message CancelMovementCommand {
  string movement_handle = 1;
  bool stop_immediately = 2;                    // Or decelerate smoothly
}

message CancelMovementResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// ADVANCED MOVEMENT
// ==============================================================================

message MoveAlongPathCommand {
  string agent_id = 1;
  repeated common.CryoVec3 path = 2;
  float speed = 3;
  bool smooth_path = 4;
}

message MoveAlongPathResponse {
  bool success = 1;
  string movement_handle = 2;
  string error_message = 3;
}

message AvoidObstacleCommand {
  string agent_id = 1;
  common.CryoVec3 obstacle_position = 2;
  float avoidance_radius = 3;
}

message AvoidObstacleResponse {
  bool success = 1;
  string error_message = 2;
}

message SetMovementSpeedCommand {
  string agent_id = 1;
  float speed = 2;
  float transition_time = 3;                    // Smooth speed change
}

message SetMovementSpeedResponse {
  bool success = 1;
  string error_message = 2;
}
