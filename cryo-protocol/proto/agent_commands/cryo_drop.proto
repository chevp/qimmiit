// cryo_drop.proto - Drop command for agents
// Defines messages for dropping items and placing objects
syntax = "proto3";

package cryo.agent.command;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";

// ==============================================================================
// DROP COMMAND
// ==============================================================================

message DropCommand {
  string agent_id = 1;
  DropTarget target = 2;
  DropOptions options = 3;
}

message DropTarget {
  oneof target {
    string entity_id = 1;                       // Drop specific entity
    InventorySlotRef slot = 2;                  // Drop from inventory slot
    EquipSlotRef equip_slot = 3;                // Drop equipped item
    string hand = 4;                            // "left", "right", "both"
  }
}

message InventorySlotRef {
  SlotType type = 1;
  int32 index = 2;

  enum SlotType {
    BACKPACK = 0;
    HOTBAR = 1;
    EQUIPMENT = 2;
    QUICK_SLOT = 3;
  }
}

message EquipSlotRef {
  EquipSlot slot = 1;

  enum EquipSlot {
    MAIN_HAND = 0;
    OFF_HAND = 1;
    HEAD = 2;
    CHEST = 3;
    LEGS = 4;
    FEET = 5;
    ACCESSORY_1 = 6;
    ACCESSORY_2 = 7;
  }
}

message DropOptions {
  DropMode mode = 1;
  common.CryoVec3 drop_position = 2;            // Specific drop position
  common.CryoVec3 drop_offset = 3;              // Offset from agent
  common.CryoVec3 drop_velocity = 4;            // Initial velocity
  float drop_distance = 5;                      // Distance in front of agent
  bool physics_enabled = 6;                     // Enable physics on drop
  DropAnimation animation = 7;
  int32 quantity = 8;                           // For stackable items (0 = all)

  enum DropMode {
    DROP_IN_PLACE = 0;                          // Drop at agent's feet
    DROP_FORWARD = 1;                           // Drop in front of agent
    DROP_AT_POSITION = 2;                       // Drop at specific position
    THROW = 3;                                  // Throw with velocity
    PLACE = 4;                                  // Carefully place (no physics)
  }
}

message DropAnimation {
  string animation_name = 1;
  float duration = 2;
  bool wait_for_animation = 3;
}

message DropResponse {
  bool success = 1;
  string dropped_entity_id = 2;
  common.CryoVec3 drop_position = 3;
  DropResult result = 4;
  string error_message = 5;

  enum DropResult {
    DROPPED = 0;
    PLACED = 1;
    THROWN = 2;
    NOT_HELD = 3;
    NO_SPACE = 4;
    INVALID_LOCATION = 5;
  }
}

// ==============================================================================
// THROW COMMAND
// ==============================================================================

message ThrowCommand {
  string agent_id = 1;
  string entity_id = 2;                         // Item to throw
  ThrowOptions options = 3;
}

message ThrowOptions {
  oneof target {
    common.CryoVec3 target_position = 1;
    string target_entity_id = 2;
    common.CryoVec3 direction = 3;
  }
  float throw_force = 10;
  ThrowType throw_type = 11;
  bool spin = 12;                               // Add spin to throw
  common.CryoVec3 spin_axis = 13;
  float spin_rate = 14;

  enum ThrowType {
    STRAIGHT = 0;                               // Direct throw
    ARC = 1;                                    // Arcing throw (gravity)
    HOMING = 2;                                 // Homing to target
  }
}

message ThrowResponse {
  bool success = 1;
  string thrown_entity_id = 2;
  common.CryoVec3 initial_velocity = 3;
  float estimated_flight_time = 4;
  string error_message = 5;
}

// ==============================================================================
// PLACE COMMAND
// ==============================================================================

message PlaceCommand {
  string agent_id = 1;
  string entity_id = 2;
  PlaceOptions options = 3;
}

message PlaceOptions {
  common.CryoVec3 position = 1;
  common.CryoVec3 rotation = 2;                 // Euler angles
  PlacementMode mode = 3;
  bool snap_to_surface = 4;
  bool align_to_normal = 5;
  float placement_offset = 6;
  PlacementConstraints constraints = 7;

  enum PlacementMode {
    WORLD_SPACE = 0;
    SURFACE = 1;                                // Place on nearest surface
    GRID = 2;                                   // Snap to grid
    SOCKET = 3;                                 // Place in socket/attach point
  }
}

message PlacementConstraints {
  bool check_collision = 1;
  bool require_support = 2;                     // Must be on solid surface
  float max_slope = 3;                          // Maximum surface angle
  repeated string allowed_surfaces = 4;         // Surface tags
  common.CryoVec3 min_clearance = 5;            // Required clearance space
}

message PlaceResponse {
  bool success = 1;
  common.CryoVec3 placed_position = 2;
  common.CryoVec3 placed_rotation = 3;
  PlacementResult result = 4;
  string error_message = 5;

  enum PlacementResult {
    PLACED = 0;
    NO_VALID_LOCATION = 1;
    OBSTRUCTED = 2;
    NO_SUPPORT = 3;
    OUT_OF_REACH = 4;
  }
}

// ==============================================================================
// TRANSFER COMMAND
// ==============================================================================

message TransferItemCommand {
  string source_agent_id = 1;
  string target_agent_id = 2;
  TransferTarget item = 3;
  TransferOptions options = 4;
}

message TransferTarget {
  oneof target {
    string entity_id = 1;
    InventorySlotRef slot = 2;
  }
  int32 quantity = 10;                          // For stackable items
}

message TransferOptions {
  bool require_proximity = 1;
  float max_distance = 2;
  bool play_animation = 3;
  bool require_accept = 4;                      // Target must accept transfer
}

message TransferItemResponse {
  bool success = 1;
  TransferResult result = 2;
  string error_message = 3;

  enum TransferResult {
    TRANSFERRED = 0;
    OUT_OF_RANGE = 1;
    TARGET_FULL = 2;
    REJECTED = 3;
    PENDING_ACCEPT = 4;
  }
}

message AcceptTransferCommand {
  string agent_id = 1;
  string transfer_id = 2;
  bool accept = 3;
}

message AcceptTransferResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// DESTRUCTION COMMAND
// ==============================================================================

message DestroyItemCommand {
  string agent_id = 1;
  string entity_id = 2;
  DestroyOptions options = 3;
}

message DestroyOptions {
  bool play_effect = 1;
  string destroy_effect = 2;
  bool confirm = 3;                             // Require confirmation
  bool drop_contents = 4;                       // Drop items from container
}

message DestroyItemResponse {
  bool success = 1;
  repeated string dropped_items = 2;            // Items that were inside
  string error_message = 3;
}

// ==============================================================================
// STORAGE COMMANDS
// ==============================================================================

message StoreInContainerCommand {
  string agent_id = 1;
  string container_entity_id = 2;
  string item_entity_id = 3;
  int32 quantity = 4;
}

message StoreInContainerResponse {
  bool success = 1;
  string error_message = 2;
}

message TakeFromContainerCommand {
  string agent_id = 1;
  string container_entity_id = 2;
  string item_entity_id = 3;
  int32 quantity = 4;
}

message TakeFromContainerResponse {
  bool success = 1;
  string taken_entity_id = 2;
  string error_message = 3;
}
