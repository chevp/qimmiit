// sprite_2d.proto - 2D Sprite System
// Sprite definitions, properties, and management
syntax = "proto3";

package cryo.rendering2d;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";

// ============================================================================
// 2D POSITION AND TRANSFORM
// ============================================================================

message Position2D {
  float x = 1;
  float y = 2;
}

message Size2D {
  float width = 1;
  float height = 2;
}

message Transform2D {
  Position2D position = 1;
  float rotation = 2;     // Rotation in degrees
  cryo.common.CryoVec2 scale = 3;
  Position2D pivot = 4;   // Pivot point (0-1 normalized)
}

message Rect2D {
  Position2D position = 1;
  Size2D size = 2;
}

// ============================================================================
// SPRITE DEFINITION
// ============================================================================

message Sprite2D {
  string sprite_id = 1;
  string sprite_name = 2;

  // Texture reference
  oneof texture_source {
    string texture_path = 3;      // Direct texture path
    AtlasReference atlas_ref = 4; // Reference to atlas
  }

  // Transform
  Transform2D transform = 5;

  // Visual properties
  cryo.common.CryoColor tint = 6;
  float opacity = 7;  // 0.0 to 1.0

  // Rendering
  int32 layer = 8;
  int32 z_index = 9;
  bool visible = 10;

  // Flip
  bool flip_x = 11;
  bool flip_y = 12;

  // Blending
  enum BlendMode {
    NORMAL = 0;
    ADDITIVE = 1;
    MULTIPLY = 2;
    SCREEN = 3;
    OVERLAY = 4;
  }
  BlendMode blend_mode = 13;

  // Material/Shader
  string material_id = 14;
  string shader_id = 15;

  // Animation state
  string current_animation_id = 16;

  // Tags and metadata
  repeated string tags = 17;
  map<string, string> metadata = 18;
}

// ============================================================================
// ATLAS REFERENCE
// ============================================================================

message AtlasReference {
  string atlas_id = 1;
  int32 frame_index = 2;
  string frame_name = 3;  // Alternative to index
}

// ============================================================================
// SPRITE BATCH (for efficient rendering)
// ============================================================================

message SpriteBatch {
  string batch_id = 1;
  repeated Sprite2D sprites = 2;

  // Batch settings
  string texture_id = 3;
  string material_id = 4;
  int32 layer = 5;

  // Performance
  bool static_batch = 6;  // Won't change
  bool dynamic_batch = 7; // Can change
}

// ============================================================================
// SPRITE LAYER
// ============================================================================

message SpriteLayer {
  string layer_id = 1;
  string layer_name = 2;
  int32 layer_index = 3;

  // Layer properties
  bool visible = 4;
  float opacity = 5;
  cryo.common.CryoColor tint = 6;

  // Parallax
  float parallax_factor_x = 7;
  float parallax_factor_y = 8;

  // Sorting
  enum SortMode {
    BY_Z_INDEX = 0;
    BY_Y_POSITION = 1;
    BY_DISTANCE = 2;
    NONE = 3;
  }
  SortMode sort_mode = 9;

  // All sprites in this layer
  repeated string sprite_ids = 10;
}

// ============================================================================
// SPRITE EFFECTS
// ============================================================================

message SpriteEffect {
  string effect_id = 1;
  string sprite_id = 2;

  enum EffectType {
    GLOW = 0;
    OUTLINE = 1;
    SHADOW = 2;
    DISTORTION = 3;
    COLOR_SHIFT = 4;
    PIXELATE = 5;
    BLUR = 6;
  }
  EffectType type = 3;

  // Effect parameters
  float intensity = 4;
  cryo.common.CryoColor color = 5;
  cryo.common.CryoVec2 offset = 6;

  bool enabled = 7;
}

// ============================================================================
// SPRITE MASK
// ============================================================================

message SpriteMask {
  string mask_id = 1;
  string sprite_id = 2;

  enum MaskMode {
    ALPHA = 0;
    STENCIL = 1;
    DEPTH = 2;
  }
  MaskMode mode = 3;

  // Mask shape
  oneof shape {
    Rect2D rect = 4;
    CircleMask circle = 5;
    PolygonMask polygon = 6;
    TextureMask texture = 7;
  }

  bool invert = 8;
}

message CircleMask {
  Position2D center = 1;
  float radius = 2;
}

message PolygonMask {
  repeated Position2D points = 1;
}

message TextureMask {
  string texture_path = 1;
  float threshold = 2;
}

// ============================================================================
// SPRITE ANIMATION
// ============================================================================

message SpriteAnimation {
  string animation_id = 1;
  string animation_name = 2;

  // Frame sequence
  repeated AnimationFrame frames = 3;

  // Animation settings
  float fps = 4;
  bool loop = 5;
  bool ping_pong = 6;  // Play forward then backward

  // Events
  message AnimationEvent {
    int32 frame_index = 1;
    string event_name = 2;
    map<string, string> parameters = 3;
  }
  repeated AnimationEvent events = 7;
}

message AnimationFrame {
  // Frame source
  oneof source {
    string texture_path = 1;
    AtlasReference atlas_ref = 2;
  }

  // Frame duration
  float duration = 3;  // Seconds (overrides fps)

  // Frame-specific properties
  Position2D offset = 4;
  cryo.common.CryoColor tint = 5;
}

// ============================================================================
// ANIMATED SPRITE
// ============================================================================

message AnimatedSprite {
  Sprite2D base_sprite = 1;

  // Available animations
  map<string, SpriteAnimation> animations = 2;

  // Current state
  string current_animation = 3;
  int32 current_frame = 4;
  float playback_time = 5;

  // Playback settings
  float playback_speed = 6;  // Speed multiplier
  bool paused = 7;
}

// ============================================================================
// SPRITE SHEET DEFINITION
// ============================================================================

message SpriteSheet {
  string sheet_id = 1;
  string texture_path = 2;

  Size2D texture_size = 3;

  // Grid-based sheet
  message GridSheet {
    int32 columns = 1;
    int32 rows = 2;
    Size2D cell_size = 3;
    Position2D offset = 4;
    Position2D spacing = 5;
  }

  // Custom frame positions
  message CustomSheet {
    message Frame {
      string frame_name = 1;
      Rect2D bounds = 2;
      Position2D pivot = 3;
      bool rotated = 4;
    }
    repeated Frame frames = 2;
  }

  oneof sheet_type {
    GridSheet grid = 4;
    CustomSheet custom = 5;
  }
}

// ============================================================================
// SPRITE COLLECTION
// ============================================================================

message SpriteCollection {
  string collection_id = 1;
  string collection_name = 2;

  repeated Sprite2D sprites = 3;
  repeated SpriteLayer layers = 4;

  // Collection bounds
  Rect2D bounds = 5;

  // Collection transform (affects all sprites)
  Transform2D transform = 6;

  bool visible = 7;
}

// ============================================================================
// PARTICLE SPRITE (for 2D particle systems)
// ============================================================================

message ParticleSprite {
  Sprite2D base_sprite = 1;

  // Particle properties
  cryo.common.CryoVec2 velocity = 2;
  cryo.common.CryoVec2 acceleration = 3;

  float lifetime = 4;
  float age = 5;

  // Size over lifetime
  float start_size = 6;
  float end_size = 7;

  // Color over lifetime
  cryo.common.CryoColor start_color = 8;
  cryo.common.CryoColor end_color = 9;

  // Rotation
  float angular_velocity = 10;
}

// ============================================================================
// SPRITE PHYSICS (Simple 2D physics)
// ============================================================================

message SpritePhysics {
  string sprite_id = 1;

  // Velocity
  cryo.common.CryoVec2 velocity = 2;
  cryo.common.CryoVec2 acceleration = 3;

  // Forces
  cryo.common.CryoVec2 gravity = 4;
  float drag = 5;

  // Angular
  float angular_velocity = 6;
  float angular_drag = 7;

  // Mass
  float mass = 8;

  // Collision
  enum CollisionShape {
    NONE = 0;
    RECTANGLE = 1;
    CIRCLE = 2;
    POLYGON = 3;
  }
  CollisionShape collision_shape = 9;

  bool is_kinematic = 10;  // Not affected by forces
  bool is_trigger = 11;    // Only triggers events
}

// ============================================================================
// SPRITE RENDERING STATE
// ============================================================================

message SpriteRenderState {
  string sprite_id = 1;

  // Cached rendering data
  Rect2D screen_bounds = 2;
  bool is_visible = 3;
  bool is_culled = 4;

  // Rendering priority
  int32 render_order = 5;

  // Material instance
  string material_instance_id = 6;
}

// ============================================================================
// SPRITE MANAGER
// ============================================================================

message SpriteManager {
  string manager_id = 1;

  // All sprites
  map<string, Sprite2D> sprites = 2;

  // Layers
  repeated SpriteLayer layers = 3;

  // Collections
  map<string, SpriteCollection> collections = 4;

  // Animations
  map<string, SpriteAnimation> animations = 5;

  // Rendering
  repeated SpriteBatch batches = 6;

  // Camera
  string active_camera_id = 7;
}