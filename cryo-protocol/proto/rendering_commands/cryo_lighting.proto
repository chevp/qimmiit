// cryo_lighting.proto - Lighting commands and settings
// Defines messages for lights, shadows, and global illumination
syntax = "proto3";

package cryo.rendering.lighting;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";

// ==============================================================================
// LIGHT COMMANDS
// ==============================================================================

message CreateLightCommand {
  string entity_id = 1;
  LightSettings settings = 2;
}

message CreateLightResponse {
  bool success = 1;
  string light_id = 2;
  string error_message = 3;
}

message UpdateLightCommand {
  string light_entity_id = 1;
  LightSettings settings = 2;
}

message UpdateLightResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// LIGHT SETTINGS
// ==============================================================================

message LightSettings {
  LightType type = 1;
  common.CryoColor color = 2;
  float intensity = 3;
  float range = 4;                              // Maximum distance

  // Directional light
  DirectionalLightSettings directional = 10;

  // Point light
  PointLightSettings point = 11;

  // Spot light
  SpotLightSettings spot = 12;

  // Area light
  AreaLightSettings area = 13;

  // Shadows
  ShadowSettings shadows = 20;

  // Other
  bool enabled = 30;
  int32 culling_mask = 31;                      // Which layers to illuminate
  float indirect_multiplier = 32;               // Global illumination contribution

  enum LightType {
    DIRECTIONAL = 0;
    POINT = 1;
    SPOT = 2;
    AREA = 3;
  }
}

message DirectionalLightSettings {
  common.CryoVec3 direction = 1;
  bool use_cascaded_shadows = 2;
  int32 cascade_count = 3;
  repeated float cascade_splits = 4;            // Split distances
}

message PointLightSettings {
  float constant_attenuation = 1;
  float linear_attenuation = 2;
  float quadratic_attenuation = 3;
}

message SpotLightSettings {
  common.CryoVec3 direction = 1;
  float inner_cone_angle = 2;                   // Degrees
  float outer_cone_angle = 3;                   // Degrees
  float constant_attenuation = 4;
  float linear_attenuation = 5;
  float quadratic_attenuation = 6;
}

message AreaLightSettings {
  AreaLightShape shape = 1;
  common.CryoVec2 size = 2;                     // Width, height (for rectangle)
  float radius = 3;                             // For sphere/disc
  bool two_sided = 4;

  enum AreaLightShape {
    RECTANGLE = 0;
    DISC = 1;
    SPHERE = 2;
    TUBE = 3;
  }
}

message ShadowSettings {
  bool cast_shadows = 1;
  ShadowResolution resolution = 2;
  ShadowQuality quality = 3;
  float bias = 4;
  float normal_bias = 5;
  float near_plane = 6;
  int32 shadow_cascade_count = 7;
  float shadow_distance = 8;                    // Max shadow distance

  enum ShadowResolution {
    RESOLUTION_256 = 0;
    RESOLUTION_512 = 1;
    RESOLUTION_1024 = 2;
    RESOLUTION_2048 = 3;
    RESOLUTION_4096 = 4;
  }

  enum ShadowQuality {
    QUALITY_LOW = 0;
    QUALITY_MEDIUM = 1;
    QUALITY_HIGH = 2;
    QUALITY_VERY_HIGH = 3;
  }
}

// ==============================================================================
// AMBIENT LIGHTING
// ==============================================================================

message SetAmbientLightingCommand {
  AmbientLightSettings settings = 1;
}

message AmbientLightSettings {
  AmbientMode mode = 1;
  common.CryoColor ambient_color = 2;
  float ambient_intensity = 3;

  // Skybox
  string skybox_texture = 10;
  float skybox_exposure = 11;
  float skybox_rotation = 12;

  // Gradient (for simple gradient ambient)
  common.CryoColor sky_color = 20;
  common.CryoColor equator_color = 21;
  common.CryoColor ground_color = 22;

  enum AmbientMode {
    COLOR = 0;                                  // Flat color
    GRADIENT = 1;                               // Sky/equator/ground gradient
    SKYBOX = 2;                                 // Skybox texture
    REFLECTION_PROBE = 3;                       // From reflection probes
  }
}

message SetAmbientLightingResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// REFLECTION PROBES
// ==============================================================================

message CreateReflectionProbeCommand {
  string entity_id = 1;
  ReflectionProbeSettings settings = 2;
}

message ReflectionProbeSettings {
  ProbeType type = 1;
  common.CryoVec3 size = 2;                     // Bounding box size
  float intensity = 3;
  float blend_distance = 4;
  bool box_projection = 5;
  int32 resolution = 6;                         // Cubemap resolution
  bool use_hdr = 7;
  int32 importance = 8;                         // Priority when overlapping
  int32 culling_mask = 9;

  enum ProbeType {
    BAKED = 0;                                  // Pre-baked
    REALTIME = 1;                               // Update every frame
    CUSTOM = 2;                                 // Manual update
  }
}

message CreateReflectionProbeResponse {
  bool success = 1;
  string probe_id = 2;
  string error_message = 3;
}

message BakeReflectionProbeCommand {
  string probe_entity_id = 1;
}

message BakeReflectionProbeResponse {
  bool success = 1;
  string cubemap_uri = 2;
  string error_message = 3;
}

// ==============================================================================
// LIGHT PROBES
// ==============================================================================

message CreateLightProbeGroupCommand {
  string name = 1;
  repeated common.CryoVec3 probe_positions = 2;
}

message CreateLightProbeGroupResponse {
  bool success = 1;
  string probe_group_id = 2;
  string error_message = 3;
}

message BakeLightProbesCommand {
  string probe_group_id = 1;
  LightProbeBakeSettings settings = 2;
}

message LightProbeBakeSettings {
  int32 bounces = 1;                            // Number of light bounces
  int32 samples_per_probe = 2;
  float ray_length = 3;
  bool compress = 4;
}

message BakeLightProbesResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// GLOBAL ILLUMINATION
// ==============================================================================

message SetGlobalIlluminationCommand {
  GlobalIlluminationSettings settings = 1;
}

message GlobalIlluminationSettings {
  bool enabled = 1;
  GIMode mode = 2;
  float intensity = 3;
  int32 bounces = 4;
  bool use_screen_space = 5;

  enum GIMode {
    NONE = 0;
    BAKED = 1;                                  // Lightmaps
    REALTIME = 2;                               // Dynamic GI
    MIXED = 3;                                  // Combination
  }
}

message SetGlobalIlluminationResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// LIGHTMAPS
// ==============================================================================

message BakeLightmapsCommand {
  BakeLightmapSettings settings = 1;
  repeated string entity_ids = 2;               // Entities to bake (empty = all static)
}

message BakeLightmapSettings {
  int32 resolution = 1;                         // Texels per unit
  int32 samples = 2;                            // Samples per texel
  int32 bounces = 3;                            // Light bounces
  float padding = 4;                            // UV padding in pixels
  bool compress = 5;
  bool denoise = 6;
}

message BakeLightmapsResponse {
  bool success = 1;
  repeated string lightmap_uris = 2;
  string error_message = 3;
}

// ==============================================================================
// VOLUMETRIC LIGHTING
// ==============================================================================

message SetVolumetricLightingCommand {
  VolumetricLightingSettings settings = 1;
}

message VolumetricLightingSettings {
  bool enabled = 1;
  float density = 2;
  float scattering = 3;
  float anisotropy = 4;
  int32 sample_count = 5;
  float max_distance = 6;
  common.CryoColor tint = 7;
}

message SetVolumetricLightingResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// LIGHT COOKIES
// ==============================================================================

message SetLightCookieCommand {
  string light_entity_id = 1;
  string cookie_texture_uri = 2;
  float cookie_size = 3;
}

message SetLightCookieResponse {
  bool success = 1;
  string error_message = 2;
}
