// cryo_pickup.proto - Pickup command for agents
// Defines messages for agent item pickup and interaction
syntax = "proto3";

package cryo.agent.command;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";

// ==============================================================================
// PICKUP COMMAND
// ==============================================================================

message PickupCommand {
  string agent_id = 1;
  PickupTarget target = 2;
  PickupOptions options = 3;
}

message PickupTarget {
  oneof target {
    string entity_id = 1;                       // Specific entity to pick up
    string item_type = 2;                       // Any item of this type
    common.CryoVec3 position = 3;               // Nearest item at position
  }
  float search_radius = 10;                     // Search radius for items
}

message PickupOptions {
  string hand = 1;                              // "left", "right", "both", "auto"
  string attach_point = 2;                      // Bone/socket name
  bool auto_equip = 3;                          // Automatically equip item
  bool move_to_item = 4;                        // Move to item if not in range
  float interaction_range = 5;                  // Maximum pickup distance
  PickupAnimation animation = 6;
  bool add_to_inventory = 7;                    // Add to inventory instead of holding
}

message PickupAnimation {
  string animation_name = 1;
  float duration = 2;
  bool wait_for_animation = 3;
}

message PickupResponse {
  bool success = 1;
  string picked_entity_id = 2;
  PickupResult result = 3;
  string error_message = 4;

  enum PickupResult {
    PICKED_UP = 0;
    ADDED_TO_INVENTORY = 1;
    NO_SPACE = 2;
    OUT_OF_RANGE = 3;
    ITEM_NOT_FOUND = 4;
    ALREADY_HELD = 5;
  }
}

// ==============================================================================
// GRAB COMMAND
// ==============================================================================

message GrabCommand {
  string agent_id = 1;
  string entity_id = 2;
  GrabOptions options = 3;
}

message GrabOptions {
  string hand = 1;
  GrabType grab_type = 2;
  common.CryoVec3 grab_point = 3;               // Local grab point on object
  bool physics_based = 4;                       // Use physics for holding
  float grab_strength = 5;

  enum GrabType {
    RIGID = 0;                                  // Fixed attachment
    SPRING = 1;                                 // Spring-based (physics)
    IK = 2;                                     // IK-based hand posing
  }
}

message GrabResponse {
  bool success = 1;
  string grab_handle = 2;
  string error_message = 3;
}

message ReleaseGrabCommand {
  string grab_handle = 1;
  bool throw_object = 2;
  common.CryoVec3 throw_velocity = 3;
}

message ReleaseGrabResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// INVENTORY MANAGEMENT
// ==============================================================================

message AddToInventoryCommand {
  string agent_id = 1;
  string item_entity_id = 2;
  InventorySlot slot = 3;
  bool auto_stack = 4;
}

message InventorySlot {
  SlotType type = 1;
  int32 index = 2;                              // Slot index

  enum SlotType {
    BACKPACK = 0;
    HOTBAR = 1;
    EQUIPMENT = 2;
    QUICK_SLOT = 3;
  }
}

message AddToInventoryResponse {
  bool success = 1;
  InventorySlot assigned_slot = 2;
  string error_message = 3;
}

message RemoveFromInventoryCommand {
  string agent_id = 1;
  InventorySlot slot = 2;
  int32 quantity = 3;                           // For stackable items
}

message RemoveFromInventoryResponse {
  bool success = 1;
  string removed_entity_id = 2;
  string error_message = 3;
}

message GetInventoryCommand {
  string agent_id = 1;
}

message GetInventoryResponse {
  bool success = 1;
  repeated InventoryItem items = 2;
  int32 capacity = 3;
  string error_message = 4;
}

message InventoryItem {
  string entity_id = 1;
  string item_name = 2;
  string item_type = 3;
  int32 quantity = 4;
  InventorySlot slot = 5;
  map<string, string> properties = 6;
}

// ==============================================================================
// ITEM INTERACTION
// ==============================================================================

message UseItemCommand {
  string agent_id = 1;
  string item_entity_id = 2;
  UseOptions options = 3;
}

message UseOptions {
  string use_mode = 1;                          // "primary", "secondary", "throw"
  common.CryoVec3 target_position = 2;
  string target_entity_id = 3;
  map<string, string> parameters = 4;
}

message UseItemResponse {
  bool success = 1;
  UseResult result = 2;
  string error_message = 3;

  enum UseResult {
    USED = 0;
    CONSUMED = 1;
    ON_COOLDOWN = 2;
    INVALID_TARGET = 3;
    OUT_OF_CHARGES = 4;
  }
}

message EquipItemCommand {
  string agent_id = 1;
  string item_entity_id = 2;
  EquipSlot slot = 3;

  enum EquipSlot {
    MAIN_HAND = 0;
    OFF_HAND = 1;
    HEAD = 2;
    CHEST = 3;
    LEGS = 4;
    FEET = 5;
    ACCESSORY_1 = 6;
    ACCESSORY_2 = 7;
  }
}

message EquipItemResponse {
  bool success = 1;
  string unequipped_entity_id = 2;              // Previously equipped item
  string error_message = 3;
}

message UnequipItemCommand {
  string agent_id = 1;
  EquipItemCommand.EquipSlot slot = 2;
}

message UnequipItemResponse {
  bool success = 1;
  string unequipped_entity_id = 2;
  string error_message = 3;
}

// ==============================================================================
// ITEM QUERIES
// ==============================================================================

message GetHeldItemsCommand {
  string agent_id = 1;
}

message GetHeldItemsResponse {
  bool success = 1;
  string left_hand_item = 2;
  string right_hand_item = 3;
  map<string, string> equipped_items = 4;       // slot -> entity_id
  string error_message = 5;
}

message FindNearbyItemsCommand {
  string agent_id = 1;
  float search_radius = 2;
  ItemFilter filter = 3;
}

message ItemFilter {
  repeated string item_types = 1;
  repeated string tags = 2;
  bool pickupable_only = 3;
}

message FindNearbyItemsResponse {
  bool success = 1;
  repeated NearbyItem items = 2;
  string error_message = 3;
}

message NearbyItem {
  string entity_id = 1;
  string item_name = 2;
  string item_type = 3;
  common.CryoVec3 position = 4;
  float distance = 5;
}
