// scripting.proto
syntax = "proto3";

package scripting;

import "agent_commands.proto";

// Ein einfacher Script-Baustein
message ScriptAction {
  agent.AgentCommand command = 1;
}

message Condition {
  string expression = 1; // z.B. "entity.health < 50"
}

message IfBlock {
  Condition condition = 1;
  repeated ScriptAction then_actions = 2;
  repeated ScriptAction else_actions = 3;
}

message LoopBlock {
  int32 iterations = 1;
  repeated ScriptAction actions = 2;
}

message ScriptBlock {
  oneof block_type {
    ScriptAction action = 1;
    IfBlock if_block = 2;
    LoopBlock loop_block = 3;
  }
}

message Script {
  repeated ScriptBlock blocks = 1;
}