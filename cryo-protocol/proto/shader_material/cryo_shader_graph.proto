// cryo_shader_graph.proto - Shader graph system with semantic operations
// Defines shader graphs, layers, nodes, and semantic command groups
syntax = "proto3";

package cryo.shader.graph;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "shader_material/cryo_asset_shader.proto";

// ============================================================================
// SHADER GRAPH (Complete shader graph with layers)
// ============================================================================

message ShaderGraph {
  string graph_id = 1;
  string name = 2;

  // Layered structure for modular shader composition
  repeated ShaderLayer layers = 10;

  // Graph-level properties
  map<string, ShaderPropertyValue> global_properties = 20;

  // Version info
  string version = 30;
  int64 version_number = 31;

  // Metadata
  string description = 40;
  repeated string tags = 41;
  map<string, string> metadata = 42;
}

// ============================================================================
// SHADER LAYER (Named modular shader component)
// ============================================================================

message ShaderLayer {
  string layer_id = 1;
  string layer_name = 2;  // e.g., "lighting", "fog", "rimlight", "shadows"

  // Layer content
  oneof content {
    ShaderNodeGraph node_graph = 10;
    ShaderLayerReference layer_ref = 11;  // Reference to reusable layer
  }

  // Layer properties
  float opacity = 20;     // Layer blend weight (0.0 to 1.0)
  bool enabled = 21;
  int32 priority = 22;    // Execution order

  // Blend mode with other layers
  LayerBlendMode blend_mode = 30;

  // Layer-specific uniforms
  map<string, ShaderPropertyValue> properties = 40;

  enum LayerBlendMode {
    REPLACE = 0;      // Replace previous layers
    ADD = 1;          // Additive blend
    MULTIPLY = 2;     // Multiplicative blend
    OVERLAY = 3;      // Overlay blend
    SCREEN = 4;       // Screen blend
    CUSTOM = 10;      // Custom blend function
  }
}

message ShaderLayerReference {
  string layer_uri = 1;           // URI to reusable layer asset
  map<string, ShaderPropertyValue> overrides = 2;
}

// ============================================================================
// SHADER NODE GRAPH (Nodes and connections within a layer)
// ============================================================================

message ShaderNodeGraph {
  repeated ShaderNode nodes = 1;
  repeated ShaderConnection connections = 2;

  // Graph metadata
  ShaderNode input_node = 10;    // Graph input
  ShaderNode output_node = 11;   // Graph output
}

message ShaderNode {
  string node_id = 1;
  string node_type = 2;  // e.g., "float", "texture_sample", "multiply", "add"

  // Node inputs
  map<string, ShaderNodeInput> inputs = 10;

  // Node parameters
  map<string, ShaderPropertyValue> parameters = 20;

  // Visual position (for editor)
  common.CryoVec2 position = 30;

  // Node metadata
  string label = 40;
  string comment = 41;
}

message ShaderNodeInput {
  string input_name = 1;

  oneof source {
    ShaderConnection connection = 10;  // Input from another node
    ShaderPropertyValue default_value = 11;  // Default constant value
  }
}

message ShaderConnection {
  string from_node_id = 1;
  string from_output = 2;
  string to_node_id = 3;
  string to_input = 4;
}

message ShaderPropertyValue {
  oneof value {
    float float_value = 1;
    int32 int_value = 2;
    bool bool_value = 3;
    common.CryoVec2 vec2_value = 4;
    common.CryoVec3 vec3_value = 5;
    common.CryoVec4 vec4_value = 6;
    common.CryoColor color_value = 7;
    string texture_uri = 8;
  }
}

// ============================================================================
// SHADER UPDATE GROUP (Semantic command bundling)
// ============================================================================

message ShaderUpdateGroup {
  string update_id = 1;

  // Semantic purpose of this update group
  string purpose = 2;  // e.g., "switch_to_night", "activate_cel_shading", "apply_fog"

  // Bundled commands
  repeated ShaderCommand commands = 10;

  // Execution mode
  ExecutionMode mode = 20;

  // Transition settings
  optional TransitionSettings transition = 30;

  enum ExecutionMode {
    SEQUENTIAL = 0;   // Execute commands in order
    PARALLEL = 1;     // Execute all at once
    ATOMIC = 2;       // All or nothing
  }
}

message ShaderCommand {
  oneof command {
    // Node operations
    AddNodeCommand add_node = 10;
    RemoveNodeCommand remove_node = 11;
    UpdateNodeCommand update_node = 12;

    // Connection operations
    ConnectNodesCommand connect = 20;
    DisconnectNodesCommand disconnect = 21;

    // Layer operations
    AddLayerCommand add_layer = 30;
    RemoveLayerCommand remove_layer = 31;
    UpdateLayerCommand update_layer = 32;
    ReplaceLayerCommand replace_layer = 33;

    // Property operations
    SetUniformCommand set_uniform = 40;
    SetTextureCommand set_texture = 41;

    // Graph operations
    ReplaceGraphCommand replace_graph = 50;
  }
}

// ============================================================================
// NODE OPERATIONS
// ============================================================================

message AddNodeCommand {
  string layer_id = 1;
  ShaderNode node = 2;
}

message RemoveNodeCommand {
  string layer_id = 1;
  string node_id = 2;
}

message UpdateNodeCommand {
  string layer_id = 1;
  string node_id = 2;
  map<string, ShaderPropertyValue> updated_parameters = 3;
}

message ConnectNodesCommand {
  string layer_id = 1;
  ShaderConnection connection = 2;
}

message DisconnectNodesCommand {
  string layer_id = 1;
  string from_node_id = 2;
  string from_output = 3;
  string to_node_id = 4;
  string to_input = 5;
}

// ============================================================================
// LAYER OPERATIONS
// ============================================================================

message AddLayerCommand {
  string graph_id = 1;
  ShaderLayer layer = 2;
  optional int32 insert_at_index = 3;  // Insert position
}

message RemoveLayerCommand {
  string graph_id = 1;
  string layer_id = 2;
}

message UpdateLayerCommand {
  string graph_id = 1;
  string layer_id = 2;

  optional float opacity = 10;
  optional bool enabled = 11;
  optional int32 priority = 12;
  optional ShaderLayer.LayerBlendMode blend_mode = 13;

  map<string, ShaderPropertyValue> updated_properties = 20;
}

message ReplaceLayerCommand {
  string graph_id = 1;
  string old_layer_id = 2;
  ShaderLayer new_layer = 3;
}

// ============================================================================
// PROPERTY OPERATIONS
// ============================================================================

message SetUniformCommand {
  string target = 1;  // graph_id or layer_id
  string uniform_name = 2;
  ShaderPropertyValue value = 3;
}

message SetTextureCommand {
  string target = 1;
  string texture_slot = 2;
  string texture_uri = 3;
}

// ============================================================================
// GRAPH OPERATIONS
// ============================================================================

message ReplaceGraphCommand {
  string graph_id = 1;
  ShaderGraph new_graph = 2;
}

// ============================================================================
// SHADER STATE (Current state of a shader graph)
// ============================================================================

message ShaderState {
  string graph_id = 1;
  string version = 2;
  int64 version_number = 3;
  int64 timestamp_ms = 4;

  // Current graph
  ShaderGraph current_graph = 10;

  // Active properties
  map<string, ShaderPropertyValue> active_properties = 20;

  // Layer states
  repeated LayerState layer_states = 30;
}

message LayerState {
  string layer_id = 1;
  bool enabled = 2;
  float opacity = 3;
  map<string, ShaderPropertyValue> properties = 4;
}

// ============================================================================
// SHADER STATE TRANSITION (Versioning and change tracking)
// ============================================================================

message ShaderStateTransition {
  string transition_id = 1;

  // Version info
  string from_version = 10;
  string to_version = 11;
  int64 from_version_number = 12;
  int64 to_version_number = 13;

  // State delta
  ShaderUpdateGroup delta = 20;

  // Transition metadata
  string description = 30;
  int64 timestamp_ms = 31;
  string author = 32;

  // Reversibility
  optional ShaderUpdateGroup reverse_delta = 40;  // To undo
}

message TransitionSettings {
  float duration_seconds = 1;
  TransitionCurve curve = 2;

  enum TransitionCurve {
    LINEAR = 0;
    EASE_IN = 1;
    EASE_OUT = 2;
    EASE_IN_OUT = 3;
    SMOOTH = 4;
  }
}

// ============================================================================
// SEMANTIC SHADER OPERATIONS (High-level)
// ============================================================================

message ApplyFog {
  string graph_id = 1;
  common.CryoColor fog_color = 2;
  float fog_density = 3;
  FogMode mode = 4;

  enum FogMode {
    LINEAR = 0;
    EXPONENTIAL = 1;
    EXPONENTIAL_SQUARED = 2;
  }
}

message SwitchToNightMode {
  string graph_id = 1;
  float light_intensity = 2;  // e.g., 0.2
  string skybox_uri = 3;      // "night_sky"
  common.CryoColor ambient_color = 4;
}

message EnableRimLight {
  string graph_id = 1;
  common.CryoColor rim_color = 2;
  float rim_power = 3;
  float rim_intensity = 4;
}

message ActivateCelShading {
  string graph_id = 1;
  int32 shade_levels = 2;  // Number of discrete shading levels
  float outline_thickness = 3;
  common.CryoColor outline_color = 4;
}

message ApplyDissolveEffect {
  string graph_id = 1;
  string dissolve_texture_uri = 2;
  float dissolve_amount = 3;  // 0.0 to 1.0
  common.CryoColor burn_color = 4;
  float burn_size = 5;
}

message ResetMaterialDefaults {
  string graph_id = 1;
  bool clear_all_uniforms = 2;
  bool restore_default_layers = 3;
}

// ============================================================================
// SEMANTIC OPERATION COMMAND
// ============================================================================

message SemanticShaderCommand {
  string command_id = 1;

  oneof operation {
    ApplyFog apply_fog = 10;
    SwitchToNightMode switch_to_night = 11;
    EnableRimLight enable_rim_light = 12;
    ActivateCelShading activate_cel_shading = 13;
    ApplyDissolveEffect apply_dissolve = 14;
    ResetMaterialDefaults reset_defaults = 15;

    // Generic semantic command
    CustomSemanticCommand custom = 100;
  }
}

message CustomSemanticCommand {
  string operation_name = 1;  // e.g., "enable_hologram", "apply_damage_flash"
  map<string, ShaderPropertyValue> parameters = 2;
}

// ============================================================================
// SHADER GRAPH SERVICE (gRPC service definition)
// ============================================================================

message ApplyShaderChangeRequest {
  ShaderUpdateGroup update = 1;
}

message ApplyShaderChangeResponse {
  bool success = 1;
  ShaderState new_state = 2;
  string error_message = 3;
}

message ReplaceShaderLayerRequest {
  string graph_id = 1;
  string layer_id = 2;
  ShaderLayer new_layer = 3;
}

message GetShaderStateRequest {
  string graph_id = 1;
}

message GetShaderStateResponse {
  bool success = 1;
  ShaderState state = 2;
  string error_message = 3;
}

message ApplySemanticOperationRequest {
  SemanticShaderCommand command = 1;
}

message ApplySemanticOperationResponse {
  bool success = 1;
  ShaderUpdateGroup generated_commands = 2;  // Low-level commands generated
  ShaderState new_state = 3;
  string error_message = 4;
}

message GetShaderVersionHistoryRequest {
  string graph_id = 1;
  int32 max_versions = 2;  // 0 = all versions
}

message GetShaderVersionHistoryResponse {
  bool success = 1;
  repeated ShaderStateTransition transitions = 2;
  string error_message = 3;
}

message RevertShaderToVersionRequest {
  string graph_id = 1;
  oneof version {
    string version_name = 2;
    int64 version_number = 3;
  }
}

message RevertShaderToVersionResponse {
  bool success = 1;
  ShaderState reverted_state = 2;
  string error_message = 3;
}

// ============================================================================
// SHADER PRESETS (Predefined shader configurations)
// ============================================================================

message ShaderPreset {
  string preset_id = 1;
  string name = 2;  // e.g., "Metallic", "Glass", "Hologram", "Toon"
  string description = 3;

  // Preset content
  ShaderGraph graph = 10;

  // Quick apply commands
  repeated SemanticShaderCommand quick_apply = 20;

  // Preview
  string preview_image_uri = 30;

  // Tags for categorization
  repeated string tags = 40;
}

message ApplyShaderPresetRequest {
  string graph_id = 1;
  string preset_id = 2;
  map<string, ShaderPropertyValue> overrides = 3;
}

message ApplyShaderPresetResponse {
  bool success = 1;
  ShaderState new_state = 2;
  string error_message = 3;
}

// ============================================================================
// SHADER VARIANT SYSTEM
// ============================================================================

message ShaderVariant {
  string variant_id = 1;
  string name = 2;

  // Variant configuration
  repeated string keywords = 10;  // Active shader keywords
  map<string, bool> defines = 11;  // Preprocessor defines

  // Layer configuration for this variant
  repeated string active_layer_ids = 20;
  repeated string disabled_layer_ids = 21;

  // Variant-specific properties
  map<string, ShaderPropertyValue> properties = 30;
}

message SwitchShaderVariantRequest {
  string graph_id = 1;
  string variant_id = 2;
}

message SwitchShaderVariantResponse {
  bool success = 1;
  ShaderState new_state = 2;
  string error_message = 3;
}

// ============================================================================
// SHADER CACHING & OPTIMIZATION
// ============================================================================

message ShaderCacheKey {
  string graph_id = 1;
  string version = 2;
  repeated string active_layers = 3;
  repeated string keywords = 4;
  string platform = 5;  // e.g., "vulkan", "d3d12", "metal"
}

message CachedShaderData {
  ShaderCacheKey key = 1;
  bytes compiled_bytecode = 2;
  int64 cache_timestamp_ms = 3;
  uint64 hash = 4;
}

message OptimizeShaderGraphRequest {
  string graph_id = 1;

  // Optimization flags
  bool merge_layers = 10;
  bool remove_unused_nodes = 11;
  bool simplify_expressions = 12;
  bool optimize_uniforms = 13;
}

message OptimizeShaderGraphResponse {
  bool success = 1;
  ShaderGraph optimized_graph = 2;
  OptimizationStats stats = 3;
  string error_message = 4;
}

message OptimizationStats {
  int32 original_node_count = 1;
  int32 optimized_node_count = 2;
  int32 original_layer_count = 3;
  int32 optimized_layer_count = 4;
  float size_reduction_percent = 5;
}
