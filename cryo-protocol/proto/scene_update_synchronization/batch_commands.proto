// batch_commands.proto - Batch command execution
// Defines messages for executing multiple commands as a single transaction
syntax = "proto3";

package cryo.scene.batch;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "google/protobuf/any.proto";

// ==============================================================================
// BATCH COMMAND
// ==============================================================================

message BatchCommandRequest {
  repeated Command commands = 1;
  BatchOptions options = 2;
}

message Command {
  string command_id = 1;                        // Optional ID for tracking
  string command_type = 2;                      // Command type name
  google.protobuf.Any command_data = 3;         // Actual command message
  repeated string dependencies = 4;             // IDs of commands that must complete first
}

message BatchOptions {
  ExecutionMode mode = 1;
  bool stop_on_error = 2;                       // Stop batch if any command fails
  bool atomic = 3;                              // All-or-nothing (rollback on failure)
  int32 timeout_ms = 4;                         // Maximum execution time
  bool parallel = 5;                            // Execute independent commands in parallel

  enum ExecutionMode {
    SEQUENTIAL = 0;                             // Execute one by one
    PARALLEL_WHERE_POSSIBLE = 1;                // Execute independent commands in parallel
    FULLY_PARALLEL = 2;                         // Execute all at once (no dependencies)
  }
}

message BatchCommandResponse {
  bool success = 1;
  repeated CommandResult results = 2;
  int32 successful_count = 3;
  int32 failed_count = 4;
  int32 skipped_count = 5;
  float execution_time_ms = 6;
  string error_message = 7;
}

message CommandResult {
  string command_id = 1;
  bool success = 2;
  google.protobuf.Any result_data = 3;          // Actual response message
  string error_message = 4;
  float execution_time_ms = 5;
}

// ==============================================================================
// TRANSACTION
// ==============================================================================

message BeginTransactionCommand {
  string transaction_name = 1;
  TransactionIsolation isolation = 2;

  enum TransactionIsolation {
    READ_UNCOMMITTED = 0;
    READ_COMMITTED = 1;
    REPEATABLE_READ = 2;
    SERIALIZABLE = 3;
  }
}

message BeginTransactionResponse {
  bool success = 1;
  string transaction_id = 2;
  string error_message = 3;
}

message CommitTransactionCommand {
  string transaction_id = 1;
}

message CommitTransactionResponse {
  bool success = 1;
  string error_message = 2;
}

message RollbackTransactionCommand {
  string transaction_id = 1;
}

message RollbackTransactionResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// COMMAND QUEUE
// ==============================================================================

message QueueCommandRequest {
  Command command = 1;
  QueueOptions options = 2;
}

message QueueOptions {
  QueuePriority priority = 1;
  float delay_seconds = 2;                      // Delay before execution
  bool cancel_duplicates = 3;                   // Cancel identical commands in queue

  enum QueuePriority {
    LOW = 0;
    NORMAL = 1;
    HIGH = 2;
    IMMEDIATE = 3;
  }
}

message QueueCommandResponse {
  bool success = 1;
  string queue_handle = 2;
  int32 queue_position = 3;
  string error_message = 4;
}

message CancelQueuedCommandRequest {
  string queue_handle = 1;
}

message CancelQueuedCommandResponse {
  bool success = 1;
  bool was_cancelled = 2;                       // False if already executed
  string error_message = 3;
}

message GetQueueStatusRequest {}

message GetQueueStatusResponse {
  bool success = 1;
  int32 pending_count = 2;
  int32 executing_count = 3;
  repeated QueuedCommandInfo commands = 4;
}

message QueuedCommandInfo {
  string queue_handle = 1;
  string command_type = 2;
  QueueOptions.QueuePriority priority = 3;
  float time_in_queue_seconds = 4;
  CommandStatus status = 5;

  enum CommandStatus {
    QUEUED = 0;
    EXECUTING = 1;
    COMPLETED = 2;
    FAILED = 3;
    CANCELLED = 4;
  }
}

// ==============================================================================
// COMMAND HISTORY
// ==============================================================================

message GetCommandHistoryRequest {
  int32 max_count = 1;                          // 0 = all
  string filter_command_type = 2;
  string filter_entity_id = 3;
}

message GetCommandHistoryResponse {
  bool success = 1;
  repeated HistoryEntry entries = 2;
  string error_message = 3;
}

message HistoryEntry {
  uint64 entry_id = 1;
  string command_type = 2;
  google.protobuf.Any command_data = 3;
  google.protobuf.Any result_data = 4;
  bool success = 5;
  float execution_time_ms = 6;
  string timestamp = 7;
}

// ==============================================================================
// UNDO/REDO
// ==============================================================================

message UndoCommand {
  int32 count = 1;                              // Number of commands to undo
}

message UndoResponse {
  bool success = 1;
  int32 undone_count = 2;
  string error_message = 3;
}

message RedoCommand {
  int32 count = 1;                              // Number of commands to redo
}

message RedoResponse {
  bool success = 1;
  int32 redone_count = 2;
  string error_message = 3;
}

message GetUndoStackRequest {}

message GetUndoStackResponse {
  bool success = 1;
  repeated string undo_commands = 2;            // Command descriptions
  repeated string redo_commands = 3;
  int32 undo_position = 4;
}

// ==============================================================================
// COMMAND GROUPS
// ==============================================================================

message BeginCommandGroupCommand {
  string group_name = 1;
  bool collapse_undo = 2;                       // Treat as single undo/redo operation
}

message BeginCommandGroupResponse {
  bool success = 1;
  string group_id = 2;
  string error_message = 3;
}

message EndCommandGroupCommand {
  string group_id = 1;
}

message EndCommandGroupResponse {
  bool success = 1;
  int32 command_count = 2;
  string error_message = 3;
}

// ==============================================================================
// MACRO COMMANDS
// ==============================================================================

message RecordMacroCommand {
  string macro_name = 1;
}

message RecordMacroResponse {
  bool success = 1;
  string macro_id = 2;
  string error_message = 3;
}

message StopRecordingMacroCommand {
  string macro_id = 1;
}

message StopRecordingMacroResponse {
  bool success = 1;
  int32 command_count = 2;
  string error_message = 3;
}

message PlayMacroCommand {
  string macro_id = 1;
  int32 repeat_count = 2;                       // 0 = play once, -1 = loop forever
}

message PlayMacroResponse {
  bool success = 1;
  string error_message = 2;
}

message SaveMacroCommand {
  string macro_id = 1;
  string file_path = 2;
}

message SaveMacroResponse {
  bool success = 1;
  string error_message = 2;
}

message LoadMacroCommand {
  string file_path = 1;
}

message LoadMacroResponse {
  bool success = 1;
  string macro_id = 2;
  string macro_name = 3;
  string error_message = 4;
}

// ==============================================================================
// DEFERRED COMMANDS
// ==============================================================================

message ScheduleCommandRequest {
  Command command = 1;
  ScheduleOptions options = 2;
}

message ScheduleOptions {
  oneof schedule_type {
    float delay_seconds = 1;
    string cron_expression = 2;                 // Cron-style scheduling
    FrameSchedule frame_schedule = 3;
  }
  int32 repeat_count = 10;                      // 0 = once, -1 = infinite
  float repeat_interval = 11;
}

message FrameSchedule {
  int32 frame_offset = 1;                       // Execute after N frames
  bool every_n_frames = 2;                      // Repeat every N frames
}

message ScheduleCommandResponse {
  bool success = 1;
  string schedule_handle = 2;
  string error_message = 3;
}

message CancelScheduledCommandRequest {
  string schedule_handle = 1;
}

message CancelScheduledCommandResponse {
  bool success = 1;
  string error_message = 2;
}
