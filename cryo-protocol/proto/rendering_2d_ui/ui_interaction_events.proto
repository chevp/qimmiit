// ui_interaction_events.proto - UI interaction event system
// Events for hover, click, focus, and other user interactions
syntax = "proto3";

package cryo.ui;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================
//
// UI INTERACTION EVENTS
//
// Complete event system for UI interactions with client-side prediction support:
//   - Hover events (enter, leave, move)
//   - Click events (down, up, click, double-click)
//   - Focus events (gained, lost)
//   - Drag events (start, move, end)
//   - Touch events (for mobile)
//
// ==============================================================================

import "cryo_common.proto";
import "rendering_2d_ui/ui_base.proto";

// ============================================================================
// INTERACTION EVENT (Base)
// ============================================================================

message UIInteractionEvent {
  string event_id = 1;
  int64 timestamp_ms = 2;
  string element_id = 3;

  oneof event_type {
    // Hover events
    HoverEnterEvent hover_enter = 10;
    HoverLeaveEvent hover_leave = 11;
    HoverMoveEvent hover_move = 12;

    // Click events
    PointerDownEvent pointer_down = 20;
    PointerUpEvent pointer_up = 21;
    ClickEvent click = 22;
    DoubleClickEvent double_click = 23;

    // Focus events
    FocusGainedEvent focus_gained = 30;
    FocusLostEvent focus_lost = 31;

    // Drag events
    DragStartEvent drag_start = 40;
    DragMoveEvent drag_move = 41;
    DragEndEvent drag_end = 42;
    DropEvent drop = 43;

    // Value change events
    ValueChangedEvent value_changed = 50;
    TextInputEvent text_input = 51;

    // Keyboard events
    KeyDownEvent key_down = 60;
    KeyUpEvent key_up = 61;

    // Touch events
    TouchStartEvent touch_start = 70;
    TouchMoveEvent touch_move = 71;
    TouchEndEvent touch_end = 72;

    // Scroll events
    ScrollEvent scroll = 80;

    // Resize events
    ResizeEvent resize = 90;
  }

  // Event propagation
  bool bubbles = 100;
  bool cancelable = 101;
  bool cancelled = 102;
  bool stop_propagation = 103;

  // Client-side prediction
  bool is_predicted = 110;
  bool needs_server_confirmation = 111;
}

// ============================================================================
// HOVER EVENTS
// ============================================================================

message HoverEnterEvent {
  cryo.common.CryoVec2 position = 1;
  cryo.common.CryoVec2 previous_position = 2;
  string from_element_id = 3;  // Element that was previously hovered
}

message HoverLeaveEvent {
  cryo.common.CryoVec2 position = 1;
  string to_element_id = 2;  // Element that is now hovered
  float hover_duration = 3;  // How long was hovered
}

message HoverMoveEvent {
  cryo.common.CryoVec2 position = 1;
  cryo.common.CryoVec2 delta = 2;
  float hover_duration = 3;
}

// ============================================================================
// CLICK EVENTS
// ============================================================================

message PointerDownEvent {
  cryo.common.CryoVec2 position = 1;
  int32 button = 2;  // 0 = left, 1 = middle, 2 = right
  int32 modifier_keys = 3;  // Bitfield: 1=Ctrl, 2=Shift, 4=Alt, 8=Meta
}

message PointerUpEvent {
  cryo.common.CryoVec2 position = 1;
  int32 button = 2;
  cryo.common.CryoVec2 down_position = 3;  // Where pointer was pressed
  float hold_duration = 4;  // How long was held
}

message ClickEvent {
  cryo.common.CryoVec2 position = 1;
  int32 button = 2;
  int32 click_count = 3;  // For multi-click detection
}

message DoubleClickEvent {
  cryo.common.CryoVec2 position = 1;
  int32 button = 2;
  float time_between_clicks = 3;
}

// ============================================================================
// FOCUS EVENTS
// ============================================================================

message FocusGainedEvent {
  string previous_focused_id = 1;
  enum FocusSource {
    MOUSE = 0;
    KEYBOARD = 1;
    TOUCH = 2;
    PROGRAMMATIC = 3;
  }
  FocusSource source = 2;
}

message FocusLostEvent {
  string next_focused_id = 1;
  enum FocusLossReason {
    USER_ACTION = 0;
    ELEMENT_DISABLED = 1;
    ELEMENT_HIDDEN = 2;
    PROGRAMMATIC = 3;
  }
  FocusLossReason reason = 2;
}

// ============================================================================
// DRAG EVENTS
// ============================================================================

message DragStartEvent {
  cryo.common.CryoVec2 start_position = 1;
  int32 button = 2;

  // Drag data
  oneof drag_data {
    string text_data = 10;
    bytes binary_data = 11;
    string json_data = 12;
  }
}

message DragMoveEvent {
  cryo.common.CryoVec2 current_position = 1;
  cryo.common.CryoVec2 start_position = 2;
  cryo.common.CryoVec2 delta = 3;
  float distance = 4;

  // Current drop target
  string current_drop_target_id = 10;
  bool drop_allowed = 11;
}

message DragEndEvent {
  cryo.common.CryoVec2 end_position = 1;
  cryo.common.CryoVec2 start_position = 2;
  cryo.common.CryoVec2 total_delta = 3;
  float total_distance = 4;
  float duration = 5;

  bool was_dropped = 10;
  string drop_target_id = 11;
}

message DropEvent {
  cryo.common.CryoVec2 drop_position = 1;
  string dragged_element_id = 2;

  // Drag data
  oneof drag_data {
    string text_data = 10;
    bytes binary_data = 11;
    string json_data = 12;
  }
}

// ============================================================================
// VALUE CHANGE EVENTS
// ============================================================================

message ValueChangedEvent {
  oneof old_value {
    string string_value = 1;
    float float_value = 2;
    int32 int_value = 3;
    bool bool_value = 4;
  }

  oneof new_value {
    string new_string_value = 10;
    float new_float_value = 11;
    int32 new_int_value = 12;
    bool new_bool_value = 13;
  }

  enum ChangeSource {
    USER_INPUT = 0;
    PROGRAMMATIC = 1;
    ANIMATION = 2;
    SERVER_UPDATE = 3;
  }
  ChangeSource source = 20;
}

message TextInputEvent {
  string text = 1;
  int32 cursor_position = 2;
  int32 selection_start = 3;
  int32 selection_end = 4;

  enum InputType {
    INSERT = 0;
    DELETE = 1;
    REPLACE = 2;
    PASTE = 3;
  }
  InputType input_type = 10;
}

// ============================================================================
// KEYBOARD EVENTS
// ============================================================================

message KeyDownEvent {
  string key = 1;        // Key name (e.g., "a", "Enter", "Escape")
  int32 key_code = 2;    // Numeric key code
  int32 modifier_keys = 3;  // Bitfield: 1=Ctrl, 2=Shift, 4=Alt, 8=Meta
  bool repeat = 4;       // Is this a repeated key event
}

message KeyUpEvent {
  string key = 1;
  int32 key_code = 2;
  int32 modifier_keys = 3;
  float key_down_duration = 4;
}

// ============================================================================
// TOUCH EVENTS (for mobile/tablet)
// ============================================================================

message TouchStartEvent {
  repeated TouchPoint touches = 1;
  int32 touch_count = 2;
}

message TouchMoveEvent {
  repeated TouchPoint touches = 1;
  repeated TouchPoint changed_touches = 2;
}

message TouchEndEvent {
  repeated TouchPoint touches = 1;
  repeated TouchPoint changed_touches = 2;
  float gesture_duration = 3;
}

message TouchPoint {
  int32 touch_id = 1;
  cryo.common.CryoVec2 position = 2;
  float radius = 3;
  float force = 4;
}

// ============================================================================
// SCROLL EVENTS
// ============================================================================

message ScrollEvent {
  cryo.common.CryoVec2 scroll_position = 1;
  cryo.common.CryoVec2 scroll_delta = 2;
  cryo.common.CryoVec2 scroll_velocity = 3;

  enum ScrollSource {
    MOUSE_WHEEL = 0;
    SCROLLBAR = 1;
    TOUCH = 2;
    PROGRAMMATIC = 3;
  }
  ScrollSource source = 10;

  bool at_top = 20;
  bool at_bottom = 21;
  bool at_left = 22;
  bool at_right = 23;
}

// ============================================================================
// RESIZE EVENTS
// ============================================================================

message ResizeEvent {
  cryo.common.CryoVec2 old_size = 1;
  cryo.common.CryoVec2 new_size = 2;
  cryo.common.CryoVec2 size_delta = 3;

  enum ResizeHandle {
    NONE = 0;
    TOP = 1;
    BOTTOM = 2;
    LEFT = 3;
    RIGHT = 4;
    TOP_LEFT = 5;
    TOP_RIGHT = 6;
    BOTTOM_LEFT = 7;
    BOTTOM_RIGHT = 8;
  }
  ResizeHandle handle = 10;
}

// ============================================================================
// EVENT HANDLER
// ============================================================================

message UIEventHandler {
  string handler_id = 1;
  string element_id = 2;

  // Event types this handler listens to
  repeated string event_types = 3;

  // Handler action
  oneof action {
    string script = 10;           // Script to execute
    string command_id = 11;       // Command to execute
    string function_name = 12;    // Native function to call
  }

  // Handler options
  bool capture_phase = 20;     // Handle in capture phase (before target)
  int32 priority = 21;         // Higher priority handlers run first
  bool once = 22;              // Remove handler after first execution
}

// ============================================================================
// EVENT BATCH (for efficient transmission)
// ============================================================================

message UIEventBatch {
  string batch_id = 1;
  int64 batch_timestamp_ms = 2;
  repeated UIInteractionEvent events = 3;

  // Batch options
  bool compressed = 10;
  int32 event_count = 11;
}

// ============================================================================
// CLIENT-SIDE EVENT PREDICTION
// ============================================================================

message PredictedInteraction {
  string prediction_id = 1;
  UIInteractionEvent predicted_event = 2;
  int64 client_timestamp_ms = 3;

  // Predicted state change
  UIInteractionState predicted_state = 10;

  enum PredictionConfidence {
    LOW = 0;      // 0-33%
    MEDIUM = 1;   // 34-66%
    HIGH = 2;     // 67-100%
  }
  PredictionConfidence confidence = 20;

  // Has server confirmed?
  bool confirmed = 30;
  int64 confirmation_timestamp_ms = 31;
}

// ============================================================================
// EVENT RESPONSE (from server)
// ============================================================================

message UIEventResponse {
  string event_id = 1;

  enum ResponseType {
    ACKNOWLEDGED = 0;      // Event received, no action
    STATE_CHANGED = 1;     // Event caused state change
    COMMAND_QUEUED = 2;    // Event queued a command
    REJECTED = 3;          // Event was rejected (invalid)
  }
  ResponseType response_type = 2;

  // State changes caused by this event
  repeated cryo.ui.UIElementState state_changes = 10;

  // Commands triggered by this event
  repeated string triggered_command_ids = 20;

  // Rejection reason
  string rejection_reason = 30;
}

// ============================================================================
// INTERACTION FEEDBACK
// ============================================================================

message InteractionFeedback {
  string element_id = 1;
  string feedback_type = 2;  // "hover", "click", "focus", "error"

  // Visual feedback
  oneof visual_feedback {
    ColorFeedback color = 10;
    AnimationFeedback animation = 11;
    SoundFeedback sound = 12;
    HapticFeedback haptic = 13;
  }

  // Feedback timing
  float delay_ms = 20;
  float duration_ms = 21;
}

message ColorFeedback {
  cryo.common.CryoColor from_color = 1;
  cryo.common.CryoColor to_color = 2;
  string property = 3;  // "background", "border", "text"
}

message AnimationFeedback {
  string animation_name = 1;
  float duration = 2;
  string easing = 3;
}

message SoundFeedback {
  string sound_id = 1;
  float volume = 2;
}

message HapticFeedback {
  enum HapticType {
    LIGHT = 0;
    MEDIUM = 1;
    HEAVY = 2;
    SELECTION = 3;
    SUCCESS = 4;
    WARNING = 5;
    ERROR = 6;
  }
  HapticType type = 1;
  float intensity = 2;  // 0.0 to 1.0
}