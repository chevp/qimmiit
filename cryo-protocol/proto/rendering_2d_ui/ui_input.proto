// ui_input.proto - Input handling and mappings
// Keyboard, mouse, gamepad, and touch input for UI
syntax = "proto3";

package cryo.ui;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";

// ============================================================================
// INPUT DEVICE TYPES
// ============================================================================

enum UIInputDevice {
  KEYBOARD = 0;
  MOUSE = 1;
  GAMEPAD = 2;
  TOUCH = 3;
  STYLUS = 4;
  VR_CONTROLLER = 5;
}

// ============================================================================
// KEYBOARD INPUT
// ============================================================================

enum UIKeyCode {
  KEY_NONE = 0;

  // Letters (A-Z)
  KEY_A = 1;
  KEY_B = 2;
  KEY_C = 3;
  KEY_D = 4;
  KEY_E = 5;
  KEY_F = 6;
  KEY_G = 7;
  KEY_H = 8;
  KEY_I = 9;
  KEY_J = 10;
  KEY_K = 11;
  KEY_L = 12;
  KEY_M = 13;
  KEY_N = 14;
  KEY_O = 15;
  KEY_P = 16;
  KEY_Q = 17;
  KEY_R = 18;
  KEY_S = 19;
  KEY_T = 20;
  KEY_U = 21;
  KEY_V = 22;
  KEY_W = 23;
  KEY_X = 24;
  KEY_Y = 25;
  KEY_Z = 26;

  // Numbers (0-9)
  KEY_0 = 27;
  KEY_1 = 28;
  KEY_2 = 29;
  KEY_3 = 30;
  KEY_4 = 31;
  KEY_5 = 32;
  KEY_6 = 33;
  KEY_7 = 34;
  KEY_8 = 35;
  KEY_9 = 36;

  // Function keys (F1-F12)
  KEY_F1 = 37;
  KEY_F2 = 38;
  KEY_F3 = 39;
  KEY_F4 = 40;
  KEY_F5 = 41;
  KEY_F6 = 42;
  KEY_F7 = 43;
  KEY_F8 = 44;
  KEY_F9 = 45;
  KEY_F10 = 46;
  KEY_F11 = 47;
  KEY_F12 = 48;

  // Special keys
  KEY_ESCAPE = 49;
  KEY_ENTER = 50;
  KEY_TAB = 51;
  KEY_BACKSPACE = 52;
  KEY_DELETE = 53;
  KEY_INSERT = 54;
  KEY_SPACE = 55;

  // Arrow keys
  KEY_UP = 56;
  KEY_DOWN = 57;
  KEY_LEFT = 58;
  KEY_RIGHT = 59;

  // Navigation keys
  KEY_HOME = 60;
  KEY_END = 61;
  KEY_PAGE_UP = 62;
  KEY_PAGE_DOWN = 63;

  // Modifier keys
  KEY_SHIFT_LEFT = 64;
  KEY_SHIFT_RIGHT = 65;
  KEY_CONTROL_LEFT = 66;
  KEY_CONTROL_RIGHT = 67;
  KEY_ALT_LEFT = 68;
  KEY_ALT_RIGHT = 69;
  KEY_META_LEFT = 70;   // Windows/Command key (left)
  KEY_META_RIGHT = 71;  // Windows/Command key (right)

  // Lock keys
  KEY_CAPS_LOCK = 72;
  KEY_NUM_LOCK = 73;
  KEY_SCROLL_LOCK = 74;

  // System keys
  KEY_PRINT_SCREEN = 75;
  KEY_PAUSE = 76;
  KEY_MENU = 77;

  // Numpad keys
  KEY_NUMPAD_0 = 78;
  KEY_NUMPAD_1 = 79;
  KEY_NUMPAD_2 = 80;
  KEY_NUMPAD_3 = 81;
  KEY_NUMPAD_4 = 82;
  KEY_NUMPAD_5 = 83;
  KEY_NUMPAD_6 = 84;
  KEY_NUMPAD_7 = 85;
  KEY_NUMPAD_8 = 86;
  KEY_NUMPAD_9 = 87;
  KEY_NUMPAD_DECIMAL = 88;
  KEY_NUMPAD_DIVIDE = 89;
  KEY_NUMPAD_MULTIPLY = 90;
  KEY_NUMPAD_SUBTRACT = 91;
  KEY_NUMPAD_ADD = 92;
  KEY_NUMPAD_ENTER = 93;

  // Symbols and punctuation
  KEY_MINUS = 94;           // -
  KEY_EQUALS = 95;          // =
  KEY_LEFT_BRACKET = 96;    // [
  KEY_RIGHT_BRACKET = 97;   // ]
  KEY_BACKSLASH = 98;       // \
  KEY_SEMICOLON = 99;       // ;
  KEY_APOSTROPHE = 100;     // '
  KEY_COMMA = 101;          // ,
  KEY_PERIOD = 102;         // .
  KEY_SLASH = 103;          // /
  KEY_GRAVE = 104;          // `
}

message UIKeyboardInput {
  UIKeyCode key = 1;

  // Modifier states
  bool shift = 2;
  bool control = 3;
  bool alt = 4;
  bool meta = 5;

  // Key state
  enum KeyState {
    RELEASED = 0;
    PRESSED = 1;
    REPEAT = 2;
  }
  KeyState state = 6;

  string character = 7;  // Character produced (for text input)
  int64 timestamp_ms = 8;
}

// ============================================================================
// MOUSE INPUT
// ============================================================================

enum UIMouseButton {
  MOUSE_NONE = 0;
  LEFT = 1;
  RIGHT = 2;
  MIDDLE = 3;
  BUTTON_4 = 4;  // Back button
  BUTTON_5 = 5;  // Forward button
}

message UIMouseInput {
  cryo.common.CryoVec2 position = 1;
  cryo.common.CryoVec2 delta = 2;  // Movement since last frame

  UIMouseButton button = 3;

  enum MouseState {
    RELEASED = 0;
    PRESSED = 1;
    HELD = 2;
  }
  MouseState state = 4;

  // Mouse wheel
  float scroll_delta_x = 5;
  float scroll_delta_y = 6;

  // Modifiers
  bool shift = 7;
  bool control = 8;
  bool alt = 9;
  bool meta = 10;

  // Click info
  int32 click_count = 11;  // 1 = single, 2 = double, 3 = triple
  int64 timestamp_ms = 12;
}

// ============================================================================
// TOUCH INPUT
// ============================================================================

message UITouchInput {
  int32 finger_id = 1;
  cryo.common.CryoVec2 position = 2;
  cryo.common.CryoVec2 delta = 3;
  cryo.common.CryoVec2 start_position = 4;

  enum TouchPhase {
    BEGAN = 0;
    MOVED = 1;
    STATIONARY = 2;
    ENDED = 3;
    CANCELLED = 4;
  }
  TouchPhase phase = 5;

  float pressure = 6;      // 0-1
  float radius_x = 7;      // Touch area X
  float radius_y = 8;      // Touch area Y

  int64 timestamp_ms = 9;
  float duration_ms = 10;  // Duration of touch
}

message UIMultiTouchGesture {
  enum GestureType {
    NONE = 0;
    TAP = 1;
    DOUBLE_TAP = 2;
    LONG_PRESS = 3;
    SWIPE = 4;
    PINCH = 5;
    ROTATE = 6;
    PAN = 7;
    FLICK = 8;
  }
  GestureType type = 1;

  cryo.common.CryoVec2 position = 2;      // Center position
  cryo.common.CryoVec2 delta = 3;         // Movement delta
  cryo.common.CryoVec2 velocity = 4;      // Velocity vector

  float scale = 5;         // For pinch (1.0 = no scale)
  float rotation = 6;      // For rotate (radians)
  float distance = 7;      // Distance traveled

  int32 finger_count = 8;  // Number of fingers involved

  enum GestureState {
    POSSIBLE = 0;
    BEGAN = 1;
    CHANGED = 2;
    ENDED = 3;
    CANCELLED = 4;
    FAILED = 5;
    RECOGNIZED = 6;
  }
  GestureState state = 9;

  int64 timestamp_ms = 10;
  float duration_ms = 11;
}

// ============================================================================
// GAMEPAD INPUT
// ============================================================================

enum UIGamepadButton {
  GAMEPAD_NONE = 0;

  // Face buttons (Xbox / PlayStation layout)
  FACE_BOTTOM = 1;   // A / Cross
  FACE_RIGHT = 2;    // B / Circle
  FACE_LEFT = 3;     // X / Square
  FACE_TOP = 4;      // Y / Triangle

  // Shoulder buttons
  LEFT_SHOULDER = 5;   // LB / L1
  RIGHT_SHOULDER = 6;  // RB / R1
  LEFT_TRIGGER = 7;    // LT / L2
  RIGHT_TRIGGER = 8;   // RT / R2

  // D-pad
  DPAD_UP = 9;
  DPAD_DOWN = 10;
  DPAD_LEFT = 11;
  DPAD_RIGHT = 12;

  // Special buttons
  START = 13;          // Start / Options
  SELECT = 14;         // Back / Share
  HOME = 15;           // Xbox / PS button

  // Stick buttons
  LEFT_STICK_BUTTON = 16;   // L3
  RIGHT_STICK_BUTTON = 17;  // R3

  // Additional buttons
  PADDLE_1 = 18;
  PADDLE_2 = 19;
  PADDLE_3 = 20;
  PADDLE_4 = 21;
  TOUCHPAD = 22;  // PS4/PS5 touchpad click
}

message UIGamepadInput {
  int32 gamepad_id = 1;  // Controller index (0-3)
  string gamepad_name = 2;  // Controller name/model

  UIGamepadButton button = 3;

  enum ButtonState {
    RELEASED = 0;
    PRESSED = 1;
    HELD = 2;
  }
  ButtonState state = 4;

  // Analog sticks (normalized -1.0 to 1.0)
  cryo.common.CryoVec2 left_stick = 5;
  cryo.common.CryoVec2 right_stick = 6;

  // Triggers (normalized 0.0 to 1.0)
  float left_trigger_value = 7;
  float right_trigger_value = 8;

  // D-pad as analog (for some controllers)
  cryo.common.CryoVec2 dpad_analog = 9;

  // Vibration/Haptics (output, 0.0 to 1.0)
  float left_motor = 10;
  float right_motor = 11;

  // Battery level (0.0 to 1.0, -1 if unknown)
  float battery_level = 12;

  bool is_connected = 13;
  int64 timestamp_ms = 14;
}

// ============================================================================
// INPUT BINDING
// ============================================================================

message UIInputBinding {
  string binding_id = 1;
  string action_name = 2;
  string description = 3;

  oneof input_type {
    UIKeyboardBinding keyboard = 4;
    UIMouseBinding mouse = 5;
    UIGamepadBinding gamepad = 6;
    UITouchBinding touch = 7;
  }

  bool consume_input = 8;  // Prevent propagation
  bool enabled = 9;
  int32 priority = 10;
}

message UIKeyboardBinding {
  UIKeyCode key = 1;
  bool requires_shift = 2;
  bool requires_control = 3;
  bool requires_alt = 4;
  bool requires_meta = 5;
}

message UIMouseBinding {
  UIMouseButton button = 1;
  bool requires_shift = 2;
  bool requires_control = 3;
  bool requires_alt = 4;

  // Optional: require click count
  int32 click_count = 5;  // 0 = any, 1 = single, 2 = double

  // Optional: mouse wheel
  bool scroll_up = 6;
  bool scroll_down = 7;
}

message UIGamepadBinding {
  UIGamepadButton button = 1;

  // Optional: analog stick direction
  enum StickDirection {
    NONE = 0;
    LEFT_UP = 1;
    LEFT_DOWN = 2;
    LEFT_LEFT = 3;
    LEFT_RIGHT = 4;
    RIGHT_UP = 5;
    RIGHT_DOWN = 6;
    RIGHT_LEFT = 7;
    RIGHT_RIGHT = 8;
  }
  StickDirection stick_direction = 2;
  float stick_threshold = 3;  // Threshold for stick direction (0-1)
}

message UITouchBinding {
  UIMultiTouchGesture.GestureType gesture = 1;
  int32 required_finger_count = 2;
}

// ============================================================================
// HOTKEY
// ============================================================================

message UIHotkey {
  string hotkey_id = 1;
  string action_name = 2;
  string element_id = 3;  // Target element

  UIKeyCode primary_key = 4;
  repeated UIKeyCode alternate_keys = 5;  // Alternative key combinations

  bool requires_shift = 6;
  bool requires_control = 7;
  bool requires_alt = 8;
  bool requires_meta = 9;

  bool enabled = 10;
  bool global = 11;  // Works even when element not focused
  bool allow_repeat = 12;  // Allow key repeat

  string tooltip_text = 13;  // Description for display
  string category = 14;      // Category for organization
}

// ============================================================================
// INPUT ACTION
// ============================================================================

message UIInputAction {
  string action_id = 1;
  string action_name = 2;
  string description = 3;

  enum ActionType {
    BUTTON = 0;     // Press/Release (bool)
    AXIS = 1;       // Continuous value (float)
    VECTOR2 = 2;    // 2D input (Vec2)
  }
  ActionType type = 4;

  // For BUTTON type
  bool is_pressed = 5;
  bool was_pressed_this_frame = 6;
  bool was_released_this_frame = 7;
  float hold_duration = 8;  // How long button has been held (seconds)

  // For AXIS type
  float axis_value = 9;  // -1.0 to 1.0
  float raw_axis_value = 10;  // Before deadzone/sensitivity

  // For VECTOR2 type
  cryo.common.CryoVec2 vector_value = 11;
  float vector_magnitude = 12;

  repeated UIInputBinding bindings = 13;

  // Callbacks
  string on_started_action = 14;   // When first activated
  string on_performed_action = 15; // When action happens
  string on_canceled_action = 16;  // When action stops
}

// ============================================================================
// INPUT MAP
// ============================================================================

message UIInputMap {
  string map_id = 1;
  string map_name = 2;
  string description = 3;

  repeated UIInputAction actions = 4;
  repeated UIHotkey hotkeys = 5;

  bool enabled = 6;
  int32 priority = 7;  // Higher priority maps checked first

  // Input map can be context-specific
  repeated string active_contexts = 8;  // e.g., "gameplay", "menu", "dialogue"
}

// ============================================================================
// INPUT FOCUS
// ============================================================================

message UIInputFocus {
  string focused_element_id = 1;

  // Input acceptance
  bool accepts_keyboard = 2;
  bool accepts_mouse = 3;
  bool accepts_gamepad = 4;
  bool accepts_touch = 5;

  // Navigation (for gamepad/keyboard navigation)
  string navigate_up_id = 6;
  string navigate_down_id = 7;
  string navigate_left_id = 8;
  string navigate_right_id = 9;

  // Navigation behavior
  bool wrap_horizontal = 10;  // Wrap around horizontally
  bool wrap_vertical = 11;    // Wrap around vertically

  // Focus group
  string focus_group_id = 12;
  int32 tab_index = 13;
}

// ============================================================================
// DRAG AND DROP
// ============================================================================

message UIDragDropData {
  string drag_id = 1;
  string source_element_id = 2;
  string drag_data_type = 3;  // e.g., "text", "file", "item", "entity"

  oneof data {
    string text = 4;
    bytes binary = 5;
    string json = 6;
  }

  // Visual feedback
  string drag_icon_path = 7;
  cryo.common.CryoVec2 drag_icon_offset = 8;
  float drag_icon_scale = 9;
  float drag_icon_opacity = 10;

  // Drag constraints
  bool constrain_to_x = 11;
  bool constrain_to_y = 12;
  cryo.common.CryoVec2 min_position = 13;
  cryo.common.CryoVec2 max_position = 14;
}

message UIDropTarget {
  string target_id = 1;
  string element_id = 2;

  repeated string accepted_data_types = 3;

  enum DropEffect {
    NONE = 0;
    COPY = 1;
    MOVE = 2;
    LINK = 3;
    REFERENCE = 4;
  }
  DropEffect effect = 4;

  // Visual feedback
  cryo.common.CryoColor highlight_color = 5;
  bool show_drop_indicator = 6;

  // Callbacks
  string on_drag_enter_action = 7;
  string on_drag_leave_action = 8;
  string on_drop_action = 9;

  bool enabled = 10;
}

// ============================================================================
// INPUT CONFIGURATION
// ============================================================================

message UIInputConfig {
  // Mouse settings
  float mouse_sensitivity = 1;
  bool invert_mouse_x = 2;
  bool invert_mouse_y = 3;
  float double_click_time = 4;      // Seconds (typically 0.3)
  float double_click_distance = 5;  // Max pixel distance for double-click

  // Keyboard settings
  float key_repeat_delay = 6;   // Initial delay (typically 0.5s)
  float key_repeat_rate = 7;    // Repeat rate (typically 0.033s = 30Hz)

  // Gamepad settings
  float gamepad_left_stick_deadzone = 8;
  float gamepad_right_stick_deadzone = 9;
  float gamepad_trigger_threshold = 10;
  bool gamepad_vibration_enabled = 11;
  float gamepad_vibration_intensity = 12;

  // Touch settings
  float touch_tap_threshold = 13;        // Max movement for tap (pixels)
  float touch_long_press_duration = 14;  // Min duration for long press (seconds)
  float touch_swipe_threshold = 15;      // Min distance for swipe (pixels)
  float touch_swipe_velocity_min = 16;   // Min velocity for swipe (pixels/s)

  // Navigation settings
  bool wrap_navigation = 17;  // Wrap around at edges
  bool allow_gamepad_navigation = 18;
  bool allow_keyboard_navigation = 19;
  float navigation_repeat_delay = 20;  // Delay before repeat navigation
  float navigation_repeat_rate = 21;   // Rate of repeat navigation

  // Drag settings
  float drag_threshold = 22;  // Min movement to start drag (pixels)
}

// ============================================================================
// INPUT EVENT
// ============================================================================

message UIInputEvent {
  string event_id = 1;
  string target_element_id = 2;

  enum EventType {
    // Mouse events
    MOUSE_ENTER = 0;
    MOUSE_LEAVE = 1;
    MOUSE_MOVE = 2;
    MOUSE_DOWN = 3;
    MOUSE_UP = 4;
    MOUSE_CLICK = 5;
    MOUSE_DOUBLE_CLICK = 6;
    MOUSE_TRIPLE_CLICK = 7;
    MOUSE_SCROLL = 8;
    MOUSE_CONTEXT_MENU = 9;

    // Keyboard events
    KEY_DOWN = 10;
    KEY_UP = 11;
    KEY_PRESS = 12;

    // Touch events
    TOUCH_START = 13;
    TOUCH_MOVE = 14;
    TOUCH_END = 15;
    TOUCH_CANCEL = 16;

    // Gesture events
    TAP = 17;
    DOUBLE_TAP = 18;
    LONG_PRESS = 19;
    SWIPE = 20;
    SWIPE_LEFT = 21;
    SWIPE_RIGHT = 22;
    SWIPE_UP = 23;
    SWIPE_DOWN = 24;
    PINCH = 25;
    PINCH_IN = 26;
    PINCH_OUT = 27;
    ROTATE = 28;
    PAN = 29;

    // Focus events
    FOCUS = 30;
    BLUR = 31;
    FOCUS_IN = 32;
    FOCUS_OUT = 33;

    // Drag events
    DRAG_START = 34;
    DRAG = 35;
    DRAG_END = 36;
    DRAG_ENTER = 37;
    DRAG_OVER = 38;
    DRAG_LEAVE = 39;
    DROP = 40;

    // Gamepad events
    GAMEPAD_CONNECTED = 41;
    GAMEPAD_DISCONNECTED = 42;
    GAMEPAD_BUTTON_DOWN = 43;
    GAMEPAD_BUTTON_UP = 44;
    GAMEPAD_AXIS_CHANGED = 45;

    // Input action events
    ACTION_STARTED = 46;
    ACTION_PERFORMED = 47;
    ACTION_CANCELED = 48;

    // Selection events
    SELECT = 49;
    SUBMIT = 50;
    CANCEL = 51;
    NAVIGATE = 52;
  }
  EventType event_type = 3;

  oneof event_data {
    UIKeyboardInput keyboard_data = 4;
    UIMouseInput mouse_data = 5;
    UITouchInput touch_data = 6;
    UIGamepadInput gamepad_data = 7;
    UIMultiTouchGesture gesture_data = 8;
    UIDragDropData drag_data = 9;
  }

  int64 timestamp_ms = 10;
  int32 frame_number = 11;

  bool handled = 12;           // Event was handled
  bool stop_propagation = 13;  // Stop event bubbling
  bool prevent_default = 14;   // Prevent default action

  // Event path (for bubbling)
  repeated string event_path = 15;
}

// ============================================================================
// INPUT MANAGER
// ============================================================================

message UIInputManager {
  repeated UIInputMap input_maps = 1;
  string active_input_map_id = 2;

  UIInputConfig config = 3;
  UIInputFocus focus = 4;

  // Current input state
  repeated UIKeyCode pressed_keys = 5;
  repeated UIMouseButton pressed_mouse_buttons = 6;

  message GamepadButtons {
    repeated UIGamepadButton buttons = 1;
  }
  map<int32, GamepadButtons> pressed_gamepad_buttons = 7;  // gamepad_id -> buttons

  // Mouse state
  cryo.common.CryoVec2 mouse_position = 8;
  cryo.common.CryoVec2 mouse_delta = 9;

  // Gamepad state
  map<int32, UIGamepadInput> connected_gamepads = 10;  // gamepad_id -> state

  // Touch state
  repeated UITouchInput active_touches = 11;

  // Drag state
  bool is_dragging = 12;
  UIDragDropData active_drag_data = 13;

  // Recent events (for debugging)
  repeated UIInputEvent recent_events = 14;
  int32 max_recent_events = 15;  // Max events to keep (default: 100)
}

// ============================================================================
// INPUT CONTEXT
// ============================================================================

message UIInputContext {
  string context_id = 1;
  string context_name = 2;
  string description = 3;

  repeated string input_map_ids = 4;  // Input maps active in this context

  bool exclusive = 5;  // Block lower-priority contexts
  int32 priority = 6;

  // Context conditions
  bool requires_focus = 7;
  repeated string required_element_ids = 8;  // Elements that must exist/be visible
}

// ============================================================================
// INPUT RECORDER (for replays/debugging)
// ============================================================================

message UIInputRecording {
  string recording_id = 1;
  int64 start_timestamp_ms = 2;
  int64 end_timestamp_ms = 3;

  repeated UIInputEvent events = 4;

  map<string, string> metadata = 5;
}

// ============================================================================
// ACCESSIBILITY SETTINGS
// ============================================================================

message UIAccessibilityInput {
  // Keyboard accessibility
  bool sticky_keys = 1;       // Press modifiers one at a time
  bool filter_keys = 2;       // Ignore brief/repeated keystrokes
  bool toggle_keys = 3;       // Audio feedback for lock keys
  bool slow_keys = 4;         // Require longer key press

  // Mouse accessibility
  bool mouse_keys = 5;        // Control mouse with keyboard
  float mouse_speed = 6;
  bool click_lock = 7;        // Lock click without holding

  // Visual feedback
  bool show_keystroke_overlay = 8;
  bool highlight_focused_element = 9;

  // Alternative input
  bool voice_input_enabled = 10;
  bool eye_tracking_enabled = 11;
}