// ui_state.proto - UI state management and interaction feedback
// State tracking, focus, hover, and interaction states
syntax = "proto3";

package cryo.ui;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";

// ============================================================================
// UI STATE
// ============================================================================

message UIElementState {
  string element_id = 1;

  // Visibility state
  bool is_visible = 2;
  bool is_enabled = 3;
  float opacity = 4;

  // Interaction state
  UIInteractionState interaction_state = 5;
  bool is_focused = 6;
  bool is_selected = 7;

  // Validation state (for inputs)
  ValidationState validation = 8;

  // Custom state flags
  map<string, bool> state_flags = 9;
  map<string, float> state_values = 10;
}

// ============================================================================
// VALIDATION STATE
// ============================================================================

message ValidationState {
  enum State {
    VALID = 0;
    INVALID = 1;
    WARNING = 2;
    VALIDATING = 3;
    UNVALIDATED = 4;
  }
  State state = 1;

  string error_message = 2;
  repeated string validation_errors = 3;
}

// ============================================================================
// FOCUS STATE
// ============================================================================

message UIFocusState {
  string focused_element_id = 1;
  string previous_focused_element_id = 2;

  // Focus group
  string focus_group = 3;
  repeated string focus_order = 4;  // Tab order

  bool focus_locked = 5;  // Prevent focus changes
}

// ============================================================================
// HOVER STATE
// ============================================================================

message UIHoverState {
  string hovered_element_id = 1;
  cryo.common.CryoVec2 hover_position = 2;

  float hover_duration = 3;  // Time hovered
  bool hover_locked = 4;     // Lock hover state
}

// ============================================================================
// SELECTION STATE
// ============================================================================

message UISelectionState {
  repeated string selected_element_ids = 1;

  enum SelectionMode {
    SINGLE = 0;
    MULTI = 1;
    RANGE = 2;
  }
  SelectionMode mode = 2;

  string anchor_element_id = 3;  // For range selection
}

// ============================================================================
// DRAG STATE
// ============================================================================

message UIDragState {
  bool is_dragging = 1;
  string dragged_element_id = 2;

  cryo.common.CryoVec2 drag_start_position = 3;
  cryo.common.CryoVec2 current_drag_position = 4;
  cryo.common.CryoVec2 drag_delta = 5;

  // Drag data
  oneof drag_data {
    string text_data = 6;
    bytes binary_data = 7;
    string json_data = 8;
  }

  // Drop target
  string current_drop_target_id = 9;
  bool drop_allowed = 10;
}

// ============================================================================
// SCROLL STATE
// ============================================================================

message UIScrollState {
  string element_id = 1;

  cryo.common.CryoVec2 scroll_position = 2;
  cryo.common.CryoVec2 scroll_velocity = 3;

  cryo.common.CryoVec2 content_size = 4;
  cryo.common.CryoVec2 viewport_size = 5;

  bool is_scrolling = 6;
  bool at_top = 7;
  bool at_bottom = 8;
  bool at_left = 9;
  bool at_right = 10;
}

// ============================================================================
// RESIZE STATE
// ============================================================================

message UIResizeState {
  string element_id = 1;

  bool is_resizing = 2;

  cryo.common.CryoVec2 original_size = 3;
  cryo.common.CryoVec2 current_size = 4;

  enum ResizeHandle {
    TOP = 0;
    BOTTOM = 1;
    LEFT = 2;
    RIGHT = 3;
    TOP_LEFT = 4;
    TOP_RIGHT = 5;
    BOTTOM_LEFT = 6;
    BOTTOM_RIGHT = 7;
  }
  ResizeHandle active_handle = 5;
}

// ============================================================================
// LOADING STATE
// ============================================================================

message UILoadingState {
  string element_id = 1;

  bool is_loading = 2;
  float progress = 3;  // 0-1

  string loading_message = 4;

  enum LoadingType {
    INDETERMINATE = 0;
    DETERMINATE = 1;
  }
  LoadingType type = 5;
}

// ============================================================================
// ERROR STATE
// ============================================================================

message UIErrorState {
  string element_id = 1;

  bool has_error = 2;
  string error_message = 3;

  enum ErrorSeverity {
    INFO = 0;
    WARNING = 1;
    ERROR = 2;
    CRITICAL = 3;
  }
  ErrorSeverity severity = 4;

  repeated string error_details = 5;
}

// ============================================================================
// TOOLTIP STATE
// ============================================================================

message UITooltipState {
  bool is_visible = 1;
  string target_element_id = 2;

  cryo.common.CryoVec2 position = 3;
  string tooltip_text = 4;

  float show_delay_remaining = 5;
}

// ============================================================================
// MODAL STATE
// ============================================================================

message UIModalState {
  bool is_modal_open = 1;
  string active_modal_id = 2;

  repeated string modal_stack = 3;  // Stack of open modals

  bool block_interaction = 4;
  float backdrop_opacity = 5;
}

// ============================================================================
// DROPDOWN STATE
// ============================================================================

message UIDropdownState {
  bool is_open = 1;
  string dropdown_id = 2;

  int32 highlighted_index = 3;
  int32 selected_index = 4;

  string search_query = 5;  // For searchable dropdowns
}

// ============================================================================
// ACCORDION STATE
// ============================================================================

message UIAccordionState {
  string accordion_id = 1;
  repeated string expanded_section_ids = 2;

  bool allow_multiple = 3;
}

// ============================================================================
// TAB STATE
// ============================================================================

message UITabState {
  string tab_container_id = 1;
  int32 active_tab_index = 2;
  string active_tab_id = 3;

  repeated string tab_order = 4;
}

// ============================================================================
// TOGGLE STATE
// ============================================================================

message UIToggleState {
  string element_id = 1;
  bool is_toggled = 2;

  float animation_progress = 3;  // 0-1 for animated toggles
}

// ============================================================================
// SLIDER STATE
// ============================================================================

message UISliderState {
  string element_id = 1;

  float value = 2;
  float min_value = 3;
  float max_value = 4;

  bool is_dragging = 5;
  bool is_hovered = 6;
}

// ============================================================================
// TEXT INPUT STATE
// ============================================================================

message UITextInputState {
  string element_id = 1;

  string text = 2;
  int32 cursor_position = 3;
  int32 selection_start = 4;
  int32 selection_end = 5;

  bool has_focus = 6;
  bool is_readonly = 7;

  ValidationState validation = 8;

  // Undo/Redo
  repeated string history = 9;
  int32 history_index = 10;
}

// ============================================================================
// CONTEXT MENU STATE
// ============================================================================

message UIContextMenuState {
  bool is_open = 1;
  string menu_id = 2;

  cryo.common.CryoVec2 position = 3;
  string target_element_id = 4;

  int32 highlighted_item_index = 5;
}

// ============================================================================
// ANIMATION STATE
// ============================================================================

message UIAnimationState {
  string element_id = 1;
  string animation_id = 2;

  bool is_playing = 3;
  bool is_paused = 4;

  float current_time = 5;
  float duration = 6;

  int32 current_loop = 7;
  int32 total_loops = 8;
}

// ============================================================================
// TRANSITION STATE
// ============================================================================

message UITransitionState {
  string element_id = 1;

  bool is_transitioning = 2;
  float transition_progress = 3;  // 0-1

  enum TransitionType {
    SHOW = 0;
    HIDE = 1;
    MOVE = 2;
    SCALE = 3;
    FADE = 4;
  }
  TransitionType type = 4;
}

// ============================================================================
// DIRTY STATE (for updates)
// ============================================================================

message UIDirtyState {
  string element_id = 1;

  enum DirtyFlags {
    NONE = 0;
    POSITION = 1;
    SIZE = 2;
    STYLE = 4;
    CHILDREN = 8;
    CONTENT = 16;
    ALL = 31;
  }
  int32 dirty_flags = 2;  // Bitfield of DirtyFlags

  bool needs_layout = 3;
  bool needs_redraw = 4;
}

// ============================================================================
// STATE CHANGE EVENT
// ============================================================================

message UIStateChangeEvent {
  string element_id = 1;

  enum StateChangeType {
    INTERACTION_CHANGED = 0;
    FOCUS_CHANGED = 1;
    SELECTION_CHANGED = 2;
    VALIDATION_CHANGED = 3;
    VALUE_CHANGED = 4;
    VISIBILITY_CHANGED = 5;
    ENABLED_CHANGED = 6;
  }
  StateChangeType change_type = 2;

  // Old and new values (serialized)
  string old_value = 3;
  string new_value = 4;

  int64 timestamp_ms = 5;
}

// ============================================================================
// STATE MANAGER
// ============================================================================

message UIStateManager {
  map<string, UIElementState> element_states = 1;

  UIFocusState focus_state = 2;
  UIHoverState hover_state = 3;
  UISelectionState selection_state = 4;
  UIDragState drag_state = 5;
  UIModalState modal_state = 6;

  repeated UIStateChangeEvent recent_events = 7;
}

// ============================================================================
// STATE QUERY
// ============================================================================

message UIStateQuery {
  string element_id = 1;

  // Query filters
  bool include_children = 2;
  bool include_animations = 3;
  bool include_validation = 4;

  repeated string state_properties = 5;  // Specific properties to query
}

message UIStateQueryResult {
  UIElementState element_state = 1;
  repeated UIElementState child_states = 2;

  map<string, string> custom_properties = 3;
}