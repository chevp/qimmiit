// ui_commands.proto - Command system for UI operations
// High-level commands, sequences, and batch operations
syntax = "proto3";

package cryo.ui;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "rendering_2d_ui/ui_base.proto";
import "rendering_2d_ui/ui_hierarchy.proto";
import "rendering_2d_ui/ui_animation.proto";

// ============================================================================
// UI COMMAND (Base)
// ============================================================================

message UICommand {
  string command_id = 1;
  int64 timestamp_ms = 2;

  oneof command {
    // Element-level commands (Low-Level)
    CreateElementCommand create_element = 10;
    UpdateElementCommand update_element = 11;
    DeleteElementCommand delete_element = 12;
    MoveElementCommand move_element = 13;

    // Group-level commands (Mid-Level)
    CreateGroupCommand create_group = 20;
    UpdateGroupCommand update_group = 21;
    DeleteGroupCommand delete_group = 22;
    MoveGroupCommand move_group = 23;
    AddToGroupCommand add_to_group = 24;
    RemoveFromGroupCommand remove_from_group = 25;

    // Animation commands
    PlayAnimationCommand play_animation = 30;
    StopAnimationCommand stop_animation = 31;
    PlayAnimationOnGroupCommand play_animation_group = 32;

    // Visibility commands
    ShowCommand show = 40;
    HideCommand hide = 41;
    ToggleVisibilityCommand toggle_visibility = 42;
    ShowGroupCommand show_group = 43;
    HideGroupCommand hide_group = 44;

    // Style commands
    ApplyStyleCommand apply_style = 50;
    ApplyThemeCommand apply_theme = 51;
    ApplyStyleToGroupCommand apply_style_group = 52;

    // Layout commands
    UpdateLayoutCommand update_layout = 60;
    RefreshLayoutCommand refresh_layout = 61;

    // Scene-level commands (High-Level)
    LoadSceneCommand load_scene = 70;
    UnloadSceneCommand unload_scene = 71;
    TransitionSceneCommand transition_scene = 72;

    // Collection commands
    ShowCollectionCommand show_collection = 80;
    HideCollectionCommand hide_collection = 81;
    ToggleCollectionCommand toggle_collection = 82;

    // Batch commands
    BatchCommand batch = 90;
    SequenceCommand sequence = 91;
    ParallelCommand parallel = 92;

    // Prefab/Template commands
    InstantiatePrefabCommand instantiate_prefab = 100;
    DestroyPrefabCommand destroy_prefab = 101;

    // State commands
    SaveStateCommand save_state = 110;
    RestoreStateCommand restore_state = 111;
  }

  // Execution metadata
  bool executed = 3;
  int64 execution_time_ms = 4;
  string error_message = 5;
}

// ============================================================================
// ELEMENT-LEVEL COMMANDS (Low-Level)
// ============================================================================

message CreateElementCommand {
  string element_id = 1;
  UIElement element = 2;
  string parent_id = 3;
  int32 insert_index = 4;  // -1 = append
}

message UpdateElementCommand {
  string element_id = 1;

  oneof update {
    UIPosition position = 2;
    UISize size = 3;
    UIVisibility visibility = 4;
    float opacity = 5;
    cryo.common.CryoColor color = 6;
  }

  // Or update entire element
  UIElement full_element = 10;
}

message DeleteElementCommand {
  string element_id = 1;
  bool recursive = 2;  // Delete children too
}

message MoveElementCommand {
  string element_id = 1;
  cryo.common.CryoVec2 delta = 2;  // Relative movement
  UIPosition target_position = 3;  // Absolute position
  bool animated = 4;
  float duration = 5;
}

// ============================================================================
// GROUP-LEVEL COMMANDS (Mid-Level)
// ============================================================================

message CreateGroupCommand {
  string group_id = 1;
  UIElementGroup group = 2;
  string parent_group_id = 3;
}

message UpdateGroupCommand {
  string group_id = 1;
  UIElementGroup group = 2;
}

message DeleteGroupCommand {
  string group_id = 1;
  bool delete_children = 2;
  bool recursive = 3;  // Delete subgroups
}

message MoveGroupCommand {
  string group_id = 1;
  cryo.common.CryoTransform transform = 2;
  bool include_subgroups = 3;  // Move subgroups too
  bool relative = 4;           // Relative or absolute
  bool animated = 5;
  float duration = 6;
  UIEasingFunction easing = 7;
}

message AddToGroupCommand {
  string group_id = 1;
  repeated string element_ids = 2;
  bool maintain_transform = 3;  // Keep world position
}

message RemoveFromGroupCommand {
  string group_id = 1;
  repeated string element_ids = 2;
  bool maintain_transform = 3;
}

// ============================================================================
// ANIMATION COMMANDS
// ============================================================================

message PlayAnimationCommand {
  string element_id = 1;
  UIAnimation animation = 2;
  bool replace_existing = 3;
}

message StopAnimationCommand {
  string element_id = 1;
  string animation_id = 2;
  bool stop_all = 3;
}

message PlayAnimationOnGroupCommand {
  string group_id = 1;
  UIAnimation animation = 2;

  enum GroupAnimationMode {
    ALL_AT_ONCE = 0;
    SEQUENTIAL = 1;
    STAGGERED = 2;  // With delay
  }
  GroupAnimationMode mode = 3;

  float stagger_delay = 4;  // Delay between elements
  bool include_subgroups = 5;
}

// ============================================================================
// VISIBILITY COMMANDS
// ============================================================================

message ShowCommand {
  string element_id = 1;
  bool animated = 2;
  UIAnimation show_animation = 3;
}

message HideCommand {
  string element_id = 1;
  bool animated = 2;
  UIAnimation hide_animation = 3;
}

message ToggleVisibilityCommand {
  string element_id = 1;
  bool animated = 2;
}

message ShowGroupCommand {
  string group_id = 1;
  bool include_subgroups = 2;
  bool animated = 3;
  UIAnimation show_animation = 4;

  enum ShowOrder {
    ALL_AT_ONCE = 0;
    SEQUENTIAL = 1;
    REVERSE_SEQUENTIAL = 2;
    STAGGERED = 3;
  }
  ShowOrder order = 5;
  float stagger_delay = 6;
}

message HideGroupCommand {
  string group_id = 1;
  bool include_subgroups = 2;
  bool animated = 3;
  UIAnimation hide_animation = 4;

  enum HideOrder {
    ALL_AT_ONCE = 0;
    SEQUENTIAL = 1;
    REVERSE_SEQUENTIAL = 2;
    STAGGERED = 3;
  }
  HideOrder order = 5;
  float stagger_delay = 6;
}

// ============================================================================
// STYLE COMMANDS
// ============================================================================

message ApplyStyleCommand {
  string element_id = 1;

  oneof style {
    cryo.common.CryoColor color = 2;
    UIBorder border = 3;
    UIBackground background = 4;
    UIShadow shadow = 5;
  }

  map<string, string> style_properties = 10;
}

message ApplyThemeCommand {
  string theme_id = 1;
  repeated string target_element_ids = 2;
  bool recursive = 3;
}

message ApplyStyleToGroupCommand {
  string group_id = 1;
  map<string, string> style_properties = 2;
  bool include_subgroups = 3;
  bool animated = 4;
  float transition_duration = 5;
}

// ============================================================================
// LAYOUT COMMANDS
// ============================================================================

message UpdateLayoutCommand {
  string element_id = 1;

  oneof layout {
    string flex_layout = 2;  // Serialized UIFlexLayout
    string grid_layout = 3;  // Serialized UIGridLayout
  }

  bool force_rebuild = 4;
}

message RefreshLayoutCommand {
  string root_id = 1;
  bool recursive = 2;
}

// ============================================================================
// SCENE-LEVEL COMMANDS (High-Level)
// ============================================================================

message LoadSceneCommand {
  string scene_id = 1;
  string scene_path = 2;
  bool additive = 3;  // Add to current scene vs replace
}

message UnloadSceneCommand {
  string scene_id = 1;
  bool animated = 2;
  float fade_out_duration = 3;
}

message TransitionSceneCommand {
  string from_scene_id = 1;
  string to_scene_id = 2;

  enum TransitionType {
    FADE = 0;
    SLIDE = 1;
    CROSSFADE = 2;
    WIPE = 3;
  }
  TransitionType transition = 3;

  float duration = 4;
}

// ============================================================================
// COLLECTION COMMANDS
// ============================================================================

message ShowCollectionCommand {
  string collection_id = 1;
  bool animated = 2;
  UIAnimation show_animation = 3;
}

message HideCollectionCommand {
  string collection_id = 1;
  bool animated = 2;
  UIAnimation hide_animation = 3;
}

message ToggleCollectionCommand {
  string collection_id = 1;
  bool animated = 2;
}

// ============================================================================
// BATCH COMMANDS (Execute multiple commands)
// ============================================================================

message BatchCommand {
  string batch_id = 1;
  repeated UICommand commands = 2;

  enum ExecutionMode {
    SEQUENTIAL = 0;    // Execute one after another
    PARALLEL = 1;      // Execute all at once
    CONDITIONAL = 2;   // Execute based on conditions
  }
  ExecutionMode mode = 3;

  bool stop_on_error = 4;
}

// ============================================================================
// SEQUENCE COMMAND (Commands with timing)
// ============================================================================

message SequenceCommand {
  string sequence_id = 1;
  string sequence_name = 2;

  message Step {
    float delay = 1;        // Delay before this step (seconds)
    UICommand command = 2;
    string condition = 3;   // Optional condition expression
    bool wait_for_completion = 4;
  }
  repeated Step steps = 3;

  bool loop = 4;
  int32 loop_count = 5;  // 0 = infinite

  // Callbacks
  string on_start = 6;
  string on_complete = 7;
  string on_step_complete = 8;
}

// ============================================================================
// PARALLEL COMMAND (Commands executed simultaneously)
// ============================================================================

message ParallelCommand {
  string parallel_id = 1;
  repeated UICommand commands = 2;

  bool wait_for_all = 3;  // Wait for all to complete
  float timeout = 4;      // Timeout in seconds
}

// ============================================================================
// PREFAB COMMANDS
// ============================================================================

message InstantiatePrefabCommand {
  string prefab_id = 1;
  string instance_id = 2;
  string parent_id = 3;

  UIPosition position = 4;
  string variant_name = 5;
  map<string, string> property_overrides = 6;
}

message DestroyPrefabCommand {
  string instance_id = 1;
  bool animated = 2;
  UIAnimation destroy_animation = 3;
}

// ============================================================================
// STATE COMMANDS
// ============================================================================

message SaveStateCommand {
  string state_id = 1;
  string state_name = 2;

  repeated string element_ids = 3;  // Empty = save all
  bool include_hierarchy = 4;
}

message RestoreStateCommand {
  string state_id = 1;
  bool animated = 2;
  float transition_duration = 3;
}

// ============================================================================
// COMMAND QUEUE
// ============================================================================

message UICommandQueue {
  string queue_id = 1;
  repeated UICommand pending_commands = 2;
  repeated UICommand executing_commands = 3;
  repeated UICommand completed_commands = 4;

  int32 max_history = 5;  // Max completed commands to keep
}

// ============================================================================
// COMMAND SCRIPT (Reusable sequence)
// ============================================================================

message UICommandScript {
  string script_id = 1;
  string script_name = 2;
  string description = 3;

  // Script parameters
  message Parameter {
    string name = 1;
    string type = 2;  // "string", "float", "int", "bool"
    string default_value = 3;
  }
  repeated Parameter parameters = 4;

  // Script body
  SequenceCommand sequence = 5;

  // Variables
  map<string, string> variables = 6;

  // Tags for organization
  repeated string tags = 7;
}

// ============================================================================
// UNDO/REDO SUPPORT
// ============================================================================

message UICommandHistory {
  string history_id = 1;

  repeated UICommand undo_stack = 2;
  repeated UICommand redo_stack = 3;

  int32 max_undo_levels = 4;
  int32 current_index = 5;
}

message UndoCommand {
  string command_id = 1;
  // Reverse operation of the original command
}

message RedoCommand {
  string command_id = 1;
  // Re-execute the undone command
}

// ============================================================================
// MACRO COMMAND (Named reusable command sequence)
// ============================================================================

message UIMacro {
  string macro_id = 1;
  string macro_name = 2;
  string description = 3;

  repeated UICommand commands = 4;

  // Keyboard shortcut
  string hotkey = 5;

  // Context where macro is available
  repeated string contexts = 6;
}

// ============================================================================
// CONDITIONAL COMMAND
// ============================================================================

message ConditionalCommand {
  string condition = 1;  // Expression to evaluate
  UICommand if_true = 2;
  UICommand if_false = 3;
}

// ============================================================================
// LOOP COMMAND
// ============================================================================

message LoopCommand {
  enum LoopType {
    COUNT = 0;      // Loop N times
    WHILE = 1;      // Loop while condition is true
    FOREACH = 2;    // Loop over collection
  }
  LoopType type = 1;

  int32 count = 2;              // For COUNT
  string condition = 3;         // For WHILE
  repeated string items = 4;    // For FOREACH

  UICommand body = 5;
  int32 max_iterations = 6;     // Safety limit
}

// ============================================================================
// COMMAND EXECUTION CONTEXT
// ============================================================================

message UICommandContext {
  string context_id = 1;

  // Variables available during execution
  map<string, string> variables = 2;

  // Current execution state
  string current_command_id = 3;
  int32 execution_depth = 4;

  // Stack trace (for debugging)
  repeated string call_stack = 5;
}

// ============================================================================
// COMMAND RESULT
// ============================================================================

message UICommandResult {
  string command_id = 1;

  enum Status {
    SUCCESS = 0;
    FAILED = 1;
    CANCELLED = 2;
    TIMEOUT = 3;
  }
  Status status = 2;

  string message = 3;
  repeated string affected_element_ids = 4;

  int64 execution_time_ms = 5;
  map<string, string> result_data = 6;
}

// ============================================================================
// COMMAND SCHEDULER
// ============================================================================

message UICommandScheduler {
  string scheduler_id = 1;

  message ScheduledCommand {
    UICommand command = 1;
    int64 execute_at_ms = 2;
    bool recurring = 3;
    int64 interval_ms = 4;
  }
  repeated ScheduledCommand scheduled = 2;

  bool paused = 3;
}