// tile_2d.proto - 2D Tilemap and Tileset System
// Tile definitions, tilemaps, and tile-based rendering
syntax = "proto3";

package cryo.rendering2d;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "rendering_2d_ui/sprite_2d.proto";

// ============================================================================
// TILESET DEFINITION
// ============================================================================

message Tileset {
  string tileset_id = 1;
  string tileset_name = 2;

  // Tileset image
  string texture_path = 3;
  Size2D texture_size = 4;

  // Tile dimensions
  Size2D tile_size = 5;
  int32 tile_count = 6;

  // Grid layout
  int32 columns = 7;
  int32 rows = 8;
  Position2D spacing = 9;  // Space between tiles
  Position2D margin = 10;  // Border around tileset

  // Tile properties
  map<int32, TileProperties> tile_properties = 11;

  // Animations
  repeated TileAnimation tile_animations = 12;

  // Terrain/Autotile definitions
  repeated TerrainType terrain_types = 13;
}

// ============================================================================
// TILE PROPERTIES
// ============================================================================

message TileProperties {
  int32 tile_id = 1;
  string tile_name = 2;

  // Collision
  enum CollisionType {
    NONE = 0;
    SOLID = 1;
    PLATFORM = 2;
    SLOPE = 3;
    WATER = 4;
    TRIGGER = 5;
  }
  CollisionType collision = 3;

  // Custom properties
  map<string, string> properties = 4;

  // Tags
  repeated string tags = 5;

  // Rendering
  cryo.common.CryoColor tint = 6;
  bool flip_x = 7;
  bool flip_y = 8;
}

// ============================================================================
// TILE ANIMATION
// ============================================================================

message TileAnimation {
  int32 tile_id = 1;  // The tile that will be animated

  message Frame {
    int32 tile_id = 1;
    float duration = 2;  // Duration in milliseconds
  }
  repeated Frame frames = 2;
}

// ============================================================================
// TERRAIN TYPE (for autotiling)
// ============================================================================

message TerrainType {
  int32 terrain_id = 1;
  string terrain_name = 2;

  // Tile IDs for each autotile configuration
  // Using bitmask for neighbor tiles
  map<int32, int32> autotile_map = 3;

  // Wang tiles / Blob tiles
  message WangSet {
    repeated int32 edge_tiles = 1;     // Edge configurations
    repeated int32 corner_tiles = 2;   // Corner configurations
  }
  WangSet wang_set = 4;
}

// ============================================================================
// TILE INSTANCE
// ============================================================================

message Tile {
  int32 tile_id = 1;      // Reference to tileset tile
  Position2D position = 2; // Position in tilemap grid

  // Transform overrides
  float rotation = 3;
  bool flip_x = 4;
  bool flip_y = 5;

  // Visual overrides
  cryo.common.CryoColor tint = 6;
  float opacity = 7;

  // Custom properties for this instance
  map<string, string> instance_properties = 8;
}

// ============================================================================
// TILEMAP LAYER
// ============================================================================

message TilemapLayer {
  string layer_id = 1;
  string layer_name = 2;

  // Layer type
  enum LayerType {
    TILE_LAYER = 0;
    OBJECT_LAYER = 1;
    IMAGE_LAYER = 2;
  }
  LayerType type = 3;

  // Layer index (rendering order)
  int32 layer_index = 4;

  // Tileset reference
  string tileset_id = 5;

  // Tile data
  oneof data {
    TileGrid tile_grid = 6;
    CompressedTileData compressed = 7;
    ChunkedTileData chunked = 8;
  }

  // Layer properties
  bool visible = 9;
  float opacity = 10;
  Position2D offset = 11;
  cryo.common.CryoColor tint = 12;

  // Parallax scrolling
  float parallax_factor_x = 13;
  float parallax_factor_y = 14;

  // Collision
  bool has_collision = 15;

  // Custom properties
  map<string, string> properties = 16;
}

// ============================================================================
// TILE GRID (Simple 2D array)
// ============================================================================

message TileGrid {
  int32 width = 1;
  int32 height = 2;

  // Tile IDs in row-major order
  repeated int32 tiles = 3;  // width * height elements

  // Optional: tile instances with custom properties
  repeated Tile tile_instances = 4;
}

// ============================================================================
// COMPRESSED TILE DATA
// ============================================================================

message CompressedTileData {
  int32 width = 1;
  int32 height = 2;

  enum Compression {
    NONE = 0;
    ZLIB = 1;
    GZIP = 2;
    RLE = 3;  // Run-Length Encoding
  }
  Compression compression = 3;

  bytes compressed_data = 4;
}

// ============================================================================
// CHUNKED TILE DATA (for large/infinite maps)
// ============================================================================

message ChunkedTileData {
  int32 chunk_width = 1;
  int32 chunk_height = 2;

  message Chunk {
    int32 chunk_x = 1;
    int32 chunk_y = 2;
    TileGrid data = 3;
  }
  repeated Chunk chunks = 3;
}

// ============================================================================
// TILEMAP
// ============================================================================

message Tilemap {
  string tilemap_id = 1;
  string tilemap_name = 2;

  // Map dimensions
  int32 width = 3;   // In tiles
  int32 height = 4;  // In tiles
  Size2D tile_size = 5;

  // Orientation
  enum Orientation {
    ORTHOGONAL = 0;
    ISOMETRIC = 1;
    STAGGERED = 2;
    HEXAGONAL = 3;
  }
  Orientation orientation = 6;

  // Render order
  enum RenderOrder {
    RIGHT_DOWN = 0;
    RIGHT_UP = 1;
    LEFT_DOWN = 2;
    LEFT_UP = 3;
  }
  RenderOrder render_order = 7;

  // Tilesets used
  repeated string tileset_ids = 8;

  // Layers
  repeated TilemapLayer layers = 9;

  // Background color
  cryo.common.CryoColor background_color = 10;

  // Custom properties
  map<string, string> properties = 11;

  // Object groups (for triggers, spawn points, etc.)
  repeated TilemapObjectGroup object_groups = 12;
}

// ============================================================================
// TILEMAP OBJECT GROUP
// ============================================================================

message TilemapObjectGroup {
  string group_id = 1;
  string group_name = 2;

  bool visible = 3;
  float opacity = 4;
  cryo.common.CryoColor tint = 5;

  repeated TilemapObject objects = 6;
}

message TilemapObject {
  string object_id = 1;
  string object_name = 2;
  string object_type = 3;  // e.g., "spawn_point", "trigger"

  Position2D position = 4;
  Size2D size = 5;
  float rotation = 6;

  // Shape
  enum Shape {
    RECTANGLE = 0;
    ELLIPSE = 1;
    POLYGON = 2;
    POLYLINE = 3;
    POINT = 4;
  }
  Shape shape = 7;

  // For polygon/polyline
  repeated Position2D points = 8;

  // Tile reference (for tile objects)
  int32 tile_id = 9;

  // Custom properties
  map<string, string> properties = 10;

  bool visible = 11;
}

// ============================================================================
// ISOMETRIC TILEMAP SETTINGS
// ============================================================================

message IsometricSettings {
  // Tile dimensions in screen space
  float tile_width = 1;
  float tile_height = 2;

  // Stagger settings
  enum StaggerAxis {
    X = 0;
    Y = 1;
  }
  StaggerAxis stagger_axis = 3;

  enum StaggerIndex {
    ODD = 0;
    EVEN = 1;
  }
  StaggerIndex stagger_index = 4;
}

// ============================================================================
// HEXAGONAL TILEMAP SETTINGS
// ============================================================================

message HexagonalSettings {
  // Hex orientation
  enum HexOrientation {
    POINTY_TOP = 0;
    FLAT_TOP = 1;
  }
  HexOrientation orientation = 1;

  // Hex dimensions
  float side_length = 2;

  // Stagger
  enum StaggerAxis {
    X = 0;
    Y = 1;
  }
  StaggerAxis stagger_axis = 3;

  enum StaggerIndex {
    ODD = 0;
    EVEN = 1;
  }
  StaggerIndex stagger_index = 4;
}

// ============================================================================
// TILE COLLISION SHAPE
// ============================================================================

message TileCollision {
  int32 tile_id = 1;

  enum CollisionShape {
    NONE = 0;
    FULL = 1;           // Full tile collision
    HALF_TOP = 2;
    HALF_BOTTOM = 3;
    HALF_LEFT = 4;
    HALF_RIGHT = 5;
    SLOPE_UP = 6;
    SLOPE_DOWN = 7;
    CUSTOM = 8;
  }
  CollisionShape shape = 2;

  // Custom collision polygon
  repeated Position2D collision_points = 3;
}

// ============================================================================
// TILEMAP CHUNK (for streaming large maps)
// ============================================================================

message TilemapChunk {
  string chunk_id = 1;
  int32 chunk_x = 2;
  int32 chunk_y = 3;

  // Chunk size
  int32 width = 4;
  int32 height = 5;

  // Tile data per layer
  map<string, TileGrid> layer_data = 6;

  // Loaded state
  bool is_loaded = 7;
  bool is_dirty = 8;
}

// ============================================================================
// AUTOTILE RULES
// ============================================================================

message AutotileRules {
  string ruleset_id = 1;
  string tileset_id = 2;
  int32 base_tile_id = 3;

  // Bitmask rules (blob tiles)
  message BitmaskRule {
    int32 bitmask = 1;  // 8-bit mask for neighbors
    int32 tile_id = 2;
  }
  repeated BitmaskRule rules = 4;

  // 47-tile ruleset (RPG Maker style)
  repeated int32 tile_47 = 5;
}

// ============================================================================
// TILEMAP RENDERER SETTINGS
// ============================================================================

message TilemapRendererSettings {
  // Culling
  bool enable_culling = 1;
  int32 culling_margin = 2;  // Tiles outside view + margin

  // Batching
  bool enable_batching = 3;
  int32 max_batch_size = 4;

  // Chunk streaming
  bool enable_streaming = 5;
  int32 chunk_load_distance = 6;

  // Lighting
  bool apply_lighting = 7;

  // Sorting
  bool sort_tiles = 8;
}

// ============================================================================
// TILEMAP MANAGER
// ============================================================================

message TilemapManager {
  string manager_id = 1;

  // All tilemaps
  map<string, Tilemap> tilemaps = 2;

  // All tilesets
  map<string, Tileset> tilesets = 3;

  // Active tilemap
  string active_tilemap_id = 4;

  // Renderer settings
  TilemapRendererSettings renderer_settings = 5;

  // Loaded chunks (for streaming)
  repeated TilemapChunk loaded_chunks = 6;
}