// cryo_network.proto - Network protocol for client communication
// Lightweight, event-driven messages for streaming renderer updates to clients
syntax = "proto3";

package cryo.network;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "google/protobuf/timestamp.proto";

// ============================================================================
// GRPC SERVICES (Client ↔ Server Communication)
// ============================================================================

// Real-time rendering updates (bidirectional streaming)
service RenderStreamService {
  // Client streams input events, server streams render events
  rpc StreamRenderingUpdates(stream ClientEvent) returns (stream RenderEvent);

  // Get current scene snapshot (non-streaming)
  rpc GetSceneSnapshot(SceneSnapshotRequest) returns (SceneSnapshot);

  // Subscribe to specific entity updates
  rpc SubscribeToEntity(SubscribeRequest) returns (stream RenderEvent);

  // Health check
  rpc Ping(PingRequest) returns (PingResponse);
}

// ============================================================================
// RENDER EVENTS (Server → Client)
// ============================================================================

message RenderEvent {
  int64 frame_id = 1;
  google.protobuf.Timestamp timestamp = 2;

  oneof event_type {
    SceneLoaded scene_loaded = 10;
    EntitySpawned entity_spawned = 11;
    EntityUpdated entity_updated = 12;
    EntityDestroyed entity_destroyed = 13;
    CameraUpdate camera_update = 14;
    LightUpdate light_update = 15;
    MaterialUpdate material_update = 16;
    FrameStats frame_stats = 17;
    EnvironmentUpdate environment_update = 18;
  }
}

// ============================================================================
// SCENE EVENTS
// ============================================================================

message SceneLoaded {
  string scene_id = 1;
  string scene_name = 2;

  // Pre-loaded resources (handles only, not full data)
  repeated ResourceHandle materials = 10;
  repeated ResourceHandle meshes = 11;
  repeated ResourceHandle textures = 12;

  common.CryoCamera initial_camera = 20;
  EnvironmentSnapshot environment = 21;

  // Performance info
  int32 total_entities = 30;
  int32 draw_call_estimate = 31;
}

message ResourceHandle {
  uint32 handle_id = 1;
  string name = 2;
  string resource_type = 3;          // "material", "mesh", "texture"
  int64 size_bytes = 4;
}

message EnvironmentSnapshot {
  common.CryoColor ambient_color = 1;
  float ambient_intensity = 2;
  common.CryoColor skybox_color = 3;
  bool fog_enabled = 4;
  common.CryoColor fog_color = 5;
  float fog_density = 6;
}

// ============================================================================
// ENTITY EVENTS (Lightweight - only what changed!)
// ============================================================================

message EntitySpawned {
  string entity_id = 1;
  string entity_name = 2;
  common.CryoTransform transform = 3;

  // Resource handles (not full data!)
  uint32 material_handle = 10;
  uint32 mesh_handle = 11;

  // Render flags
  bool visible = 20;
  bool casts_shadow = 21;
  uint32 render_layer = 22;

  // Bounding volume (for culling/selection)
  common.CryoAABB aabb = 30;
}

message EntityUpdated {
  string entity_id = 1;

  // Only send fields that changed (use oneof for efficiency)
  oneof update_type {
    common.CryoTransform transform_update = 10;
    VisibilityUpdate visibility_update = 11;
    MaterialSwap material_swap = 12;
    MeshSwap mesh_swap = 13;
    TransformDelta transform_delta = 14;  // More efficient than full transform
  }
}

message VisibilityUpdate {
  bool visible = 1;
}

message MaterialSwap {
  uint32 new_material_handle = 1;
}

message MeshSwap {
  uint32 new_mesh_handle = 1;
}

message TransformDelta {
  common.CryoVec3 position_delta = 1;
  common.CryoVec4 rotation_delta = 2;  // Quaternion delta
  common.CryoVec3 scale_delta = 3;
}

message EntityDestroyed {
  string entity_id = 1;
}

// ============================================================================
// CAMERA EVENTS
// ============================================================================

message CameraUpdate {
  common.CryoCamera camera = 1;

  // Optional: Only send deltas for efficiency
  optional CameraDelta delta = 10;
}

message CameraDelta {
  common.CryoVec3 position_delta = 1;
  common.CryoVec3 rotation_delta = 2;  // Euler angles
  float fov_delta = 3;
}

// ============================================================================
// LIGHT EVENTS
// ============================================================================

message LightUpdate {
  string light_id = 1;

  oneof update_type {
    LightSpawned spawned = 10;
    LightModified modified = 11;
    LightDestroyed destroyed = 12;
  }
}

message LightSpawned {
  common.CryoLight light = 1;
  bool casts_shadows = 2;
}

message LightModified {
  // Only changed properties
  optional common.CryoVec3 position = 1;
  optional common.CryoColor color = 2;
  optional float intensity = 3;
  optional float range = 4;
}

message LightDestroyed {
  string light_id = 1;
}

// ============================================================================
// ENVIRONMENT EVENTS
// ============================================================================

message EnvironmentUpdate {
  oneof update_type {
    SkyboxUpdate skybox = 1;
    FogUpdate fog = 2;
    AmbientLightUpdate ambient = 3;
  }
}

message SkyboxUpdate {
  oneof skybox_type {
    common.CryoColor solid_color = 1;
    uint32 cubemap_handle = 2;
  }
  float rotation = 3;
}

message FogUpdate {
  bool enabled = 1;
  common.CryoColor color = 2;
  float density = 3;
  float start = 4;
  float end = 5;
}

message AmbientLightUpdate {
  common.CryoColor color = 1;
  float intensity = 2;
}

// ============================================================================
// MATERIAL EVENTS (runtime material updates)
// ============================================================================

message MaterialUpdate {
  uint32 material_handle = 1;

  // Parameter changes (uniforms)
  map<string, common.CryoUniformValue> parameter_updates = 10;

  // Texture swaps
  map<string, uint32> texture_updates = 11;  // slot_name -> texture_handle
}

// ============================================================================
// FRAME STATISTICS (performance monitoring)
// ============================================================================

message FrameStats {
  int64 frame_id = 1;
  google.protobuf.Timestamp timestamp = 2;

  float frame_time_ms = 10;
  float fps = 11;

  uint32 draw_calls = 20;
  uint32 vertices_rendered = 21;
  uint32 triangles_rendered = 22;

  uint32 entities_visible = 30;
  uint32 entities_culled = 31;

  float cpu_time_ms = 40;
  float gpu_time_ms = 41;

  // Memory usage
  int64 gpu_memory_used_bytes = 50;
  int64 cpu_memory_used_bytes = 51;
}

// ============================================================================
// CLIENT EVENTS (Client → Server)
// ============================================================================

message ClientEvent {
  int64 client_frame_id = 1;
  google.protobuf.Timestamp timestamp = 2;

  oneof event_type {
    ClientInputEvent input_event = 10;
    ClientCameraControl camera_control = 11;
    ClientEntityCommand entity_command = 12;
    ClientSceneCommand scene_command = 13;
    ClientMaterialCommand material_command = 14;
  }
}

// ============================================================================
// CLIENT INPUT (mouse, keyboard, gamepad)
// ============================================================================

message ClientInputEvent {
  oneof input_type {
    MouseEvent mouse = 1;
    KeyboardEvent keyboard = 2;
    GamepadEvent gamepad = 3;
    TouchEvent touch = 4;
  }
}

message MouseEvent {
  enum MouseButton {
    LEFT = 0;
    RIGHT = 1;
    MIDDLE = 2;
    BUTTON_4 = 3;
    BUTTON_5 = 4;
  }

  enum MouseAction {
    MOVE = 0;
    DOWN = 1;
    UP = 2;
    SCROLL = 3;
    DOUBLE_CLICK = 4;
  }

  MouseAction action = 1;
  MouseButton button = 2;
  float x = 3;
  float y = 4;
  float scroll_delta = 5;
  float delta_x = 6;                 // Mouse movement delta
  float delta_y = 7;
}

message KeyboardEvent {
  enum KeyAction {
    DOWN = 0;
    UP = 1;
    REPEAT = 2;
  }

  KeyAction action = 1;
  string key_code = 2;
  bool shift = 3;
  bool ctrl = 4;
  bool alt = 5;
  bool meta = 6;                     // Windows/Command key
}

message GamepadEvent {
  enum ButtonAction {
    DOWN = 0;
    UP = 1;
  }

  ButtonAction action = 1;
  string button = 2;
  map<string, float> axes = 3;       // "left_stick_x", "right_trigger", etc.
  int32 gamepad_index = 4;           // For multi-gamepad support
}

message TouchEvent {
  enum TouchAction {
    START = 0;
    MOVE = 1;
    END = 2;
    CANCEL = 3;
  }

  TouchAction action = 1;
  int32 touch_id = 2;
  float x = 3;
  float y = 4;
  float pressure = 5;                // 0.0 to 1.0
}

// ============================================================================
// CLIENT CAMERA CONTROL
// ============================================================================

message ClientCameraControl {
  oneof control_type {
    CameraMovement movement = 1;
    CameraRotation rotation = 2;
    CameraZoom zoom = 3;
    CameraLookAt look_at = 4;
  }
}

message CameraMovement {
  common.CryoVec3 delta_position = 1;
}

message CameraRotation {
  common.CryoVec3 delta_rotation = 1;  // Euler angles
}

message CameraZoom {
  float delta_fov = 1;
}

message CameraLookAt {
  common.CryoVec3 target = 1;
  float transition_duration_ms = 2;
}

// ============================================================================
// CLIENT ENTITY COMMANDS
// ============================================================================

message ClientEntityCommand {
  string entity_id = 1;

  oneof command_type {
    SelectEntity select = 10;
    MoveEntity move = 11;
    RotateEntity rotate = 12;
    ScaleEntity scale = 13;
    DeleteEntity delete = 14;
    ToggleVisibility toggle_visibility = 15;
  }
}

message SelectEntity {
  bool selected = 1;
  bool multi_select = 2;             // Add to existing selection
}

message MoveEntity {
  common.CryoVec3 new_position = 1;
  bool relative = 2;                 // Relative to current position
}

message RotateEntity {
  common.CryoVec3 new_rotation = 1;  // Euler angles
  bool relative = 2;
}

message ScaleEntity {
  common.CryoVec3 new_scale = 1;
  bool uniform = 2;                  // Scale uniformly
}

message DeleteEntity {
  // Empty - just the entity_id
}

message ToggleVisibility {
  bool visible = 1;
}

// ============================================================================
// CLIENT SCENE COMMANDS
// ============================================================================

message ClientSceneCommand {
  oneof command_type {
    LoadScene load_scene = 1;
    UnloadScene unload_scene = 2;
    SpawnEntity spawn_entity = 3;
    SpawnPrefab spawn_prefab = 4;
  }
}

message LoadScene {
  string scene_id = 1;
  bool additive = 2;                 // Add to current scene vs replace
}

message UnloadScene {
  string scene_id = 1;
}

message SpawnEntity {
  string entity_name = 1;
  common.CryoTransform transform = 2;
  uint32 material_handle = 3;
  uint32 mesh_handle = 4;
}

message SpawnPrefab {
  string prefab_id = 1;
  common.CryoTransform transform = 2;
  map<string, string> parameter_overrides = 3;
}

// ============================================================================
// CLIENT MATERIAL COMMANDS
// ============================================================================

message ClientMaterialCommand {
  uint32 material_handle = 1;

  oneof command_type {
    SetMaterialParameter set_parameter = 10;
    SwapTexture swap_texture = 11;
  }
}

message SetMaterialParameter {
  string parameter_name = 1;
  common.CryoUniformValue value = 2;
}

message SwapTexture {
  string texture_slot = 1;
  uint32 new_texture_handle = 2;
}

// ============================================================================
// SCENE SNAPSHOT (non-streaming, on-demand)
// ============================================================================

message SceneSnapshotRequest {
  string scene_id = 1;
  bool include_entities = 2;
  bool include_lights = 3;
  bool include_camera = 4;
  bool include_environment = 5;
}

message SceneSnapshot {
  string scene_id = 1;
  string scene_name = 2;

  repeated EntitySnapshot entities = 10;
  repeated common.CryoLight lights = 11;
  common.CryoCamera camera = 12;

  EnvironmentSnapshot environment = 20;

  // Performance info
  int32 total_entities = 30;
  int32 visible_entities = 31;
}

message EntitySnapshot {
  string entity_id = 1;
  string name = 2;
  common.CryoTransform transform = 3;
  uint32 material_handle = 4;
  uint32 mesh_handle = 5;
  bool visible = 6;
  common.CryoAABB aabb = 7;
}

// ============================================================================
// SUBSCRIPTION MANAGEMENT
// ============================================================================

message SubscribeRequest {
  oneof subscription {
    EntitySubscription entity = 1;
    SceneSubscription scene = 2;
    MaterialSubscription material = 3;
  }
}

message EntitySubscription {
  repeated string entity_ids = 1;
  bool include_children = 2;         // Also subscribe to child entities
}

message SceneSubscription {
  string scene_id = 1;
  bool include_all_entities = 2;
}

message MaterialSubscription {
  repeated uint32 material_handles = 1;
}

// ============================================================================
// PING/PONG (Health Check)
// ============================================================================

message PingRequest {
  string client_id = 1;
  int64 client_timestamp_ms = 2;
}

message PingResponse {
  string server_id = 1;
  int64 server_timestamp_ms = 2;
  int64 round_trip_ms = 3;           // Server-calculated RTT
  ServerStatus status = 4;

  enum ServerStatus {
    HEALTHY = 0;
    DEGRADED = 1;
    UNHEALTHY = 2;
  }
}

// ============================================================================
// DATA-DRIVEN RENDERER MESSAGES (for real-time shader updates via gRPC)
// ============================================================================

message ShaderUpdate {
  string shader_instance_id = 1;
  string template_id = 2;

  // Uniform updates (real-time parameter changes)
  map<string, common.CryoUniformValue> uniform_updates = 10;

  // Texture binding updates
  map<string, string> texture_updates = 11;  // binding name -> texture path

  // Optional: Full shader replacement
  bool replace_shader = 20;
  bytes spirv_vertex = 21;
  bytes spirv_fragment = 22;
}

// ============================================================================
// NETWORK STATISTICS
// ============================================================================

message NetworkStats {
  int64 timestamp_ms = 1;

  // Bandwidth
  int64 bytes_sent = 10;
  int64 bytes_received = 11;
  float bandwidth_mbps = 12;

  // Latency
  float average_latency_ms = 20;
  float min_latency_ms = 21;
  float max_latency_ms = 22;

  // Packet loss
  int32 packets_sent = 30;
  int32 packets_received = 31;
  float packet_loss_percent = 32;
}
