// scene_sequences.proto - Command sequences and scripts
// Bundle multiple commands for efficient transmission and execution
syntax = "proto3";

package cryo.scene;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "sync/scene_update_delta.proto";
import "sync/scene_keyframes.proto";

// ============================================================================
// COMMAND SEQUENCE (Ordered list of commands)
// ============================================================================

message CommandSequence {
  string sequence_id = 1;

  // All commands in this sequence
  repeated SequenceStep steps = 10;

  // Sequence execution settings
  ExecutionMode execution_mode = 20;
  float total_duration_ms = 21;
  bool loop = 22;
  int32 loop_count = 23;  // -1 = infinite

  // Sequence metadata
  string description = 30;
  map<string, string> metadata = 31;

  enum ExecutionMode {
    SEQUENTIAL = 0;      // Execute one after another
    PARALLEL = 1;        // Execute all simultaneously
    CONDITIONAL = 2;     // Execute based on conditions
    TIME_BASED = 3;      // Execute at specific timestamps
  }
}

// ============================================================================
// SEQUENCE STEP (Single command in a sequence)
// ============================================================================

message SequenceStep {
  string step_id = 1;
  int32 step_index = 2;

  // The command to execute
  oneof command {
    DeltaUpdate delta_update = 10;
    SetKeyframe keyframe_command = 11;
    PlayTimeline timeline_command = 12;
    NestedSequence nested_sequence = 13;  // Sequences can contain sequences
    CustomCommand custom = 14;
  }

  // Timing control
  StepTiming timing = 20;

  // Conditional execution
  optional StepCondition condition = 30;

  // Error handling
  ErrorHandling error_handling = 40;
}

message StepTiming {
  // When to execute this step
  oneof timing_mode {
    float delay_ms = 10;           // Delay from previous step
    float absolute_time_ms = 11;   // Absolute time in sequence
    TriggerEvent trigger = 12;     // Wait for event
  }

  // How long this step takes
  optional float duration_ms = 20;

  // Wait for completion before next step
  bool blocking = 30;
}

message TriggerEvent {
  string event_name = 1;
  optional string event_source = 2;
}

message StepCondition {
  ConditionType type = 1;

  oneof condition {
    EntityStateCondition entity_state = 10;
    VariableCondition variable = 11;
    TimeCondition time = 12;
    CustomCondition custom = 13;
  }

  enum ConditionType {
    ALWAYS = 0;
    IF_TRUE = 1;
    IF_FALSE = 2;
    IF_EQUAL = 3;
    IF_GREATER = 4;
    IF_LESS = 5;
  }
}

message EntityStateCondition {
  string entity_id = 1;
  string property_name = 2;
  float expected_value = 3;
  float tolerance = 4;
}

message VariableCondition {
  string variable_name = 1;
  oneof expected {
    float float_value = 10;
    bool bool_value = 11;
    string string_value = 12;
  }
}

message TimeCondition {
  int64 timestamp_ms = 1;
  enum Comparison {
    BEFORE = 0;
    AFTER = 1;
    EXACT = 2;
  }
  Comparison comparison = 2;
}

message CustomCondition {
  string condition_script = 1;
  map<string, string> parameters = 2;
}

message ErrorHandling {
  OnError on_error = 1;

  int32 max_retries = 10;
  float retry_delay_ms = 11;

  enum OnError {
    CONTINUE = 0;       // Continue to next step
    ABORT_SEQUENCE = 1; // Stop entire sequence
    RETRY = 2;          // Retry this step
    SKIP = 3;           // Skip this step
    ROLLBACK = 4;       // Undo previous steps
  }
}

// ============================================================================
// NESTED SEQUENCE
// ============================================================================

message NestedSequence {
  CommandSequence sequence = 1;

  // How to integrate with parent sequence
  bool wait_for_completion = 10;
  float time_scale = 11;  // Speed up/slow down nested sequence
}

// ============================================================================
// CUSTOM COMMAND
// ============================================================================

message CustomCommand {
  string command_type = 1;
  bytes command_data = 2;
  map<string, string> parameters = 3;
}

// ============================================================================
// SEQUENCE COMMANDS (Semantic verbs)
// ============================================================================

message BeginSequence {
  string sequence_id = 1;

  // Initial settings
  CommandSequence.ExecutionMode execution_mode = 10;
  bool loop = 11;

  // Metadata
  string description = 20;
}

message EndSequence {
  string sequence_id = 1;

  // What to do when sequence ends
  SequenceEndAction end_action = 10;

  enum SequenceEndAction {
    STOP = 0;
    RESET = 1;
    HOLD_LAST_STATE = 2;
    LOOP = 3;
  }
}

message AddStepToSequence {
  string sequence_id = 1;
  SequenceStep step = 2;

  // Insert position
  optional int32 insert_at_index = 10;  // If not set, append
}

message RemoveStepFromSequence {
  string sequence_id = 1;

  oneof selector {
    int32 step_index = 10;
    string step_id = 11;
  }
}

message PlaySequence {
  string sequence_id = 1;

  // Playback settings
  optional float start_time_ms = 10;
  optional float playback_speed = 11;
  bool loop = 12;
}

message StopSequence {
  string sequence_id = 1;

  bool reset_to_start = 10;
  bool apply_final_state = 11;
}

message PauseSequence {
  string sequence_id = 1;
}

message ResumeSequence {
  string sequence_id = 1;
}

// ============================================================================
// SEQUENCE SCRIPT (Higher-level command bundling)
// ============================================================================

message SequenceScript {
  string script_id = 1;

  // Multiple sequences coordinated together
  repeated ScriptSequence sequences = 10;

  // Global variables shared across sequences
  map<string, ScriptVariable> variables = 20;

  // Script execution state
  ScriptExecutionState execution_state = 30;

  // Script metadata
  string description = 40;
  string author = 41;
  int64 created_timestamp_ms = 42;
}

message ScriptSequence {
  string sequence_id = 1;
  CommandSequence sequence = 2;

  // When to start this sequence relative to script start
  float start_offset_ms = 10;

  // Synchronization with other sequences
  repeated string depends_on_sequences = 20;  // Wait for these to complete
}

message ScriptVariable {
  string variable_name = 1;

  oneof value {
    float float_value = 10;
    int32 int_value = 11;
    bool bool_value = 12;
    string string_value = 13;
    cryo.common.CryoVec3 vec3_value = 14;
    cryo.common.CryoColor color_value = 15;
  }

  bool constant = 20;  // Cannot be modified during execution
}

enum ScriptExecutionState {
  SCRIPT_IDLE = 0;
  SCRIPT_RUNNING = 1;
  SCRIPT_PAUSED = 2;
  SCRIPT_COMPLETED = 3;
  SCRIPT_ERROR = 4;
}

// ============================================================================
// SCRIPT COMMANDS
// ============================================================================

message LoadScript {
  string script_id = 1;
  oneof source {
    SequenceScript inline_script = 10;
    string script_uri = 11;           // Load from file
    bytes serialized_script = 12;     // Binary script data
  }
}

message ExecuteScript {
  string script_id = 1;

  // Override script variables
  map<string, ScriptVariable> variable_overrides = 10;

  // Execution settings
  bool loop = 20;
  float playback_speed = 21;
}

message StopScript {
  string script_id = 1;
  bool reset_state = 10;
}

// ============================================================================
// SEQUENCE BATCHING (Bundle multiple sequences for transmission)
// ============================================================================

message SequenceBatch {
  string batch_id = 1;

  // All sequences in this batch
  repeated CommandSequence sequences = 10;

  // Batch execution mode
  BatchExecutionMode execution_mode = 20;

  // Compression
  optional BatchCompression compression = 30;

  enum BatchExecutionMode {
    INDEPENDENT = 0;     // Sequences execute independently
    COORDINATED = 1;     // Sequences are synchronized
    PRIORITY_BASED = 2;  // Execute by priority
  }
}

message BatchCompression {
  enum CompressionMethod {
    NONE = 0;
    ZLIB = 1;
    ZSTD = 2;
    CUSTOM = 10;
  }
  CompressionMethod method = 1;

  int32 original_size_bytes = 10;
  int32 compressed_size_bytes = 11;
  float compression_ratio = 12;
}

message SendSequenceBatch {
  SequenceBatch batch = 1;

  // Transmission priority
  TransmissionPriority priority = 10;

  enum TransmissionPriority {
    LOW = 0;
    NORMAL = 1;
    HIGH = 2;
    CRITICAL = 3;
  }
}

// ============================================================================
// SEQUENCE SYNCHRONIZATION
// ============================================================================

message SyncSequences {
  repeated string sequence_ids = 1;

  // Synchronization mode
  SyncMode sync_mode = 10;

  // Sync point
  oneof sync_point {
    float sync_time_ms = 20;
    string sync_event = 21;
    SyncToKeyframe keyframe = 22;
  }

  enum SyncMode {
    ALIGN_START = 0;     // Start all sequences together
    ALIGN_END = 1;       // End all sequences together
    ALIGN_AT_TIME = 2;   // Align at specific time
    ALIGN_AT_EVENT = 3;  // Align when event occurs
  }
}

message SyncToKeyframe {
  string track_id = 1;
  int32 keyframe_index = 2;
}

// ============================================================================
// SEQUENCE BLENDING
// ============================================================================

message BlendSequences {
  string output_sequence_id = 1;

  // Sequences to blend
  repeated WeightedSequence sequences = 10;

  // Blend mode
  BlendMode blend_mode = 20;

  enum BlendMode {
    ADDITIVE = 0;
    OVERRIDE = 1;
    WEIGHTED_AVERAGE = 2;
    CROSSFADE = 3;
  }
}

message WeightedSequence {
  string sequence_id = 1;
  float weight = 2;  // 0.0 to 1.0

  // Optional weight curve over time
  repeated WeightKeyframe weight_curve = 10;
}

message WeightKeyframe {
  float time_ms = 1;
  float weight = 2;
}

// ============================================================================
// SEQUENCE TEMPLATES
// ============================================================================

message SequenceTemplate {
  string template_id = 1;
  string template_name = 2;

  // Template structure
  CommandSequence base_sequence = 10;

  // Parameterizable fields
  repeated TemplateParameter parameters = 20;

  message TemplateParameter {
    string parameter_name = 1;
    ParameterType type = 2;
    oneof default_value {
      float float_default = 10;
      string string_default = 11;
      bool bool_default = 12;
    }

    enum ParameterType {
      FLOAT = 0;
      STRING = 1;
      BOOL = 2;
      ENTITY_ID = 3;
      COLOR = 4;
      VECTOR3 = 5;
    }
  }
}

message InstantiateSequenceTemplate {
  string template_id = 1;
  string new_sequence_id = 2;

  // Parameter values
  map<string, string> parameter_values = 10;
}

// ============================================================================
// SEQUENCE RECORDING
// ============================================================================

message RecordSequence {
  string sequence_id = 1;

  // What to record
  repeated string entity_ids = 10;
  repeated RecordingChannel channels = 11;

  // Recording settings
  float sample_rate = 20;  // Samples per second

  enum RecordingChannel {
    TRANSFORM = 0;
    MATERIAL = 1;
    ANIMATION_STATE = 2;
    CUSTOM_PROPERTIES = 3;
  }
}

message StopRecording {
  string sequence_id = 1;

  // Save recorded sequence
  bool save_sequence = 10;
  optional string save_uri = 11;
}

message RecordedSequence {
  string sequence_id = 1;
  CommandSequence recorded_sequence = 2;

  // Recording metadata
  int64 recording_start_ms = 10;
  int64 recording_end_ms = 11;
  float sample_rate = 12;
  int32 total_samples = 13;
}

// ============================================================================
// SEQUENCE MANAGER
// ============================================================================

message SequenceManager {
  string manager_id = 1;

  // All active sequences
  map<string, CommandSequence> sequences = 10;

  // All scripts
  map<string, SequenceScript> scripts = 11;

  // Sequence templates
  map<string, SequenceTemplate> templates = 12;

  // Currently playing sequences
  repeated PlayingSequence playing_sequences = 20;

  // Statistics
  SequenceStatistics stats = 30;
}

message PlayingSequence {
  string sequence_id = 1;
  float current_time_ms = 2;
  int32 current_step_index = 3;
  PlaybackState state = 4;

  enum PlaybackState {
    PLAYING = 0;
    PAUSED = 1;
    WAITING = 2;  // Waiting for condition or trigger
    ERROR = 3;
  }
}

message SequenceStatistics {
  int32 total_sequences = 1;
  int32 total_scripts = 2;
  int32 active_sequences = 3;

  int64 total_steps_executed = 10;
  int64 total_sequences_completed = 11;
  int64 total_errors = 12;

  float average_sequence_duration_ms = 20;
  float average_steps_per_sequence = 21;
}

// ============================================================================
// SEQUENCE OPTIMIZATION
// ============================================================================

message OptimizeSequence {
  string sequence_id = 1;

  // Optimization strategies
  repeated OptimizationStrategy strategies = 10;

  enum OptimizationStrategy {
    REMOVE_REDUNDANT_STEPS = 0;     // Remove duplicate commands
    MERGE_ADJACENT_DELTAS = 1;      // Combine sequential delta updates
    QUANTIZE_TIMING = 2;            // Round timing to reduce precision
    COMPRESS_DATA = 3;              // Apply compression
    PARALLELIZE_STEPS = 4;          // Convert sequential to parallel where possible
  }
}

message OptimizedSequence {
  string sequence_id = 1;
  CommandSequence optimized_sequence = 2;

  // Optimization results
  int32 original_step_count = 10;
  int32 optimized_step_count = 11;
  int64 original_size_bytes = 12;
  int64 optimized_size_bytes = 13;
  float optimization_ratio = 14;
}