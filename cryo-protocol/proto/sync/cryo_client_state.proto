// cryo_client_state.proto - Client-side state management for resilient rendering
// Enables clients to survive 5+ seconds without server updates
syntax = "proto3";

package cryo.client;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================
//
// CLIENT-SIDE STATE MANAGEMENT
//
// Enables renderer-clients to:
//   1. Survive 5+ seconds without server updates
//   2. Predict and interpolate state changes
//   3. Handle local interactions (hover, click) immediately
//   4. Reconcile with server state when updates arrive
//
// DESIGN RATIONALE:
//   - Client maintains local state buffer
//   - Interactions are predicted locally for responsiveness
//   - Server sends corrections/updates periodically
//   - HTTP/1.1 compatible (no need for websockets)
//
// ==============================================================================

import "google/protobuf/timestamp.proto";
import "cryo_common.proto";
import "rendering_2d_ui/ui_state.proto";

// ============================================================================
// CLIENT STATE BUFFER
// ============================================================================

message ClientStateBuffer {
  string client_id = 1;

  // Last known server state
  ServerState last_server_state = 2;
  int64 last_server_update_ms = 3;

  // Local predicted state
  repeated LocalPrediction predictions = 10;

  // Interaction state (immediate client-side)
  ClientInteractionState interaction_state = 20;

  // Interpolation state
  InterpolationBuffer interpolation = 30;

  // Buffer statistics
  BufferStatistics stats = 40;
}

// ============================================================================
// SERVER STATE (Authoritative)
// ============================================================================

message ServerState {
  int64 timestamp_ms = 1;
  int64 frame_number = 2;

  // Entity states
  repeated EntityState entities = 10;

  // UI element states
  repeated cryo.ui.UIElementState ui_elements = 20;

  // Environment state
  EnvironmentState environment = 30;

  // State checksum for validation
  bytes state_hash = 40;
}

message EntityState {
  string entity_id = 1;
  cryo.common.CryoVec3 position = 2;
  cryo.common.CryoVec4 rotation = 3;
  cryo.common.CryoVec3 scale = 4;

  // Velocity for interpolation
  optional cryo.common.CryoVec3 velocity = 10;
  optional cryo.common.CryoVec3 angular_velocity = 11;

  // Custom properties
  map<string, float> properties = 20;
}

message EnvironmentState {
  float ambient_light_intensity = 1;
  cryo.common.CryoColor ambient_color = 2;
  float time_of_day = 3;
  float fog_density = 4;
}

// ============================================================================
// LOCAL PREDICTION (Client-side)
// ============================================================================

message LocalPrediction {
  string prediction_id = 1;
  int64 client_timestamp_ms = 2;

  // What was predicted
  oneof prediction_type {
    EntityMovementPrediction entity_movement = 10;
    UIInteractionPrediction ui_interaction = 11;
    EnvironmentChangePrediction environment_change = 12;
  }

  // Prediction state
  enum PredictionStatus {
    PENDING = 0;      // Not yet confirmed by server
    CONFIRMED = 1;    // Server confirmed
    REJECTED = 2;     // Server rejected (rollback needed)
  }
  PredictionStatus status = 20;

  // Time to live (discard if server doesn't respond)
  float ttl_seconds = 30;
}

message EntityMovementPrediction {
  string entity_id = 1;
  cryo.common.CryoVec3 predicted_position = 2;
  cryo.common.CryoVec4 predicted_rotation = 3;

  // Movement parameters
  cryo.common.CryoVec3 velocity = 10;
  float duration = 11;
}

message UIInteractionPrediction {
  string element_id = 1;
  cryo.ui.UIInteractionState predicted_state = 2;

  // What triggered this prediction
  string interaction_type = 10;  // "hover", "click", "focus", etc.
}

message EnvironmentChangePrediction {
  map<string, float> predicted_values = 1;
}

// ============================================================================
// CLIENT INTERACTION STATE (Immediate updates)
// ============================================================================

message ClientInteractionState {
  // Mouse/pointer state
  cryo.common.CryoVec2 pointer_position = 1;
  bool pointer_down = 2;

  // Hovered elements (updated every frame)
  repeated string hovered_element_ids = 10;
  map<string, HoverState> hover_states = 11;

  // Pressed elements
  repeated string pressed_element_ids = 20;

  // Focused element
  string focused_element_id = 30;

  // Last interaction timestamp
  int64 last_interaction_ms = 40;
}

message HoverState {
  string element_id = 1;
  float hover_start_time = 2;
  float hover_duration = 3;
  cryo.common.CryoVec2 hover_position = 4;

  // Visual feedback state
  float hover_animation_progress = 10;  // 0.0 to 1.0
}

// ============================================================================
// INTERPOLATION BUFFER
// ============================================================================

message InterpolationBuffer {
  // Stores recent server states for smooth interpolation
  repeated ServerState state_history = 1;
  int32 max_history_size = 2;

  // Current interpolation
  int64 interpolation_start_ms = 10;
  int64 interpolation_end_ms = 11;
  float interpolation_alpha = 12;  // 0.0 to 1.0

  // Interpolation settings
  InterpolationSettings settings = 20;
}

message InterpolationSettings {
  // How far behind server to interpolate (for smooth motion)
  int32 interpolation_delay_ms = 1;  // Default: 100ms

  // Extrapolation settings (when server is late)
  bool allow_extrapolation = 10;
  int32 max_extrapolation_ms = 11;  // Max time to extrapolate (default: 200ms)

  // Smoothing
  enum InterpolationMode {
    LINEAR = 0;
    CUBIC = 1;
    HERMITE = 2;
  }
  InterpolationMode mode = 20;
}

// ============================================================================
// CLIENT UPDATE REQUEST (to server)
// ============================================================================

message ClientUpdateRequest {
  string client_id = 1;
  int64 client_timestamp_ms = 2;

  // Last received server state
  int64 last_received_frame = 10;
  int64 last_received_timestamp_ms = 11;

  // Client actions since last update
  repeated ClientAction actions = 20;

  // Request specific updates
  repeated string requested_entity_ids = 30;
  repeated string requested_ui_element_ids = 31;
}

message ClientAction {
  string action_id = 1;
  int64 timestamp_ms = 2;

  oneof action_type {
    UIClickAction ui_click = 10;
    UIHoverAction ui_hover = 11;
    EntityInteractionAction entity_interaction = 12;
    InputAction input = 13;
  }
}

message UIClickAction {
  string element_id = 1;
  cryo.common.CryoVec2 click_position = 2;
  int32 button = 3;  // 0 = left, 1 = middle, 2 = right
}

message UIHoverAction {
  string element_id = 1;
  cryo.common.CryoVec2 hover_position = 2;
  float hover_duration = 3;
}

message EntityInteractionAction {
  string entity_id = 1;
  string interaction_type = 2;  // "pickup", "use", "examine"
}

message InputAction {
  string input_type = 1;  // "keyboard", "gamepad"
  string key = 2;
  bool pressed = 3;
}

// ============================================================================
// SERVER UPDATE RESPONSE (from server)
// ============================================================================

message ServerUpdateResponse {
  int64 server_timestamp_ms = 1;
  int64 frame_number = 2;

  // Updated state (can be delta or full)
  oneof update_type {
    ServerState full_state = 10;
    ServerStateDelta delta_state = 11;
  }

  // Prediction confirmations
  repeated PredictionConfirmation confirmations = 20;

  // Server commands to execute
  repeated ServerCommand commands = 30;

  // Next update timing
  int32 next_update_ms = 40;  // When to expect next update
}

message ServerStateDelta {
  int64 base_frame = 1;

  // Only changed entities
  repeated EntityState entity_updates = 10;

  // Only changed UI elements
  repeated cryo.ui.UIElementState ui_updates = 20;

  // Environment changes
  optional EnvironmentState environment_update = 30;
}

message PredictionConfirmation {
  string prediction_id = 1;

  enum ConfirmationResult {
    CONFIRMED = 0;      // Prediction was correct
    CORRECTED = 1;      // Prediction was close, server corrected
    REJECTED = 2;       // Prediction was wrong, rollback needed
  }
  ConfirmationResult result = 2;

  // If corrected, the actual state
  bytes corrected_state = 10;
}

message ServerCommand {
  string command_id = 1;

  oneof command_type {
    PlayAnimationCommand play_animation = 10;
    PlaySoundCommand play_sound = 11;
    ShowEffectCommand show_effect = 12;
    UpdateUICommand update_ui = 13;
  }
}

message PlayAnimationCommand {
  string entity_id = 1;
  string animation_name = 2;
  float duration = 3;
}

message PlaySoundCommand {
  string sound_id = 1;
  cryo.common.CryoVec3 position = 2;
  float volume = 3;
}

message ShowEffectCommand {
  string effect_type = 1;
  cryo.common.CryoVec3 position = 2;
  map<string, float> parameters = 3;
}

message UpdateUICommand {
  string element_id = 1;
  cryo.ui.UIElementState new_state = 2;
}

// ============================================================================
// BUFFER STATISTICS
// ============================================================================

message BufferStatistics {
  // Update statistics
  int32 total_updates_received = 1;
  int32 updates_in_last_second = 2;
  float average_update_interval_ms = 3;

  // Time since last update
  int64 ms_since_last_update = 10;

  // Prediction statistics
  int32 predictions_made = 20;
  int32 predictions_confirmed = 21;
  int32 predictions_rejected = 22;
  float prediction_accuracy = 23;  // 0.0 to 1.0

  // Interpolation statistics
  int32 interpolation_buffer_size = 30;
  bool is_extrapolating = 31;
  int64 extrapolation_time_ms = 32;

  // Network statistics
  float average_latency_ms = 40;
  float latency_jitter_ms = 41;
}

// ============================================================================
// CLIENT CONFIGURATION
// ============================================================================

message ClientConfiguration {
  // Update intervals
  int32 server_update_interval_ms = 1;  // How often server sends updates (default: 1000ms)
  int32 client_poll_interval_ms = 2;    // How often client polls (default: 5000ms)

  // Survival settings
  int32 max_survival_time_ms = 10;      // Max time without server (default: 5000ms)
  bool enable_extrapolation = 11;        // Allow state extrapolation

  // Prediction settings
  bool enable_client_prediction = 20;
  float prediction_confidence = 21;      // 0.0 to 1.0

  // Interaction settings
  bool immediate_interaction_feedback = 30;  // Update UI immediately on interaction
  int32 hover_delay_ms = 31;                 // Delay before hover activates (default: 100ms)

  // Quality settings
  InterpolationSettings interpolation = 40;
}

// ============================================================================
// RECONCILIATION
// ============================================================================

message StateReconciliation {
  string client_id = 1;
  int64 reconciliation_time_ms = 2;

  // Client state at reconciliation
  bytes client_state_hash = 10;

  // Server state at reconciliation
  bytes server_state_hash = 11;

  // Differences found
  repeated StateDifference differences = 20;

  // Reconciliation action taken
  enum ReconciliationAction {
    NO_ACTION = 0;           // States match
    SOFT_CORRECTION = 1;     // Minor interpolation to server state
    HARD_CORRECTION = 2;     // Snap to server state
    ROLLBACK = 3;            // Rollback predictions
  }
  ReconciliationAction action = 30;
}

message StateDifference {
  string entity_id = 1;
  string property = 2;
  string client_value = 3;
  string server_value = 4;
  float difference_magnitude = 5;
}