// cryo_sync.proto - Multi-client synchronization
// Defines messages for synchronizing state between multiple clients
syntax = "proto3";

package cryo.sync;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "google/protobuf/timestamp.proto";

// ==============================================================================
// CLIENT REGISTRATION
// ==============================================================================

message RegisterClientCommand {
  string client_name = 1;
  ClientType client_type = 2;
  ClientCapabilities capabilities = 3;
  map<string, string> metadata = 4;

  enum ClientType {
    EDITOR = 0;
    GAME_CLIENT = 1;
    SERVER = 2;
    TOOL = 3;
    VIEWER = 4;
  }
}

message ClientCapabilities {
  bool can_modify_scene = 1;
  bool can_receive_updates = 2;
  bool requires_full_sync = 3;
  repeated string supported_features = 4;
}

message RegisterClientResponse {
  bool success = 1;
  string client_id = 2;
  string session_id = 3;
  SyncState initial_state = 4;
  string error_message = 5;
}

message UnregisterClientCommand {
  string client_id = 1;
}

message UnregisterClientResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// SYNC STATE
// ==============================================================================

message SyncState {
  uint64 state_version = 1;
  google.protobuf.Timestamp timestamp = 2;
  uint32 frame_number = 3;
  repeated string active_clients = 4;
  uint64 state_hash = 5;                        // Hash of current state
  map<string, string> metadata = 6;
}

message GetSyncStateCommand {
  string client_id = 1;
}

message GetSyncStateResponse {
  bool success = 1;
  SyncState state = 2;
  string error_message = 3;
}

// ==============================================================================
// SYNCHRONIZATION MESSAGES
// ==============================================================================

message SyncMessage {
  string sender_client_id = 1;
  uint64 sequence_number = 2;
  google.protobuf.Timestamp timestamp = 3;
  SyncMessageType type = 4;
  bytes payload = 5;                            // Serialized update data

  enum SyncMessageType {
    STATE_UPDATE = 0;
    COMMAND = 1;
    EVENT = 2;
    HEARTBEAT = 3;
    ACK = 4;
  }
}

message BroadcastSyncMessageCommand {
  SyncMessage message = 1;
  BroadcastOptions options = 2;
}

message BroadcastOptions {
  repeated string target_clients = 1;           // Empty = all clients
  bool exclude_sender = 2;
  bool reliable = 3;                            // Guaranteed delivery
  bool ordered = 4;                             // Maintain order
}

message BroadcastSyncMessageResponse {
  bool success = 1;
  int32 recipient_count = 2;
  string error_message = 3;
}

// ==============================================================================
// OWNERSHIP AND LOCKING
// ==============================================================================

message RequestOwnershipCommand {
  string client_id = 1;
  string entity_id = 2;
  OwnershipMode mode = 3;

  enum OwnershipMode {
    EXCLUSIVE = 0;                              // Only this client can modify
    SHARED = 1;                                 // Multiple clients can modify
    TEMPORARY = 2;                              // Ownership for limited time
  }
}

message RequestOwnershipResponse {
  bool success = 1;
  bool granted = 2;
  string current_owner = 3;
  string error_message = 4;
}

message ReleaseOwnershipCommand {
  string client_id = 1;
  string entity_id = 2;
}

message ReleaseOwnershipResponse {
  bool success = 1;
  string error_message = 2;
}

message LockEntityCommand {
  string client_id = 1;
  string entity_id = 2;
  LockType lock_type = 3;
  float timeout_seconds = 4;                    // 0 = no timeout

  enum LockType {
    READ_LOCK = 0;
    WRITE_LOCK = 1;
    EXCLUSIVE_LOCK = 2;
  }
}

message LockEntityResponse {
  bool success = 1;
  string lock_id = 2;
  string error_message = 3;
}

message UnlockEntityCommand {
  string lock_id = 1;
}

message UnlockEntityResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// CONFLICT RESOLUTION
// ==============================================================================

message ConflictNotification {
  string entity_id = 1;
  string property_path = 2;
  repeated ConflictingChange conflicts = 3;
  ResolutionStrategy suggested_resolution = 4;

  enum ResolutionStrategy {
    LAST_WRITE_WINS = 0;
    FIRST_WRITE_WINS = 1;
    MERGE = 2;
    MANUAL = 3;
  }
}

message ConflictingChange {
  string client_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  bytes value = 3;
  uint64 version = 4;
}

message ResolveConflictCommand {
  string entity_id = 1;
  string property_path = 2;
  ConflictResolution resolution = 3;
}

message ConflictResolution {
  ResolutionType type = 1;
  string winning_client_id = 2;                 // For CHOOSE_CLIENT
  bytes merged_value = 3;                       // For CUSTOM

  enum ResolutionType {
    ACCEPT_SERVER = 0;
    ACCEPT_CLIENT = 1;
    CHOOSE_CLIENT = 2;                          // Choose specific client's value
    MERGE = 3;                                  // Merge values
    CUSTOM = 4;                                 // Custom resolution
  }
}

message ResolveConflictResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// DELTA SYNCHRONIZATION
// ==============================================================================

message RequestDeltaSyncCommand {
  string client_id = 1;
  uint64 last_known_version = 2;
  DeltaSyncOptions options = 3;
}

message DeltaSyncOptions {
  bool include_transforms = 1;
  bool include_components = 2;
  bool include_properties = 3;
  bool compress = 4;
  repeated string entity_filter = 5;
}

message RequestDeltaSyncResponse {
  bool success = 1;
  DeltaSyncData delta = 2;
  string error_message = 3;
}

message DeltaSyncData {
  uint64 from_version = 1;
  uint64 to_version = 2;
  repeated DeltaChange changes = 3;
  uint64 compressed_size = 4;
}

message DeltaChange {
  ChangeType type = 1;
  string entity_id = 2;
  string property_path = 3;
  bytes value = 4;

  enum ChangeType {
    ADD = 0;
    REMOVE = 1;
    MODIFY = 2;
  }
}

// ==============================================================================
// FULL SYNCHRONIZATION
// ==============================================================================

message RequestFullSyncCommand {
  string client_id = 1;
  FullSyncOptions options = 2;
}

message FullSyncOptions {
  bool include_disabled = 1;
  bool include_hidden = 2;
  bool compress = 3;
  repeated string entity_filter = 4;
}

message RequestFullSyncResponse {
  bool success = 1;
  FullSyncData data = 2;
  string error_message = 3;
}

message FullSyncData {
  uint64 version = 1;
  google.protobuf.Timestamp timestamp = 2;
  bytes scene_data = 3;                         // Serialized scene state
  uint64 uncompressed_size = 4;
  uint64 compressed_size = 5;
}

// ==============================================================================
// HEARTBEAT AND PRESENCE
// ==============================================================================

message HeartbeatMessage {
  string client_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  ClientStatus status = 3;

  enum ClientStatus {
    ACTIVE = 0;
    IDLE = 1;
    BUSY = 2;
  }
}

message GetConnectedClientsCommand {}

message GetConnectedClientsResponse {
  bool success = 1;
  repeated ClientInfo clients = 2;
  string error_message = 3;
}

message ClientInfo {
  string client_id = 1;
  string client_name = 2;
  RegisterClientCommand.ClientType type = 3;
  google.protobuf.Timestamp connected_at = 4;
  google.protobuf.Timestamp last_heartbeat = 5;
  HeartbeatMessage.ClientStatus status = 6;
  map<string, string> metadata = 7;
}

// ==============================================================================
// SESSION MANAGEMENT
// ==============================================================================

message CreateSessionCommand {
  string session_name = 1;
  SessionSettings settings = 2;
}

message SessionSettings {
  int32 max_clients = 1;
  bool require_authentication = 2;
  ConflictNotification.ResolutionStrategy conflict_resolution = 3;
  bool enable_undo_redo = 4;
  int32 max_undo_levels = 5;
}

message CreateSessionResponse {
  bool success = 1;
  string session_id = 2;
  string error_message = 3;
}

message JoinSessionCommand {
  string client_id = 1;
  string session_id = 2;
  string auth_token = 3;
}

message JoinSessionResponse {
  bool success = 1;
  SyncState initial_state = 2;
  string error_message = 3;
}

message LeaveSessionCommand {
  string client_id = 1;
  string session_id = 2;
}

message LeaveSessionResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// BANDWIDTH OPTIMIZATION
// ==============================================================================

message SetSyncQualityCommand {
  string client_id = 1;
  SyncQuality quality = 2;

  enum SyncQuality {
    LOW = 0;                                    // Minimal updates
    MEDIUM = 1;                                 // Balanced
    HIGH = 2;                                   // Full fidelity
    ADAPTIVE = 3;                               // Auto-adjust based on bandwidth
  }
}

message SetSyncQualityResponse {
  bool success = 1;
  string error_message = 2;
}
