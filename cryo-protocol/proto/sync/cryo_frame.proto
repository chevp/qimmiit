// cryo_frame.proto - Frame-based synchronization with I-Frame/P-Frame concept
// Temporal optimization for video-streaming-like scene updates
syntax = "proto3";

package cryo.frame;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================
//
// CRYO FRAME PROTOCOL
//
// Frame-basiertes Protokoll für zeitliche/sequenzielle Optimierung,
// inspiriert von Video-Codec-Konzepten (I-Frames, P-Frames, B-Frames).
//
// DESIGN RATIONALE:
//   1. FULL frames (I-Frames) = Vollständiger Zustand
//      → Kann unabhängig dekodiert werden
//      → Recovery point bei Packet-Loss
//      → Neuer Client kann sofort einsteigen
//
//   2. DELTA frames (P-Frames) = Nur Änderungen
//      → Referenziert vorherigen Frame
//      → Minimale Bandbreite
//      → Hohe Frequenz möglich (60 FPS+)
//
//   3. BIDIRECTIONAL frames (B-Frames) = Interpoliert zwischen zwei Frames
//      → Noch höhere Kompression
//      → Für Playback/Recording
//
// VERWENDUNG:
//   - Real-time Scene Streaming (60 FPS)
//   - Session Recording & Playback
//   - Network Synchronization
//   - Deterministic Replay
//   - Scene State History
//
// BEISPIEL:
//   Frame 0:  FULL  (I-Frame)  ← Recovery Point
//   Frame 1:  DELTA (P-Frame)  ← Basiert auf Frame 0
//   Frame 2:  DELTA (P-Frame)  ← Basiert auf Frame 1
//   ...
//   Frame 60: FULL  (I-Frame)  ← Recovery Point (alle 1 Sekunde @ 60 FPS)
//
// ==============================================================================

import "google/protobuf/timestamp.proto";
import "cryo_common.proto";
import "cryo_container.proto";

// ============================================================================
// FRAME (Single frame in a sequence)
// ============================================================================

message Frame {
  // Frame identification
  int64 frame_number = 1;               // Fortlaufende Frame-ID (0, 1, 2, ...)
  google.protobuf.Timestamp timestamp = 2;  // Zeitstempel
  int64 timestamp_ms = 3;               // Millisekunden seit Stream-Start

  // Frame type (I-Frame, P-Frame, B-Frame)
  FrameType type = 4;

  // Reference frames (für P-Frames und B-Frames)
  repeated int64 reference_frames = 5;  // Frame-Nummern, auf die referenziert wird

  // Frame content
  repeated MessageGroup groups = 10;

  // Frame metadata
  FrameMetadata metadata = 20;

  // Compression
  optional FrameCompression compression = 30;

  enum FrameType {
    FULL = 0;                           // I-Frame: Vollständiger Zustand
    DELTA = 1;                          // P-Frame: Nur Änderungen seit letztem Frame
    BIDIRECTIONAL = 2;                  // B-Frame: Interpoliert zwischen zwei Frames
    SKIP = 3;                           // Skip-Frame: Kein Update (für Frame-Dropping)
  }
}

// ============================================================================
// MESSAGE GROUP (Thematically related messages)
// ============================================================================

message MessageGroup {
  string group_id = 1;
  string purpose = 2;                   // z.B. "scene_shader_update", "camera_movement"

  // Messages in this group - type-safe using CryoContainer
  repeated container.CryoContainer data = 10;

  // Group priority
  GroupPriority priority = 20;

  // Group flags
  bool atomic = 30;                     // Alle Messages oder keine
  bool ordered = 31;                    // Messages müssen in Reihenfolge verarbeitet werden

  enum GroupPriority {
    LOW = 0;
    NORMAL = 1;
    HIGH = 2;
    CRITICAL = 3;
  }
}

// ============================================================================
// FRAME METADATA
// ============================================================================

message FrameMetadata {
  // Size information
  int64 frame_size_bytes = 1;
  int64 uncompressed_size_bytes = 2;

  // Content statistics
  int32 message_count = 10;
  int32 group_count = 11;

  // Frame quality/importance
  float quality_factor = 20;            // 0.0 (low) to 1.0 (high)
  bool is_keyframe = 21;                // Important recovery point

  // Encoding info
  string encoder_version = 30;
  map<string, string> custom_metadata = 31;
}

// ============================================================================
// FRAME COMPRESSION
// ============================================================================

message FrameCompression {
  enum CompressionMethod {
    NONE = 0;
    ZLIB = 1;
    ZSTD = 2;
    LZ4 = 3;
    BROTLI = 4;
  }

  CompressionMethod method = 1;
  int32 compression_level = 2;          // 1-9 (oder algorithm-specific)
  float compression_ratio = 3;          // Original / Compressed
}

// ============================================================================
// FRAME STREAM (Collection of frames)
// ============================================================================

message FrameStream {
  string stream_id = 1;
  google.protobuf.Timestamp start_time = 2;

  // Stream configuration
  StreamConfig config = 10;

  // All frames in this stream
  repeated Frame frames = 20;

  // Stream statistics
  StreamStatistics stats = 30;
}

message StreamConfig {
  float target_fps = 1;                 // Ziel-Frame-Rate (z.B. 60.0)
  int32 keyframe_interval = 2;          // I-Frame alle N Frames (z.B. 60)
  bool allow_frame_drop = 3;            // Frame-Dropping bei Überlastung erlaubt
  int32 max_reference_distance = 4;     // Max Distanz für P-Frame-Referenzen
}

message StreamStatistics {
  int32 total_frames = 1;
  int32 full_frames = 2;                // I-Frames
  int32 delta_frames = 3;               // P-Frames
  int32 bidirectional_frames = 4;       // B-Frames
  int32 dropped_frames = 5;

  float average_fps = 10;
  float average_frame_size_bytes = 11;

  int64 total_bytes = 20;
  int64 total_compressed_bytes = 21;
  float average_compression_ratio = 22;
}

// ============================================================================
// FRAME PLAYBACK
// ============================================================================

message PlaybackControl {
  string stream_id = 1;

  oneof control {
    PlayCommand play = 10;
    PauseCommand pause = 11;
    SeekCommand seek = 12;
    StepCommand step = 13;
    SetSpeedCommand set_speed = 14;
  }
}

message PlayCommand {
  int64 from_frame = 1;                 // Start frame (optional)
  bool loop = 2;
}

message PauseCommand {
  // Empty - just pause at current frame
}

message SeekCommand {
  oneof target {
    int64 frame_number = 1;
    int64 timestamp_ms = 2;
    SeekMode mode = 3;
  }

  enum SeekMode {
    NEXT_KEYFRAME = 0;                  // Nächster I-Frame
    PREV_KEYFRAME = 1;                  // Vorheriger I-Frame
    END = 2;
    START = 3;
  }
}

message StepCommand {
  int32 frames = 1;                     // Positive = vorwärts, Negative = rückwärts
}

message SetSpeedCommand {
  float speed = 1;                      // 1.0 = normal, 2.0 = 2x, 0.5 = half
}

// ============================================================================
// FRAME ENCODING/DECODING
// ============================================================================

message EncodeFrameRequest {
  oneof source {
    SceneSnapshot scene_snapshot = 1;
    SceneDelta scene_delta = 2;
  }

  EncodingOptions options = 10;
}

message SceneSnapshot {
  // Vollständiger Szenen-Zustand - type-safe using CryoContainer
  container.CryoContainer scene_data = 1;
}

message SceneDelta {
  // Nur Änderungen seit letztem Frame - type-safe using CryoContainer
  repeated container.CryoContainer changes = 1;
  int64 base_frame_number = 2;
}

message EncodingOptions {
  FrameType force_type = 1;             // Frame-Typ erzwingen (optional)
  FrameCompression.CompressionMethod compression = 2;
  int32 compression_level = 3;
  bool compute_quality = 4;             // Quality-Metrik berechnen
}

message EncodeFrameResponse {
  Frame encoded_frame = 1;
  EncodingStatistics stats = 2;
}

message EncodingStatistics {
  int64 original_size_bytes = 1;
  int64 encoded_size_bytes = 2;
  float compression_ratio = 3;
  float encoding_time_ms = 4;
}

message DecodeFrameRequest {
  Frame frame = 1;

  // Context frames (for P-Frames)
  repeated Frame reference_frames = 2;

  DecodingOptions options = 10;
}

message DecodingOptions {
  bool validate_references = 1;
  bool compute_checksum = 2;
}

message DecodeFrameResponse {
  container.CryoContainer decoded_data = 1;
  DecodingStatistics stats = 2;
}

message DecodingStatistics {
  float decoding_time_ms = 1;
  bool complete = 2;                    // Alle Referenzen verfügbar?
  repeated int64 missing_references = 3;
}

// ============================================================================
// FRAME BUFFER (für Client-Side Buffering)
// ============================================================================

message FrameBuffer {
  string buffer_id = 1;
  int32 capacity = 2;                   // Max Anzahl Frames

  repeated Frame frames = 10;

  // Buffer state
  int64 head_frame = 20;                // Nächster zu lesender Frame
  int64 tail_frame = 21;                // Letzter geschriebener Frame
  int32 size = 22;                      // Aktuelle Anzahl Frames

  // Buffer statistics
  BufferStatistics stats = 30;
}

message BufferStatistics {
  int32 underruns = 1;                  // Wie oft war Buffer leer
  int32 overruns = 2;                   // Wie oft war Buffer voll
  float average_fill_level = 3;         // Durchschnittliche Füllstand (0.0 - 1.0)
  int64 total_frames_buffered = 4;
}

// ============================================================================
// FRAME SYNCHRONIZATION
// ============================================================================

message SyncPoint {
  int64 frame_number = 1;
  google.protobuf.Timestamp timestamp = 2;
  bytes state_hash = 3;                 // Hash des Zustands an diesem Punkt

  // Sync metadata
  string checkpoint_name = 10;
  string description = 11;
}

message FrameSyncRequest {
  string client_id = 1;
  int64 current_frame = 2;
  optional bytes current_state_hash = 3;
}

message FrameSyncResponse {
  SyncStatus status = 1;

  oneof sync_action {
    CatchUpFrames catch_up = 10;
    FullResync full_resync = 11;
  }

  enum SyncStatus {
    IN_SYNC = 0;
    BEHIND = 1;                         // Client ist hinterher
    AHEAD = 2;                          // Client ist voraus (!)
    DESYNC = 3;                         // State-Hashes stimmen nicht überein
  }
}

message CatchUpFrames {
  repeated Frame frames = 1;
  int64 target_frame = 2;
}

message FullResync {
  Frame keyframe = 1;                   // I-Frame für vollständigen Resync
  int64 frame_number = 2;
}

// ============================================================================
// FRAME RECORDING (für Replay)
// ============================================================================

message RecordingSession {
  string session_id = 1;
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;

  // Recording metadata
  RecordingMetadata metadata = 10;

  // Stream configuration
  StreamConfig config = 20;

  // Frame data (can be large!)
  oneof storage {
    FrameStream inline_stream = 30;
    string external_file_path = 31;
  }
}

message RecordingMetadata {
  string title = 1;
  string description = 2;
  string author = 3;
  repeated string tags = 4;

  int64 duration_ms = 10;
  int32 total_frames = 11;
  float average_fps = 12;
}

message StartRecordingRequest {
  string session_id = 1;
  StreamConfig config = 2;
  RecordingMetadata metadata = 3;
}

message StopRecordingRequest {
  string session_id = 1;
  bool save_to_file = 2;
  string output_path = 3;
}

message RecordingStatus {
  string session_id = 1;
  bool is_recording = 2;

  int32 frames_recorded = 10;
  int64 duration_ms = 11;
  int64 data_size_bytes = 12;
}

// ============================================================================
// FRAME SERVICE (gRPC)
// ============================================================================

service FrameService {
  // Streaming

  // Client receives frames from server (live streaming)
  rpc SubscribeToFrames (SubscribeRequest) returns (stream Frame);

  // Client sends frames to server (e.g., for recording)
  rpc PublishFrames (stream Frame) returns (PublishResponse);

  // Bidirectional frame streaming
  rpc StreamFrames (stream Frame) returns (stream Frame);

  // Encoding/Decoding

  // Encode scene data to frame
  rpc EncodeFrame (EncodeFrameRequest) returns (EncodeFrameResponse);

  // Decode frame to scene data
  rpc DecodeFrame (DecodeFrameRequest) returns (DecodeFrameResponse);

  // Synchronization

  // Sync client to current frame
  rpc SyncToFrame (FrameSyncRequest) returns (FrameSyncResponse);

  // Get sync points (keyframes)
  rpc GetSyncPoints (GetSyncPointsRequest) returns (GetSyncPointsResponse);

  // Playback

  // Control playback (play, pause, seek)
  rpc ControlPlayback (PlaybackControl) returns (PlaybackStatus);

  // Get current playback status
  rpc GetPlaybackStatus (GetPlaybackStatusRequest) returns (PlaybackStatus);

  // Recording

  // Start recording session
  rpc StartRecording (StartRecordingRequest) returns (RecordingStatus);

  // Stop recording session
  rpc StopRecording (StopRecordingRequest) returns (RecordingStatus);

  // Get recording status
  rpc GetRecordingStatus (GetRecordingStatusRequest) returns (RecordingStatus);

  // Load recorded session
  rpc LoadRecording (LoadRecordingRequest) returns (RecordingSession);
}

// ============================================================================
// SERVICE MESSAGES
// ============================================================================

message SubscribeRequest {
  string stream_id = 1;

  oneof start_point {
    int64 from_frame = 10;
    google.protobuf.Timestamp from_time = 11;
    bool from_latest = 12;
    bool from_keyframe = 13;            // Nächster I-Frame
  }

  // Filter options
  repeated string group_purposes = 20;  // Nur bestimmte Message-Groups
  bool keyframes_only = 21;             // Nur I-Frames
}

message PublishResponse {
  int32 frames_received = 1;
  bool success = 2;
  string error_message = 3;
}

message GetSyncPointsRequest {
  string stream_id = 1;
  int64 from_frame = 2;
  int64 to_frame = 3;
}

message GetSyncPointsResponse {
  repeated SyncPoint sync_points = 1;
}

message PlaybackStatus {
  string stream_id = 1;
  PlaybackState state = 2;

  int64 current_frame = 10;
  google.protobuf.Timestamp current_time = 11;
  float playback_speed = 12;

  int64 total_frames = 20;
  int64 duration_ms = 21;

  enum PlaybackState {
    STOPPED = 0;
    PLAYING = 1;
    PAUSED = 2;
    SEEKING = 3;
  }
}

message GetPlaybackStatusRequest {
  string stream_id = 1;
}

message GetRecordingStatusRequest {
  string session_id = 1;
}

message LoadRecordingRequest {
  string file_path = 1;
}

// ============================================================================
// FRAME ANALYTICS
// ============================================================================

message FrameAnalytics {
  string stream_id = 1;

  // Time range
  int64 from_frame = 10;
  int64 to_frame = 11;

  // Frame type distribution
  int32 full_frame_count = 20;
  int32 delta_frame_count = 21;
  int32 bidirectional_frame_count = 22;

  // Size statistics
  int64 total_bytes = 30;
  int64 average_frame_size_bytes = 31;
  int64 min_frame_size_bytes = 32;
  int64 max_frame_size_bytes = 33;

  // Compression statistics
  float average_compression_ratio = 40;

  // FPS statistics
  float average_fps = 50;
  float min_fps = 51;
  float max_fps = 52;

  // Quality metrics
  float average_quality = 60;
}

message GetFrameAnalyticsRequest {
  string stream_id = 1;
  int64 from_frame = 2;
  int64 to_frame = 3;
}

message GetFrameAnalyticsResponse {
  FrameAnalytics analytics = 1;
}
