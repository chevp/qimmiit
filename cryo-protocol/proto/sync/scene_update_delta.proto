// scene_update_delta.proto - Differential scene updates
// Delta updates for efficient bandwidth usage
syntax = "proto3";

package cryo.scene;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";

// ============================================================================
// DELTA UPDATE (Main message)
// ============================================================================

message DeltaUpdate {
  string update_id = 1;
  int64 timestamp_ms = 2;

  // Base state version this delta is based on
  int64 base_version = 3;
  int64 target_version = 4;

  oneof delta {
    // Transform deltas
    TransformDelta transform_delta = 10;
    PositionDelta position_delta = 11;
    RotationDelta rotation_delta = 12;
    ScaleDelta scale_delta = 13;

    // Visual deltas
    ColorDelta color_delta = 20;
    OpacityDelta opacity_delta = 21;
    VisibilityDelta visibility_delta = 22;

    // Material deltas
    MaterialPropertyDelta material_delta = 30;

    // Animation deltas
    AnimationStateDelta animation_delta = 40;

    // Batch delta (multiple changes)
    BatchDelta batch_delta = 50;
  }
}

// ============================================================================
// TRANSFORM DELTAS
// ============================================================================

message TransformDelta {
  string entity_id = 1;

  // Delta values (add to current state)
  oneof delta_type {
    cryo.common.CryoVec3 position_delta = 10;
    cryo.common.CryoVec4 rotation_delta = 11;  // Quaternion delta
    cryo.common.CryoVec3 scale_delta = 12;
    CompleteDelta complete = 13;  // All components changed
  }

  bool relative = 20;  // true = add to current, false = set absolute
}

message CompleteDelta {
  cryo.common.CryoVec3 position_delta = 1;
  cryo.common.CryoVec4 rotation_delta = 2;
  cryo.common.CryoVec3 scale_delta = 3;
}

message PositionDelta {
  string entity_id = 1;
  cryo.common.CryoVec3 delta = 2;

  enum DeltaSpace {
    WORLD = 0;
    LOCAL = 1;
  }
  DeltaSpace space = 3;
}

message RotationDelta {
  string entity_id = 1;

  oneof rotation_delta {
    cryo.common.CryoVec4 quaternion_delta = 2;
    cryo.common.CryoVec3 euler_delta = 3;  // Degrees
    float axis_angle_delta = 4;            // Single axis rotation
  }

  enum RotationAxis {
    X = 0;
    Y = 1;
    Z = 2;
  }
  RotationAxis axis = 5;  // For axis_angle_delta
}

message ScaleDelta {
  string entity_id = 1;
  cryo.common.CryoVec3 delta = 2;
  bool uniform = 3;  // If true, delta.x applies to all axes
}

// ============================================================================
// VISUAL PROPERTY DELTAS
// ============================================================================

message ColorDelta {
  string entity_id = 1;
  cryo.common.CryoColor delta = 2;  // RGBA delta values

  bool clamp = 10;  // Clamp result to [0, 1]
}

message OpacityDelta {
  string entity_id = 1;
  float delta = 2;  // -1.0 to 1.0

  bool clamp = 10;
}

message VisibilityDelta {
  string entity_id = 1;
  bool visible = 2;
}

// ============================================================================
// MATERIAL PROPERTY DELTAS
// ============================================================================

message MaterialPropertyDelta {
  string entity_id = 1;
  string property_name = 2;

  oneof delta {
    float float_delta = 10;
    cryo.common.CryoVec2 vec2_delta = 11;
    cryo.common.CryoVec3 vec3_delta = 12;
    cryo.common.CryoVec4 vec4_delta = 13;
    cryo.common.CryoColor color_delta = 14;
  }

  bool clamp = 20;
}

// ============================================================================
// ANIMATION STATE DELTAS
// ============================================================================

message AnimationStateDelta {
  string entity_id = 1;
  string animation_id = 2;

  // Playback state changes
  optional float time_delta = 10;      // Time offset
  optional float speed_delta = 11;     // Speed change
  optional float weight_delta = 12;    // Blend weight change

  // State flags
  optional bool playing = 20;
  optional bool paused = 21;
}

// ============================================================================
// BATCH DELTA
// ============================================================================

message BatchDelta {
  repeated DeltaUpdate deltas = 1;

  // Batch metadata
  enum BatchMode {
    SEQUENTIAL = 0;  // Apply in order
    PARALLEL = 1;    // Apply simultaneously
  }
  BatchMode mode = 2;
}

// ============================================================================
// COMPRESSED DELTA
// ============================================================================

message CompressedDelta {
  string entity_id = 1;

  // Bit flags for what changed (efficient encoding)
  uint32 changed_flags = 2;

  // Packed data (only includes changed values)
  bytes packed_data = 10;

  // Compression metadata
  CompressionInfo compression = 20;
}

message CompressionInfo {
  enum CompressionMethod {
    NONE = 0;
    ZLIB = 1;
    ZSTD = 2;
    QUANTIZED = 3;  // Quantized values (e.g., 16-bit floats)
  }
  CompressionMethod method = 1;

  int32 original_size = 2;
  int32 compressed_size = 3;
}

// Bit flags for changed_flags
enum ChangedFlags {
  CHANGED_NONE = 0;
  CHANGED_POSITION_X = 1;
  CHANGED_POSITION_Y = 2;
  CHANGED_POSITION_Z = 4;
  CHANGED_ROTATION = 8;
  CHANGED_SCALE = 16;
  CHANGED_COLOR = 32;
  CHANGED_OPACITY = 64;
  CHANGED_VISIBILITY = 128;
}

// ============================================================================
// QUANTIZED DELTA (for bandwidth optimization)
// ============================================================================

message QuantizedDelta {
  string entity_id = 1;

  // Quantized position delta (16-bit per component)
  QuantizedVec3 position_delta = 10;

  // Quantized rotation delta (smallest three quaternion components)
  QuantizedQuat rotation_delta = 11;

  // Quantized scale delta (16-bit per component)
  QuantizedVec3 scale_delta = 12;

  // Quantization parameters
  float position_precision = 20;  // e.g., 0.001 = millimeter precision
  float rotation_precision = 21;  // e.g., 0.01 degrees
  float scale_precision = 22;
}

message QuantizedVec3 {
  int32 x = 1;  // Quantized value
  int32 y = 2;
  int32 z = 3;
}

message QuantizedQuat {
  int32 x = 1;
  int32 y = 2;
  int32 z = 3;
  bool w_sign = 4;  // Sign of w component (w is reconstructed)
}

// ============================================================================
// INTERPOLATED DELTA
// ============================================================================

message InterpolatedDelta {
  string entity_id = 1;

  // Start and end states
  StateSnapshot start_state = 10;
  StateSnapshot end_state = 11;

  // Interpolation parameters
  float duration = 20;       // Seconds
  float current_time = 21;   // Current position in interpolation

  enum InterpolationMode {
    LINEAR = 0;
    SPHERICAL = 1;  // For rotations (slerp)
    CUBIC = 2;
    EASE_IN_OUT = 3;
  }
  InterpolationMode mode = 22;
}

message StateSnapshot {
  cryo.common.CryoVec3 position = 1;
  cryo.common.CryoVec4 rotation = 2;
  cryo.common.CryoVec3 scale = 3;
  cryo.common.CryoColor color = 4;
  float opacity = 5;
}

// ============================================================================
// SEMANTIC VERBS
// ============================================================================

message ApplyDelta {
  string entity_id = 1;
  DeltaUpdate delta = 2;

  // How to apply
  enum ApplyMode {
    ADD = 0;          // Add delta to current state
    SUBTRACT = 1;     // Subtract delta from current state
    MULTIPLY = 2;     // Multiply current state by delta
    INTERPOLATE = 3;  // Interpolate towards delta
  }
  ApplyMode mode = 3;

  float interpolation_factor = 10;  // For INTERPOLATE mode (0-1)
}

// ============================================================================
// DELTA ACCUMULATOR
// ============================================================================

message DeltaAccumulator {
  string entity_id = 1;

  // Accumulated deltas (not yet applied)
  repeated DeltaUpdate pending_deltas = 2;

  // Accumulation strategy
  enum AccumulationStrategy {
    SUM = 0;          // Sum all deltas
    LATEST = 1;       // Only keep latest delta per property
    AVERAGE = 2;      // Average all deltas
    WEIGHTED = 3;     // Weighted average based on timestamp
  }
  AccumulationStrategy strategy = 3;

  // Flush settings
  float flush_interval_ms = 10;  // Auto-flush after this interval
  int32 max_pending = 11;        // Auto-flush after this many deltas
}

// ============================================================================
// DELTA STREAM
// ============================================================================

message DeltaStream {
  string stream_id = 1;

  // Stream of deltas over time
  repeated TimestampedDelta deltas = 2;

  // Stream metadata
  int64 start_timestamp_ms = 10;
  int64 end_timestamp_ms = 11;
  float sample_rate = 12;  // Deltas per second
}

message TimestampedDelta {
  int64 timestamp_ms = 1;
  DeltaUpdate delta = 2;
}

// ============================================================================
// DELTA PREDICTION
// ============================================================================

message DeltaPrediction {
  string entity_id = 1;

  // Predicted delta for next frame
  DeltaUpdate predicted_delta = 2;

  // Prediction confidence
  float confidence = 10;  // 0-1

  // Prediction method
  enum PredictionMethod {
    LINEAR_EXTRAPOLATION = 0;
    VELOCITY_BASED = 1;
    PATTERN_BASED = 2;
    ML_BASED = 3;
  }
  PredictionMethod method = 11;
}

// ============================================================================
// DELTA CORRECTION
// ============================================================================

message DeltaCorrection {
  string entity_id = 1;

  // Correction delta (to fix prediction errors)
  DeltaUpdate correction_delta = 2;

  // Error magnitude
  float error_magnitude = 10;

  // Correction strategy
  enum CorrectionStrategy {
    IMMEDIATE = 0;     // Apply correction immediately
    SMOOTH = 1;        // Smooth correction over time
    SNAP = 2;          // Snap to correct state if error is large
  }
  CorrectionStrategy strategy = 11;

  float smoothing_duration = 12;  // For SMOOTH strategy
  float snap_threshold = 13;      // For SNAP strategy
}

// ============================================================================
// DIFFERENTIAL UPDATE COMMANDS
// ============================================================================

message UpdatePositionDelta {
  string entity_id = 1;
  cryo.common.CryoVec3 delta = 2;
  bool relative = 3;
}

message UpdateRotationDelta {
  string entity_id = 1;
  cryo.common.CryoVec4 delta = 2;  // Quaternion
  bool relative = 3;
}

message UpdateScaleDelta {
  string entity_id = 1;
  cryo.common.CryoVec3 delta = 2;
  bool relative = 3;
}

message UpdateColorDelta {
  string entity_id = 1;
  cryo.common.CryoColor delta = 2;
  bool relative = 3;
}

// ============================================================================
// DELTA MANAGER
// ============================================================================

message DeltaManager {
  string manager_id = 1;

  // All active delta streams
  map<string, DeltaStream> streams = 2;

  // Accumulators per entity
  map<string, DeltaAccumulator> accumulators = 3;

  // Pending deltas
  repeated DeltaUpdate pending_deltas = 4;

  // Statistics
  DeltaStatistics stats = 10;
}

message DeltaStatistics {
  int64 total_deltas_sent = 1;
  int64 total_deltas_received = 2;
  int64 total_bytes_saved = 3;

  float average_compression_ratio = 10;
  float average_bandwidth_mbps = 11;

  // Efficiency metrics
  float delta_hit_rate = 20;  // % of times delta was smaller than full state
}