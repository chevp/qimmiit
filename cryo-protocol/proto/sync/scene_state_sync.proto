// scene_state_sync.proto - State versioning and synchronization
// State IDs, version control, and snapshot management
syntax = "proto3";

package cryo.scene;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "scene_update_synchronization/scene_update_delta.proto";

// ============================================================================
// STATE VERSION (Versioned state snapshot)
// ============================================================================

message StateVersion {
  string state_id = 1;
  int64 version_number = 2;
  int64 timestamp_ms = 3;

  // State content
  oneof state {
    EntityState entity_state = 10;
    SceneState scene_state = 11;
    SystemState system_state = 12;
  }

  // Version metadata
  string description = 20;
  string author = 21;
  repeated string tags = 22;

  // Version relationships
  optional int64 parent_version = 30;  // Previous version
  StateHash hash = 31;                 // Content hash for verification
}

// ============================================================================
// STATE TYPES
// ============================================================================

message EntityState {
  string entity_id = 1;

  // Transform state
  cryo.common.CryoVec3 position = 10;
  cryo.common.CryoVec4 rotation = 11;  // Quaternion
  cryo.common.CryoVec3 scale = 12;

  // Visual state
  cryo.common.CryoColor color = 20;
  float opacity = 21;
  bool visible = 22;

  // Material state
  optional MaterialState material = 30;

  // Animation state
  optional AnimationState animation = 40;

  // Custom properties
  map<string, PropertyValue> properties = 50;
}

message MaterialState {
  string material_id = 1;
  cryo.common.CryoColor base_color = 2;
  float metallic = 3;
  float roughness = 4;
  cryo.common.CryoVec3 emissive = 5;
  map<string, PropertyValue> custom_properties = 10;
}

message AnimationState {
  string animation_id = 1;
  float current_time = 2;
  float playback_speed = 3;
  bool playing = 4;
  float blend_weight = 5;
}

message PropertyValue {
  oneof value {
    float float_value = 1;
    int32 int_value = 2;
    bool bool_value = 3;
    string string_value = 4;
    cryo.common.CryoVec2 vec2_value = 5;
    cryo.common.CryoVec3 vec3_value = 6;
    cryo.common.CryoVec4 vec4_value = 7;
    cryo.common.CryoColor color_value = 8;
    bytes binary_value = 9;
  }
}

message SceneState {
  string scene_id = 1;

  // All entities in this scene
  map<string, EntityState> entities = 10;

  // Scene-level properties
  cryo.common.CryoColor ambient_light = 20;
  cryo.common.CryoColor fog_color = 21;
  float fog_density = 22;

  // Scene hierarchy
  SceneHierarchy hierarchy = 30;
}

message SceneHierarchy {
  repeated HierarchyNode root_nodes = 1;

  message HierarchyNode {
    string entity_id = 1;
    repeated HierarchyNode children = 2;
  }
}

message SystemState {
  string system_id = 1;

  // System configuration
  map<string, PropertyValue> configuration = 10;

  // System status
  SystemStatus status = 20;

  enum SystemStatus {
    INACTIVE = 0;
    INITIALIZING = 1;
    ACTIVE = 2;
    PAUSED = 3;
    ERROR = 4;
  }
}

// ============================================================================
// STATE HASH (Content verification)
// ============================================================================

message StateHash {
  bytes hash_value = 1;

  HashAlgorithm algorithm = 10;

  enum HashAlgorithm {
    MD5 = 0;
    SHA1 = 1;
    SHA256 = 2;
    CRC32 = 3;
    XXHASH = 4;
  }
}

message ComputeStateHash {
  oneof state {
    EntityState entity = 1;
    SceneState scene = 2;
    SystemState system = 3;
  }

  StateHash.HashAlgorithm algorithm = 10;
}

message VerifyStateHash {
  string state_id = 1;
  int64 version_number = 2;
  StateHash expected_hash = 3;
}

// ============================================================================
// STATE SNAPSHOT (Complete state capture)
// ============================================================================

message StateSnapshot {
  string snapshot_id = 1;
  int64 version_number = 2;
  int64 timestamp_ms = 3;

  // Snapshot scope
  SnapshotScope scope = 10;

  // Snapshot content
  oneof content {
    EntityState entity = 20;
    SceneState scene = 21;
    SystemState system = 22;
    MultiEntitySnapshot multi_entity = 23;
  }

  // Snapshot metadata
  string description = 30;
  map<string, string> metadata = 31;

  // Compression
  optional SnapshotCompression compression = 40;

  enum SnapshotScope {
    ENTITY = 0;
    SCENE = 1;
    SYSTEM = 2;
    GLOBAL = 3;
  }
}

message MultiEntitySnapshot {
  repeated EntityState entities = 1;
}

message SnapshotCompression {
  enum CompressionMethod {
    NONE = 0;
    ZLIB = 1;
    ZSTD = 2;
    LZ4 = 3;
  }
  CompressionMethod method = 1;

  int64 original_size_bytes = 10;
  int64 compressed_size_bytes = 11;
  float compression_ratio = 12;
}

// ============================================================================
// SNAPSHOT COMMANDS (Semantic verbs)
// ============================================================================

message TakeSnapshot {
  string snapshot_id = 1;

  // What to snapshot
  oneof target {
    string entity_id = 10;
    string scene_id = 11;
    string system_id = 12;
    TakeGlobalSnapshot global = 13;
  }

  // Snapshot settings
  bool compress = 20;
  bool compute_hash = 21;
  string description = 22;
}

message TakeGlobalSnapshot {
  // Snapshot everything
  bool include_entities = 1;
  bool include_scenes = 2;
  bool include_systems = 3;
}

message RestoreSnapshot {
  string snapshot_id = 1;

  // Restore options
  RestoreMode mode = 10;

  // What to restore
  optional RestoreFilter filter = 20;

  enum RestoreMode {
    FULL = 0;           // Replace entire state
    MERGE = 1;          // Merge with current state
    ADDITIVE = 2;       // Add to current state
    SELECTIVE = 3;      // Restore only filtered properties
  }
}

message RestoreFilter {
  repeated string entity_ids = 1;
  repeated string property_names = 2;
  bool restore_transforms = 10;
  bool restore_materials = 11;
  bool restore_animations = 12;
}

message DeleteSnapshot {
  string snapshot_id = 1;
}

// ============================================================================
// VERSION CONTROL
// ============================================================================

message VersionHistory {
  string state_id = 1;

  // All versions for this state
  repeated StateVersion versions = 10;

  // Current version
  int64 current_version = 20;

  // Version metadata
  int64 first_version_timestamp_ms = 30;
  int64 last_version_timestamp_ms = 31;
  int32 total_versions = 32;
}

message UpdateStateVersion {
  string state_id = 1;

  oneof update {
    EntityState new_entity_state = 10;
    SceneState new_scene_state = 11;
    SystemState new_system_state = 12;
    DeltaUpdate delta_update = 13;  // Apply delta to create new version
  }

  // Version metadata
  string description = 20;
  bool auto_increment_version = 21;
}

message RevertToVersion {
  string state_id = 1;
  int64 target_version = 2;

  // Revert mode
  RevertMode mode = 10;

  enum RevertMode {
    HARD = 0;           // Discard all versions after target
    SOFT = 1;           // Keep version history, just change current
    CREATE_NEW = 2;     // Create new version with old state
  }
}

message CompareVersions {
  string state_id = 1;
  int64 version_a = 2;
  int64 version_b = 3;

  // Comparison options
  bool include_delta = 10;  // Calculate delta between versions
  bool include_hash = 11;   // Compare hashes
}

message VersionComparison {
  string state_id = 1;
  int64 version_a = 2;
  int64 version_b = 3;

  // Comparison results
  bool identical = 10;
  repeated StateDifference differences = 11;

  // Optional delta
  optional DeltaUpdate delta = 20;

  // Hash comparison
  optional StateHash hash_a = 30;
  optional StateHash hash_b = 31;
}

message StateDifference {
  string property_path = 1;  // e.g., "position.x"

  oneof difference {
    ValueDifference value = 10;
    AddedProperty added = 11;
    RemovedProperty removed = 12;
  }
}

message ValueDifference {
  PropertyValue old_value = 1;
  PropertyValue new_value = 2;
  float magnitude = 3;  // For numeric values
}

message AddedProperty {
  PropertyValue value = 1;
}

message RemovedProperty {
  PropertyValue old_value = 1;
}

// ============================================================================
// CONDITIONAL UPDATES
// ============================================================================

message UpdateIfVersionMatches {
  string state_id = 1;
  int64 expected_version = 2;

  // Update to apply if version matches
  oneof update {
    EntityState new_state = 10;
    DeltaUpdate delta = 11;
  }

  // What to do if version doesn't match
  OnVersionMismatch on_mismatch = 20;

  enum OnVersionMismatch {
    REJECT = 0;          // Reject the update
    FORCE = 1;           // Apply anyway
    MERGE = 2;           // Try to merge
    REQUEST_CURRENT = 3; // Request current version and retry
  }
}

message UpdateResult {
  bool success = 1;
  int64 new_version = 2;

  oneof result {
    StateVersion updated_state = 10;
    UpdateConflict conflict = 11;
  }
}

message UpdateConflict {
  string state_id = 1;
  int64 expected_version = 2;
  int64 actual_version = 3;

  // Conflict resolution suggestion
  ConflictResolution suggested_resolution = 10;

  enum ConflictResolution {
    RETRY_WITH_CURRENT_VERSION = 0;
    FORCE_UPDATE = 1;
    MERGE_CHANGES = 2;
    MANUAL_RESOLUTION = 3;
  }
}

// ============================================================================
// STATE SYNCHRONIZATION
// ============================================================================

message SyncStateRequest {
  string state_id = 1;
  int64 local_version = 2;

  // What to sync
  SyncMode mode = 10;

  enum SyncMode {
    FULL = 0;           // Send full state
    DELTA_ONLY = 1;     // Send only changes since local_version
    CHECK_ONLY = 2;     // Only check if versions match
  }
}

message SyncStateResponse {
  string state_id = 1;
  int64 server_version = 2;

  // Sync result
  oneof result {
    StateVersion full_state = 10;
    DeltaUpdate delta = 11;
    SyncStatus status = 12;
  }

  enum SyncStatus {
    IN_SYNC = 0;        // Local and server versions match
    OUT_OF_SYNC = 1;    // Versions don't match
    CONFLICT = 2;       // Conflicting changes
  }
}

message ResolveConflict {
  string state_id = 1;

  // Conflicting versions
  StateVersion local_version = 10;
  StateVersion server_version = 11;

  // Resolution strategy
  ConflictResolutionStrategy strategy = 20;

  enum ConflictResolutionStrategy {
    TAKE_LOCAL = 0;      // Use local version
    TAKE_SERVER = 1;     // Use server version
    MERGE = 2;           // Merge both versions
    THREE_WAY_MERGE = 3; // Use common ancestor for merge
    MANUAL = 4;          // User provides resolution
  }

  // For manual resolution
  optional StateVersion resolved_state = 30;
}

// ============================================================================
// STATE BROADCAST
// ============================================================================

message BroadcastStateUpdate {
  string state_id = 1;
  int64 version_number = 2;

  // Update content
  oneof update {
    StateVersion full_state = 10;
    DeltaUpdate delta = 11;
  }

  // Broadcast settings
  BroadcastScope scope = 20;
  BroadcastPriority priority = 21;

  enum BroadcastScope {
    ALL = 0;            // Broadcast to all clients
    NEARBY = 1;         // Only clients in spatial proximity
    INTERESTED = 2;     // Only clients that subscribed
    SPECIFIC = 3;       // Specific client list
  }

  enum BroadcastPriority {
    LOW = 0;
    NORMAL = 1;
    HIGH = 2;
    CRITICAL = 3;
  }

  // For SPECIFIC scope
  repeated string client_ids = 30;
}

message SubscribeToState {
  string state_id = 1;

  // Subscription options
  SubscriptionMode mode = 10;

  enum SubscriptionMode {
    FULL_UPDATES = 0;   // Receive full state on each update
    DELTA_UPDATES = 1;  // Receive only deltas
    THROTTLED = 2;      // Receive updates at maximum rate
  }

  // For THROTTLED mode
  optional float max_update_rate = 20;  // Updates per second
}

message UnsubscribeFromState {
  string state_id = 1;
}

// ============================================================================
// STATE MANAGER
// ============================================================================

message StateManager {
  string manager_id = 1;

  // All managed states
  map<string, VersionHistory> state_histories = 10;

  // All snapshots
  map<string, StateSnapshot> snapshots = 11;

  // Synchronization info
  map<string, SyncInfo> sync_info = 20;

  // Statistics
  StateStatistics stats = 30;
}

message SyncInfo {
  string state_id = 1;
  int64 local_version = 2;
  int64 server_version = 3;
  int64 last_sync_timestamp_ms = 4;
  SyncStateResponse.SyncStatus sync_status = 5;

  // Subscribers
  repeated string subscriber_ids = 10;
}

message StateStatistics {
  int32 total_states = 1;
  int32 total_versions = 2;
  int32 total_snapshots = 3;

  int64 total_state_size_bytes = 10;
  int64 total_snapshot_size_bytes = 11;

  int32 active_subscriptions = 20;
  int32 pending_syncs = 21;

  float average_versions_per_state = 30;
  float average_snapshot_compression_ratio = 31;
}

// ============================================================================
// STATE CLEANUP
// ============================================================================

message PruneVersionHistory {
  string state_id = 1;

  // Pruning strategy
  PruningStrategy strategy = 10;

  enum PruningStrategy {
    KEEP_LATEST_N = 0;      // Keep only N most recent versions
    KEEP_SINCE_TIME = 1;    // Keep versions since timestamp
    KEEP_TAGGED = 2;        // Keep only tagged versions
    KEEP_MAJOR = 3;         // Keep only major version milestones
  }

  // Strategy parameters
  optional int32 keep_count = 20;        // For KEEP_LATEST_N
  optional int64 keep_since_ms = 21;     // For KEEP_SINCE_TIME
}

message DeleteOldSnapshots {
  oneof criteria {
    int64 older_than_ms = 1;   // Delete snapshots older than timestamp
    int32 keep_latest_n = 2;   // Keep only N most recent snapshots
  }
}

// ============================================================================
// STATE MIGRATION
// ============================================================================

message MigrateState {
  string state_id = 1;
  int64 from_version = 2;
  int64 to_version = 3;

  // Migration script
  MigrationScript migration = 10;
}

message MigrationScript {
  string script_id = 1;

  // Migration steps
  repeated MigrationStep steps = 10;

  message MigrationStep {
    string description = 1;
    MigrationOperation operation = 2;
  }

  message MigrationOperation {
    oneof operation {
      RenameProperty rename = 1;
      TransformProperty transform = 2;
      AddProperty add = 3;
      RemoveProperty remove = 4;
    }
  }

  message RenameProperty {
    string old_name = 1;
    string new_name = 2;
  }

  message TransformProperty {
    string property_name = 1;
    string transformation = 2;  // Expression or script
  }

  message AddProperty {
    string property_name = 1;
    PropertyValue default_value = 2;
  }

  message RemoveProperty {
    string property_name = 1;
  }
}