// cryo_container.proto - Unified container for all Cryo gRPC communication
// Based on Arctic Container design - single unified message format
syntax = "proto3";

package cryo.container;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================
//
// CRYO CONTAINER PROTOCOL
//
// This is the UNIFIED container format for ALL Cryo gRPC communication.
//
// DESIGN RATIONALE:
//   Instead of having separate .proto files for each service, we use ONE
//   container format with TYPE-SAFE oneof. This provides:
//
//   1. Single gRPC service endpoint for all operations
//   2. Unified metadata (message_id, timestamp, source, destination)
//   3. Easy routing and middleware (logging, auth, metrics)
//   4. Simplified client/server implementation
//   5. Compile-time type safety (unlike google.protobuf.Any)
//   6. Self-documenting API (all supported types are explicit)
//   7. Better code generation (typed getters/setters)
//
// USAGE EXAMPLES (C++):
//
//   // Send an entity via unary RPC
//   CryoContainer container;
//   auto* entity = container.mutable_entity();
//   entity->set_entity_id("player_001");
//   container.set_source("cryo-editor");
//   stub->Send(container);
//
//   // Stream render commands to renderer
//   auto stream = stub->Connect();
//   for (auto& cmd : commands) {
//       CryoContainer container;
//       *container.mutable_camera_command() = cmd;
//       stream->Write(container);
//   }
//
//   // Type-safe handling
//   switch (container.payload_case()) {
//     case CryoContainer::kEntity:
//       HandleEntity(container.entity());
//       break;
//     case CryoContainer::kCameraCommand:
//       HandleCameraCommand(container.camera_command());
//       break;
//     default:
//       // Unknown message type
//       break;
//   }
//
// SUPPORTED PAYLOAD TYPES:
//   - cryo.ecs.* (Entity, CreateEntityRequest, UpdateEntityRequest, etc.)
//   - cryo.shader.* (ShaderGraph, MaterialDefinition, SetUniformCommand, etc.)
//   - cryo.camera.* (CameraState, CameraCommand, etc.)
//   - cryo.asset.material.* (MaterialAsset, LoadMaterialCommand, etc.)
//   - cryo.frame.* (Frame, FrameStream, PlaybackControl, etc.)
//   - cryo.sprite.* (Sprite2D, SpriteCommand, etc.)
//   - Add new types by extending the oneof in CryoContainer
//
// ==============================================================================

import "google/protobuf/timestamp.proto";

// Import all supported Cryo protocol message types
import "ecs/cryo_create_entity.proto";
import "ecs/cryo_delete_entity.proto";
import "ecs/cryo_entity.proto";
import "shader_material/cryo_shader_graph.proto";
import "shader_material/cryo_shader_graph_service.proto";
import "camera_viewport/cryo_camera.proto";
import "rendering_2d_ui/sprite_2d.proto";
import "rendering_2d_ui/sprite_commands.proto";
import "sync/cryo_frame.proto";

// =============================================================================
// CONTAINER MESSAGE - Single unified container for all Cryo protocol messages
// =============================================================================

message CryoContainer {
  // Type-safe payload - explicitly lists all supported message types
  // This provides compile-time type checking and makes the API self-documenting
  oneof payload {
    // ECS Messages
    cryo.ecs.Entity entity = 1;
    cryo.ecs.CreateEntityCommand create_entity = 2;
    cryo.ecs.DeleteEntityCommand delete_entity = 4;

    // Camera & Rendering Messages
    cryo.camera.CameraState camera_state = 20;
    cryo.camera.CameraCommand camera_command = 21;

    // 2D Rendering Messages
    cryo.sprite.Sprite2D sprite_2d = 30;
    cryo.sprite.SpriteCommand sprite_command = 31;

    // Frame Synchronization Messages
    cryo.frame.Frame frame = 50;
    cryo.frame.FrameStream frame_stream = 51;
    cryo.frame.PlaybackControl playback_control = 52;

    // Command/Event/Query wrappers (for generic operations)
    CryoCommand command = 90;
    CryoEvent event = 91;
    CryoQuery query = 92;
    CryoQueryResult query_result = 93;

    // Add new message types here as the protocol evolves
    // Field numbers 100+ reserved for future message types
  }

  // ---------------------------------------------------------------------------
  // METADATA - Present for all messages
  // ---------------------------------------------------------------------------
  string message_id = 100;            // Unique message identifier (UUID)
  google.protobuf.Timestamp timestamp = 101;  // Message timestamp
  string source = 102;                // Component that sent the message
  string destination = 103;           // Target component (optional, for routing)
  MessagePriority priority = 104;     // Message priority for queue processing
  map<string, string> metadata = 105; // Additional key-value metadata

  // Optional tracing/correlation IDs
  string correlation_id = 110;        // For request/response correlation
  string session_id = 111;            // For session tracking
  string user_id = 112;               // For user attribution

  enum MessagePriority {
    PRIORITY_UNSPECIFIED = 0;
    PRIORITY_LOW = 1;
    PRIORITY_NORMAL = 2;
    PRIORITY_HIGH = 3;
    PRIORITY_CRITICAL = 4;
  }
}

// =============================================================================
// BATCH MESSAGING - Send multiple containers in one RPC call
// =============================================================================

message CryoBatch {
  repeated CryoContainer messages = 1;
  string batch_id = 2;                // Batch identifier for tracking
  bool atomic = 3;                    // If true, all messages must succeed or all fail
  BatchMode mode = 4;

  enum BatchMode {
    SEQUENTIAL = 0;                   // Execute in order
    PARALLEL = 1;                     // Execute concurrently
    TRANSACTIONAL = 2;                // All or nothing (atomic with rollback)
  }
}

// =============================================================================
// STREAMING - For long-running operations and real-time updates
// =============================================================================

message CryoStream {
  string stream_id = 1;               // Unique stream identifier
  repeated CryoContainer messages = 2;
  bool is_final = 3;                  // True if this is the last message in the stream
  int32 sequence_number = 4;          // Sequence number for ordering
  StreamFlags flags = 5;

  message StreamFlags {
    bool requires_ack = 1;            // Requires acknowledgement
    bool can_drop = 2;                // Can be dropped if overloaded
    bool compressed = 3;              // Payload is compressed
  }
}

// =============================================================================
// REQUEST/RESPONSE WRAPPER - Unified RPC pattern
// =============================================================================

message CryoRequest {
  string request_id = 1;
  CryoContainer container = 2;
  int32 timeout_ms = 3;               // Request timeout in milliseconds
  RequestOptions options = 4;
}

message RequestOptions {
  bool async = 1;                     // Process asynchronously
  bool cache_result = 2;              // Cache response
  int32 retry_count = 3;              // Number of retries on failure
}

message CryoResponse {
  string request_id = 1;              // Matches CryoRequest.request_id
  CryoContainer container = 2;
  ResponseStatus status = 3;
  string error_message = 4;           // Error details if status != SUCCESS
  ResponseMetadata metadata = 5;

  enum ResponseStatus {
    SUCCESS = 0;
    ERROR = 1;
    TIMEOUT = 2;
    NOT_FOUND = 3;
    INVALID_REQUEST = 4;
    UNAUTHORIZED = 5;
    RATE_LIMITED = 6;
    SERVICE_UNAVAILABLE = 7;
  }
}

message ResponseMetadata {
  int64 processing_time_ms = 1;       // Server processing time
  string server_version = 2;          // Server version
  int64 server_timestamp_ms = 3;      // Server timestamp
}

// =============================================================================
// ACKNOWLEDGEMENT - For reliable streaming
// =============================================================================

message CryoAck {
  string message_id = 1;              // ID of acknowledged message
  string stream_id = 2;               // Stream this ack belongs to
  int32 sequence_number = 3;          // Sequence number acknowledged
  AckStatus status = 4;

  enum AckStatus {
    ACK_SUCCESS = 0;
    ACK_ERROR = 1;
    ACK_DROPPED = 2;                  // Message was dropped
    ACK_RETRANSMIT = 3;               // Request retransmission
  }
}

// =============================================================================
// SUBSCRIPTION - For pub/sub patterns
// =============================================================================

message CryoSubscription {
  string subscription_id = 1;
  repeated string topics = 2;         // Topics to subscribe to
  SubscriptionFilter filter = 3;
  SubscriptionOptions options = 4;
}

message SubscriptionFilter {
  repeated string message_types = 1;  // Filter by message type
  map<string, string> metadata_filters = 2;  // Filter by metadata
  string source_pattern = 3;          // Filter by source (glob pattern)
}

message SubscriptionOptions {
  bool durable = 1;                   // Persist messages if client disconnects
  int32 buffer_size = 2;              // Max messages to buffer
  bool replay_from_start = 3;         // Replay all historical messages
  google.protobuf.Timestamp replay_from = 4;  // Replay from specific time
}

message CryoUnsubscribe {
  string subscription_id = 1;
}

// =============================================================================
// UNIFIED RPC SERVICE - Single service for all Cryo operations
// =============================================================================
//
// IMPLEMENTATION REQUIREMENT:
//   ALL Cryo gRPC servers MUST implement CryoContainerService.
//   ALL Cryo gRPC clients MUST use CryoContainer for sending/receiving.
//
// EXAMPLES:
//
//   1. Cryo Renderer:
//      - Connects via Connect() bidirectional stream
//      - Receives: RenderCommand, ShaderUpdate, SceneUpdate
//      - Sends: RenderStats, FrameComplete (feedback to server)
//
//   2. Cryo Editor:
//      - Uses Send() for creating entities
//      - Uses Subscribe() for real-time scene updates
//      - Sends: CreateEntity, UpdateEntity, ShaderCommand
//
//   3. Cryo Cache:
//      - Uses Upload() for batch asset uploads
//      - Uses SendBatch() for bulk operations
//
// =============================================================================

service CryoContainerService {
  // Unary RPC - Single request/response
  // Use for: Loading scenes, creating entities, one-time operations
  rpc Send(CryoRequest) returns (CryoResponse);

  // Batch RPC - Multiple messages in one call
  // Use for: Bulk operations, importing large scenes, batch entity creation
  rpc SendBatch(CryoBatch) returns (CryoResponse);

  // Server streaming - Server sends multiple CryoContainers to client
  // Use for: Real-time scene updates, live entity changes, monitoring
  rpc Subscribe(CryoSubscription) returns (stream CryoStream);

  // Unsubscribe from a subscription
  rpc Unsubscribe(CryoUnsubscribe) returns (CryoResponse);

  // Client streaming - Client sends multiple CryoContainers to server
  // Use for: Uploading large assets, streaming telemetry, batch uploads
  rpc Upload(stream CryoStream) returns (CryoResponse);

  // Bidirectional streaming - Full duplex communication (RECOMMENDED)
  // Use for: Data-driven renderer, interactive editing, game client/server
  // Both directions send/receive CryoContainer exclusively
  rpc Connect(stream CryoContainer) returns (stream CryoContainer);

  // Pub/Sub - Publish to a topic
  rpc Publish(CryoContainer) returns (CryoAck);

  // Health check
  rpc Ping(PingRequest) returns (PingResponse);
}

// =============================================================================
// HEALTH CHECK
// =============================================================================

message PingRequest {
  string client_id = 1;
}

message PingResponse {
  string server_id = 1;
  google.protobuf.Timestamp server_time = 2;
  ServerStatus status = 3;

  enum ServerStatus {
    HEALTHY = 0;
    DEGRADED = 1;
    UNHEALTHY = 2;
  }
}

// =============================================================================
// CONTAINER HELPERS - Convenience messages for common operations
// =============================================================================

message CryoCommand {
  string command_id = 1;
  string command_type = 2;            // e.g., "create_entity", "update_shader"

  // Type-safe command data
  oneof command_data {
    cryo.ecs.CreateEntityCommand create_entity_cmd = 10;
    cryo.ecs.DeleteEntityCommand delete_entity_cmd = 12;
    cryo.camera.CameraCommand camera_cmd = 14;
    cryo.sprite.SpriteCommand sprite_cmd = 15;
    cryo.frame.PlaybackControl playback_cmd = 18;
    // Add more command types as needed
  }
}

message CryoEvent {
  string event_id = 1;
  string event_type = 2;              // e.g., "entity_spawned", "material_updated"
  google.protobuf.Timestamp event_time = 4;

  // Type-safe event data
  oneof event_data {
    cryo.ecs.Entity entity_event = 10;
    cryo.camera.CameraState camera_event = 12;
    cryo.frame.Frame frame_event = 13;
    // Add more event types as needed
  }
}

message CryoQuery {
  string query_id = 1;
  string query_type = 2;              // e.g., "find_entities", "get_materials"
  map<string, string> parameters = 3;

  // Optional: Type-safe query filters
  oneof query_filter {
    EntityQueryFilter entity_filter = 10;
    MaterialQueryFilter material_filter = 11;
    // Add more filter types as needed
  }
}

message EntityQueryFilter {
  repeated string entity_ids = 1;
  repeated string tags = 2;
  string name_pattern = 3;
}

message MaterialQueryFilter {
  repeated string material_ids = 1;
  repeated string tags = 2;
  float min_roughness = 3;
  float max_roughness = 4;
}

message CryoQueryResult {
  string query_id = 1;
  int32 total_count = 3;
  bool has_more = 4;

  // Type-safe results
  oneof results {
    EntityResults entity_results = 10;
    MaterialResults material_results = 11;
    FrameResults frame_results = 12;
    // Add more result types as needed
  }
}

message EntityResults {
  repeated cryo.ecs.Entity entities = 1;
}

message MaterialResults {
  repeated string material_ids = 1;  // Return material IDs instead
}

message FrameResults {
  repeated cryo.frame.Frame frames = 1;
}
