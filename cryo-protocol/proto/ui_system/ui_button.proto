// ui_button.proto - Interactive button components
// Buttons, toggles, and clickable UI elements
syntax = "proto3";

package cryo.ui;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "ui_system/ui_base.proto";
import "ui_system/ui_text.proto";
import "ui_system/ui_icon.proto";

// ============================================================================
// BUTTON BASE
// ============================================================================

message UIButton {
  UIElement base = 1;

  string label = 2;
  UIFont font = 3;

  // State-based styling
  ButtonStyle normal_style = 4;
  ButtonStyle hover_style = 5;
  ButtonStyle pressed_style = 6;
  ButtonStyle disabled_style = 7;
  ButtonStyle focused_style = 8;

  UIIcon icon = 9;  // Optional icon

  enum IconPosition {
    LEFT = 0;
    RIGHT = 1;
    TOP = 2;
    BOTTOM = 3;
  }
  IconPosition icon_position = 10;

  // Behavior
  string on_click_action = 11;
  string hotkey = 12;
  bool show_hotkey = 13;

  // Sound effects
  string sound_hover = 14;
  string sound_click = 15;

  // Animation
  bool animate_press = 16;
  float press_scale = 17;  // Scale on press (e.g., 0.95)
}

message ButtonStyle {
  cryo.common.CryoColor text_color = 1;
  UIBackground background = 2;
  UIBorder border = 3;
  UIShadow shadow = 4;
}

// ============================================================================
// TOGGLE BUTTON
// ============================================================================

message UIToggleButton {
  UIButton base_button = 1;

  bool is_toggled = 2;

  // Toggled state styling
  ButtonStyle toggled_style = 3;

  string on_toggle_action = 4;
  string on_untoggle_action = 5;
}

// ============================================================================
// RADIO BUTTON
// ============================================================================

message UIRadioButton {
  UIElement base = 1;

  string label = 2;
  UIFont font = 3;

  string radio_group = 4;  // Buttons with same group are mutually exclusive
  bool is_selected = 5;

  cryo.common.CryoColor circle_color = 6;
  cryo.common.CryoColor selected_color = 7;

  float circle_radius = 8;
  string on_select_action = 9;
}

// ============================================================================
// CHECKBOX
// ============================================================================

message UICheckbox {
  UIElement base = 1;

  string label = 2;
  UIFont font = 3;

  bool is_checked = 4;

  // Styling
  cryo.common.CryoColor box_color = 5;
  cryo.common.CryoColor check_color = 6;
  cryo.common.CryoColor label_color = 7;

  float box_size = 8;
  UIBorder box_border = 9;

  string on_check_action = 10;
  string on_uncheck_action = 11;

  enum CheckStyle {
    CHECKMARK = 0;
    CROSS = 1;
    FILLED = 2;
  }
  CheckStyle check_style = 12;
}

// ============================================================================
// SLIDER
// ============================================================================

message UISlider {
  UIElement base = 1;

  float value = 2;
  float min_value = 3;
  float max_value = 4;
  float step = 5;  // Increment step (0 = continuous)

  enum Orientation {
    HORIZONTAL = 0;
    VERTICAL = 1;
  }
  Orientation orientation = 6;

  // Track styling
  cryo.common.CryoColor track_color = 7;
  cryo.common.CryoColor fill_color = 8;
  float track_height = 9;

  // Handle styling
  cryo.common.CryoColor handle_color = 10;
  float handle_size = 11;
  bool show_handle = 12;

  // Value display
  bool show_value = 13;
  string value_format = 14;  // e.g., "{0}%", "{0:F2}"

  string on_value_changed_action = 15;
}

// ============================================================================
// DROPDOWN / COMBO BOX
// ============================================================================

message UIDropdown {
  UIElement base = 1;

  repeated string options = 2;
  int32 selected_index = 3;

  UIFont font = 4;
  cryo.common.CryoColor text_color = 5;

  // Dropdown box styling
  ButtonStyle box_style = 6;
  UIIcon dropdown_arrow = 7;

  // Dropdown list styling
  cryo.common.CryoColor list_background_color = 8;
  cryo.common.CryoColor list_highlight_color = 9;
  float max_list_height = 10;

  string on_selection_changed_action = 11;
}

// ============================================================================
// BUTTON GROUP
// ============================================================================

message UIButtonGroup {
  UIElement base = 1;

  repeated UIButton buttons = 2;

  enum GroupOrientation {
    HORIZONTAL = 0;
    VERTICAL = 1;
    GRID = 2;
  }
  GroupOrientation orientation = 3;

  float spacing = 4;
  int32 grid_columns = 5;  // For GRID orientation

  bool mutually_exclusive = 6;  // Only one button can be active
}

// ============================================================================
// ICON BUTTON
// ============================================================================

message UIIconButton {
  UIButton base_button = 1;

  // Icon-specific overrides
  bool icon_only = 2;  // No label
  float icon_scale = 3;

  // Circular button option
  bool circular = 4;
}

// ============================================================================
// TEXT BUTTON (Minimal button, just text)
// ============================================================================

message UITextButton {
  UIElement base = 1;

  string label = 2;
  UIFont font = 3;

  cryo.common.CryoColor normal_color = 4;
  cryo.common.CryoColor hover_color = 5;
  cryo.common.CryoColor pressed_color = 6;

  bool underline_on_hover = 7;
  string on_click_action = 8;
}

// ============================================================================
// SEGMENTED CONTROL
// ============================================================================

message UISegmentedControl {
  UIElement base = 1;

  repeated string segments = 2;
  int32 selected_index = 3;

  UIFont font = 4;

  // Styling
  cryo.common.CryoColor normal_color = 5;
  cryo.common.CryoColor selected_color = 6;
  cryo.common.CryoColor background_color = 7;

  UIBorder border = 8;
  float segment_spacing = 9;

  string on_segment_changed_action = 10;
}

// ============================================================================
// CONTEXT MENU ITEM
// ============================================================================

message UIContextMenuItem {
  string id = 1;
  string label = 2;
  UIIcon icon = 3;
  string hotkey = 4;

  bool enabled = 5;
  bool visible = 6;

  // Submenu
  repeated UIContextMenuItem submenu_items = 7;
  bool is_separator = 8;

  string on_click_action = 9;
}

message UIContextMenu {
  UIElement base = 1;

  repeated UIContextMenuItem items = 2;

  UIFont font = 3;
  cryo.common.CryoColor background_color = 4;
  cryo.common.CryoColor text_color = 5;
  cryo.common.CryoColor highlight_color = 6;

  UIShadow shadow = 7;
}

// ============================================================================
// SCROLL BUTTON (For scrollable containers)
// ============================================================================

message UIScrollButton {
  UIIconButton button = 1;

  enum ScrollDirection {
    UP = 0;
    DOWN = 1;
    LEFT = 2;
    RIGHT = 3;
  }
  ScrollDirection direction = 2;

  float scroll_speed = 3;  // Units per second
  bool auto_hide = 4;      // Hide when at end of scroll
}

// ============================================================================
// CLOSE/MINIMIZE/MAXIMIZE BUTTONS
// ============================================================================

message UIWindowButton {
  UIIconButton button = 1;

  enum WindowAction {
    CLOSE = 0;
    MINIMIZE = 1;
    MAXIMIZE = 2;
    RESTORE = 3;
  }
  WindowAction action = 2;

  string target_window_id = 3;
}