// ui_base.proto - Base types and enums for UI system
// Fundamental types used across all UI components
syntax = "proto3";

package cryo.ui;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";

// ============================================================================
// BASIC UI TYPES (extending common types)
// ============================================================================

// 2D Position (pixels or normalized coordinates)
message UIPosition {
  float x = 1;
  float y = 2;

  enum CoordinateSpace {
    SCREEN_PIXELS = 0;      // Absolute pixel coordinates
    NORMALIZED = 1;          // 0.0 to 1.0 range
    VIEWPORT_RELATIVE = 2;   // Relative to viewport
  }
  CoordinateSpace space = 3;
}

// 2D Size (pixels or normalized)
message UISize {
  float width = 1;
  float height = 2;

  enum SizeMode {
    FIXED_PIXELS = 0;
    PERCENTAGE = 1;
    CONTENT_FIT = 2;
    FILL_PARENT = 3;
  }
  SizeMode mode = 3;
}

// Rectangle bounds
message UIRect {
  UIPosition position = 1;
  UISize size = 2;
}

// Anchor point for UI elements
message UIAnchor {
  enum AnchorPoint {
    TOP_LEFT = 0;
    TOP_CENTER = 1;
    TOP_RIGHT = 2;
    MIDDLE_LEFT = 3;
    MIDDLE_CENTER = 4;
    MIDDLE_RIGHT = 5;
    BOTTOM_LEFT = 6;
    BOTTOM_CENTER = 7;
    BOTTOM_RIGHT = 8;
  }
  AnchorPoint anchor = 1;
  cryo.common.CryoVec2 offset = 2;  // Offset from anchor in pixels
}

// Padding/Margin
message UISpacing {
  float left = 1;
  float right = 2;
  float top = 3;
  float bottom = 4;
}

// ============================================================================
// VISIBILITY AND INTERACTION
// ============================================================================

enum UIVisibility {
  VISIBLE = 0;
  HIDDEN = 1;
  COLLAPSED = 2;  // Hidden and doesn't take up space
}

enum UIInteractionState {
  NORMAL = 0;
  HOVER = 1;
  PRESSED = 2;
  DISABLED = 3;
  FOCUSED = 4;
}

enum UILayer {
  BACKGROUND = 0;
  GAME_WORLD = 1;
  HUD_LOW = 2;
  HUD_MID = 3;
  HUD_HIGH = 4;
  POPUP = 5;
  MODAL = 6;
  TOOLTIP = 7;
  DEBUG = 8;
  CURSOR = 9;
}

// ============================================================================
// ALIGNMENT AND LAYOUT
// ============================================================================

enum UIAlignment {
  ALIGN_START = 0;   // Left/Top
  ALIGN_CENTER = 1;
  ALIGN_END = 2;     // Right/Bottom
  ALIGN_STRETCH = 3;
  ALIGN_BASELINE = 4;
}

enum UIFlexDirection {
  ROW = 0;           // Horizontal
  COLUMN = 1;        // Vertical
  ROW_REVERSE = 2;
  COLUMN_REVERSE = 3;
}

enum UIWrapMode {
  NO_WRAP = 0;
  WRAP = 1;
  WRAP_REVERSE = 2;
}

// ============================================================================
// DEPTH AND RENDERING
// ============================================================================

message UIDepth {
  int32 z_index = 1;      // Layer ordering
  UILayer layer = 2;       // Predefined layer
  float opacity = 3;       // 0.0 (transparent) to 1.0 (opaque)
}

// ============================================================================
// BORDER AND OUTLINE
// ============================================================================

message UIBorder {
  float width = 1;
  cryo.common.CryoColor color = 2;

  enum BorderStyle {
    NONE = 0;
    SOLID = 1;
    DASHED = 2;
    DOTTED = 3;
  }
  BorderStyle style = 3;

  float radius = 4;  // Corner radius for rounded borders
}

// ============================================================================
// BACKGROUND
// ============================================================================

message UIBackground {
  oneof background_type {
    cryo.common.CryoColor solid_color = 1;
    UIGradient gradient = 2;
    string texture_path = 3;
  }
}

message UIGradient {
  enum GradientType {
    LINEAR = 0;
    RADIAL = 1;
  }
  GradientType type = 1;
  repeated UIGradientStop stops = 2;
  float angle = 3;  // For linear gradients (degrees)
}

message UIGradientStop {
  float position = 1;  // 0.0 to 1.0
  cryo.common.CryoColor color = 2;
}

// ============================================================================
// SHADOW AND EFFECTS
// ============================================================================

message UIShadow {
  cryo.common.CryoVec2 offset = 1;
  float blur_radius = 2;
  float spread_radius = 3;
  cryo.common.CryoColor color = 4;
  bool inset = 5;  // Inner shadow
}

// ============================================================================
// BASE UI ELEMENT
// ============================================================================

message UIElement {
  string id = 1;
  string name = 2;

  UIRect bounds = 3;
  UIAnchor anchor = 4;
  UIDepth depth = 5;

  UIVisibility visibility = 6;
  bool enabled = 7;

  UISpacing padding = 8;
  UISpacing margin = 9;

  UIBackground background = 10;
  UIBorder border = 11;
  UIShadow shadow = 12;

  string parent_id = 13;
  repeated string child_ids = 14;

  map<string, string> custom_properties = 15;
}

// ============================================================================
// TRANSFORM FOR 3D UI
// ============================================================================

message UI3DTransform {
  cryo.common.CryoVec3 position = 1;
  cryo.common.CryoVec4 rotation = 2;  // Quaternion
  cryo.common.CryoVec3 scale = 3;
  bool billboard = 4;  // Always face camera
  bool screen_space = 5;  // Render in screen space after projection
}