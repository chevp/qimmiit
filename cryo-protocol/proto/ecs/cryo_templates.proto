// cryo_templates.proto - Template system for reusable entity/trigger definitions
// Templates are loaded from CDN, game server only sends instance references
syntax = "proto3";

package cryo.templates;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================
//
// TEMPLATE SYSTEM
//
// Separates static const data (templates) from dynamic runtime state (instances):
//   - Templates: Loaded from CDN/static server (const, immutable, cacheable)
//   - Instances: Sent by game server (dynamic, minimal, state-only)
//
// DESIGN RATIONALE:
//   - Reduces game server load (only sends instance IDs + overrides)
//   - Templates are cacheable (HTTP cache, local storage)
//   - Templates can be versioned independently
//   - Same template can be reused for many instances
//
// EXAMPLE:
//   Template: "npc_merchant" (animations, triggers, model) [from CDN]
//   Instance: "npc_merchant_001" { template_id: "npc_merchant", position: {10,0,5} } [from game server]
//
// ==============================================================================

import "cryo_common.proto";
import "ecs/cryo_state_triggers.proto";
import "ecs/cryo_entity.proto";
import "rendering_2d_ui/ui_button.proto";

// ============================================================================
// TEMPLATE DEFINITION (Loaded from CDN/static server)
// ============================================================================

message EntityTemplate {
  string template_id = 1;           // Unique template ID (e.g., "npc_merchant")
  string template_name = 2;         // Human-readable name
  string template_version = 3;      // Version (e.g., "1.0.0")

  // Template metadata
  TemplateMetadata metadata = 10;

  // Entity definition (static)
  EntityDefinition entity_definition = 20;

  // Triggers (static rules)
  repeated cryo.triggers.StateTrigger triggers = 30;

  // UI elements (if any)
  repeated UIElementTemplate ui_elements = 40;

  // Animations
  repeated AnimationDefinition animations = 50;

  // Sounds
  repeated SoundDefinition sounds = 60;

  // Properties (default values)
  map<string, string> default_properties = 70;

  // Tags for filtering
  repeated string tags = 80;
}

// ============================================================================
// TEMPLATE METADATA
// ============================================================================

message TemplateMetadata {
  string author = 1;
  string description = 2;
  string category = 3;           // "npc", "item", "door", "trigger", etc.

  // Dependencies
  repeated string required_assets = 10;
  repeated string required_templates = 11;

  // Versioning
  int64 created_timestamp = 20;
  int64 modified_timestamp = 21;

  // Size estimates (for preloading)
  int64 estimated_size_bytes = 30;
}

// ============================================================================
// ENTITY DEFINITION (Static part of entity)
// ============================================================================

message EntityDefinition {
  // Mesh/Model
  string mesh_id = 1;
  string material_id = 2;

  // Scale (can be overridden by instance)
  cryo.common.CryoVec3 default_scale = 10;

  // Components (static)
  map<string, bytes> components = 20;  // Serialized component data

  // Collision shape
  CollisionShape collision = 30;
}

message CollisionShape {
  oneof shape {
    SphereCollision sphere = 1;
    BoxCollision box = 2;
    CapsuleCollision capsule = 3;
    MeshCollision mesh = 4;
  }
}

message SphereCollision {
  float radius = 1;
  cryo.common.CryoVec3 center = 2;
}

message BoxCollision {
  cryo.common.CryoVec3 size = 1;
  cryo.common.CryoVec3 center = 2;
}

message CapsuleCollision {
  float radius = 1;
  float height = 2;
  cryo.common.CryoVec3 center = 3;
}

message MeshCollision {
  string collision_mesh_id = 1;
}

// ============================================================================
// UI ELEMENT TEMPLATE
// ============================================================================

message UIElementTemplate {
  string element_id = 1;
  string element_type = 2;  // "button", "label", "panel", etc.

  // Serialized UI definition
  bytes ui_definition = 10;  // Any UI proto
}

// ============================================================================
// ANIMATION DEFINITION
// ============================================================================

message AnimationDefinition {
  string animation_name = 1;
  string animation_asset_id = 2;
  float default_speed = 3;
  bool default_loop = 4;
}

// ============================================================================
// SOUND DEFINITION
// ============================================================================

message SoundDefinition {
  string sound_id = 1;
  string sound_asset_id = 2;
  float default_volume = 3;
  bool is_3d = 4;
}

// ============================================================================
// TEMPLATE INSTANCE (Sent by game server - MINIMAL!)
// ============================================================================

message TemplateInstance {
  string instance_id = 1;           // Unique instance ID (e.g., "npc_merchant_001")
  string template_id = 2;           // Reference to template (e.g., "npc_merchant")

  // Runtime state (ONLY dynamic data!)
  cryo.common.CryoTransform transform = 10;  // Position, rotation, scale

  // Property overrides (only changed values)
  map<string, string> property_overrides = 20;

  // Trigger state overrides (only changed triggers)
  repeated TriggerInstanceState trigger_overrides = 30;

  // Instance-specific flags
  bool is_active = 40;
  bool is_visible = 41;
}

// ============================================================================
// TRIGGER INSTANCE STATE (Minimal runtime state)
// ============================================================================

message TriggerInstanceState {
  string trigger_id = 1;            // References trigger in template

  // Runtime state (only if different from template defaults)
  optional bool enabled = 10;
  optional float cooldown_remaining = 11;
  optional int32 trigger_count = 12;
  optional bool is_active = 13;
}

// ============================================================================
// TEMPLATE CATALOG (Index of available templates)
// ============================================================================

message TemplateCatalog {
  string catalog_id = 1;
  string catalog_version = 2;

  // List of all available templates
  repeated TemplateReference templates = 10;

  // Categories for organization
  map<string, TemplateCategory> categories = 20;
}

message TemplateReference {
  string template_id = 1;
  string template_name = 2;
  string template_version = 3;
  string category = 4;

  // Where to load from
  string template_url = 10;      // CDN URL (e.g., "https://cdn.example.com/templates/npc_merchant.v1.pb")

  // Size for preloading decisions
  int64 size_bytes = 20;

  // Dependencies
  repeated string required_templates = 30;
}

message TemplateCategory {
  string category_id = 1;
  string category_name = 2;
  repeated string template_ids = 3;
}

// ============================================================================
// TEMPLATE BUNDLE (Multiple templates in one file)
// ============================================================================

message TemplateBundle {
  string bundle_id = 1;
  string bundle_name = 2;
  string bundle_version = 3;

  // All templates in this bundle
  repeated EntityTemplate templates = 10;

  // Bundle metadata
  string description = 20;
  repeated string tags = 21;
  int64 total_size_bytes = 22;
}

// ============================================================================
// TEMPLATE LOADING
// ============================================================================

message LoadTemplateRequest {
  repeated string template_ids = 1;

  // Options
  bool include_dependencies = 10;  // Auto-load dependencies
  bool use_cache = 11;              // Use local cache if available
}

message LoadTemplateResponse {
  repeated EntityTemplate templates = 1;

  // Cache info
  repeated TemplateCacheInfo cache_info = 10;
}

message TemplateCacheInfo {
  string template_id = 1;
  bool was_cached = 2;
  int64 cache_timestamp = 3;
  string cache_version = 4;
}

// ============================================================================
// TEMPLATE INSTANCE SPAWNING (Game server → Client)
// ============================================================================

message SpawnTemplateInstance {
  string instance_id = 1;
  string template_id = 2;

  // Initial state
  cryo.common.CryoTransform transform = 10;
  map<string, string> initial_properties = 11;

  // Trigger overrides
  repeated TriggerInstanceState trigger_states = 20;
}

message DespawnTemplateInstance {
  string instance_id = 1;

  // Optional: Despawn animation/effect
  string despawn_effect = 10;
  float despawn_duration = 11;
}

// ============================================================================
// TEMPLATE DELTA (Game server sends ONLY changes)
// ============================================================================

message TemplateInstanceDelta {
  string instance_id = 1;

  // Only changed fields
  optional cryo.common.CryoTransform transform = 10;

  // Property changes
  map<string, string> changed_properties = 20;
  repeated string removed_properties = 21;

  // Trigger state changes
  repeated TriggerInstanceState changed_trigger_states = 30;
}

// ============================================================================
// TEMPLATE VERSIONING
// ============================================================================

message TemplateVersion {
  string template_id = 1;
  string version = 2;           // Semantic version (e.g., "1.2.3")

  // Changelog
  repeated VersionChange changes = 10;

  // Migration info
  bool breaking_change = 20;
  string migration_script = 21;  // Optional script to migrate old instances
}

message VersionChange {
  enum ChangeType {
    ADDED = 0;
    MODIFIED = 1;
    REMOVED = 2;
    DEPRECATED = 3;
  }
  ChangeType type = 1;
  string description = 2;
  int64 timestamp = 3;
}

// ============================================================================
// TEMPLATE VARIANTS (Same template, different configs)
// ============================================================================

message TemplateVariant {
  string variant_id = 1;
  string base_template_id = 2;
  string variant_name = 3;

  // Overrides from base template
  map<string, string> property_overrides = 10;
  repeated cryo.triggers.StateTrigger trigger_overrides = 11;

  // Visual overrides
  optional string mesh_override = 20;
  optional string material_override = 21;
}

// ============================================================================
// TEMPLATE PRELOADING (Hint system)
// ============================================================================

message PreloadHint {
  repeated string template_ids = 1;

  enum PreloadPriority {
    LOW = 0;
    NORMAL = 1;
    HIGH = 2;
    CRITICAL = 3;
  }
  PreloadPriority priority = 2;

  // Context
  string reason = 10;  // "entering_zone", "quest_progress", etc.
}