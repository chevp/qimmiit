import "cryo_common.proto";

// Unload action for entities, GLTF nodes, and textures
message UnloadAction {
  oneof target {
    cryo.common.EntityTarget entity = 1;
    cryo.common.GltfNodeTarget gltf_node = 2;
    cryo.common.TextureTarget texture = 3;
  }
}
