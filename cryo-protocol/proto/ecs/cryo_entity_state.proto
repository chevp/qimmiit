// cryo_entity_state.proto - Real-time entity state updates
// For streaming entity state changes (transform, animation, visual changes)
syntax = "proto3";

package cryo.entity.state;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "ecs/cryo_entity.proto";

// ==============================================================================
// ENTITY STATE UPDATE (Real-time streaming)
// ==============================================================================
// Sent frequently (e.g., 60 Hz) for entities that are moving or changing

message EntityStateUpdate {
  string entity_id = 1;
  uint64 timestamp = 2;                         // Timestamp in microseconds
  uint32 sequence_number = 3;                   // For ordering/detecting packet loss

  // Transform update
  optional TransformUpdate transform = 10;

  // Animation state update
  optional AnimationStateUpdate animation = 20;

  // Visual state update
  optional VisualStateUpdate visual = 30;

  // Physics state update
  optional PhysicsStateUpdate physics = 40;

  // Audio state update
  optional AudioStateUpdate audio = 50;
}

// ==============================================================================
// TRANSFORM UPDATE
// ==============================================================================

message TransformUpdate {
  optional common.CryoVec3 position = 1;
  optional common.CryoVec4 rotation = 2;        // Quaternion
  optional common.CryoVec3 scale = 3;

  // Velocity (for prediction/interpolation)
  optional common.CryoVec3 linear_velocity = 10;
  optional common.CryoVec3 angular_velocity = 11;

  // Space (local or world)
  TransformSpace space = 20;

  enum TransformSpace {
    LOCAL = 0;
    WORLD = 1;
  }
}

// ==============================================================================
// ANIMATION STATE UPDATE
// ==============================================================================

message AnimationStateUpdate {
  string current_clip = 1;                      // Current animation clip name
  float normalized_time = 2;                    // 0.0 to 1.0 within clip
  float playback_speed = 3;                     // Speed multiplier

  // Blending
  optional BlendState blend = 10;

  // Layer-based animation (for multiple simultaneous animations)
  repeated AnimationLayerState layers = 20;

  // IK (Inverse Kinematics) targets
  repeated IKTargetState ik_targets = 30;
}

message BlendState {
  string blend_from_clip = 1;
  float blend_factor = 2;                       // 0.0 to 1.0
  float blend_duration = 3;                     // Total blend time in seconds
}

message AnimationLayerState {
  int32 layer_index = 1;
  string clip_name = 2;
  float weight = 3;                             // Layer weight (0.0 to 1.0)
  float normalized_time = 4;
}

message IKTargetState {
  string target_name = 1;                       // e.g., "LeftHand", "RightFoot"
  common.CryoVec3 target_position = 2;
  common.CryoVec4 target_rotation = 3;
  float weight = 4;                             // IK influence (0.0 to 1.0)
}

// ==============================================================================
// VISUAL STATE UPDATE
// ==============================================================================

message VisualStateUpdate {
  optional bool visible = 1;
  optional float opacity = 2;

  // Material property changes
  repeated MaterialPropertyUpdate material_updates = 10;

  // Active effects
  repeated ActiveEffect effects = 20;

  // LOD change
  optional int32 lod_level = 30;

  // Morph targets / blend shapes
  repeated MorphTargetUpdate morph_targets = 40;
}

message MaterialPropertyUpdate {
  string material_slot = 1;                     // Which material (or index)
  string property_name = 2;                     // Property to update
  common.CryoUniformValue value = 3;            // New value
}

message ActiveEffect {
  string effect_id = 1;
  string effect_type = 2;                       // "glow", "damage_flash", "dissolve", etc.
  float intensity = 3;
  float remaining_duration = 4;                 // -1 = infinite
  map<string, float> parameters = 5;
}

message MorphTargetUpdate {
  string morph_target_name = 1;                 // Or index
  float weight = 2;                             // 0.0 to 1.0
}

// ==============================================================================
// PHYSICS STATE UPDATE
// ==============================================================================

message PhysicsStateUpdate {
  optional common.CryoVec3 velocity = 1;
  optional common.CryoVec3 angular_velocity = 2;
  optional bool is_sleeping = 3;                // Physics body sleep state
  optional bool is_grounded = 4;                // For character controllers

  // Forces being applied
  repeated AppliedForce applied_forces = 10;
}

message AppliedForce {
  string force_id = 1;
  common.CryoVec3 force = 2;
  common.CryoVec3 point = 3;                    // Point of application (for torque)
  ForceMode mode = 4;

  enum ForceMode {
    FORCE = 0;                                  // Continuous force
    IMPULSE = 1;                                // Instant force
    VELOCITY_CHANGE = 2;                        // Instant velocity change
    ACCELERATION = 3;                           // Continuous acceleration
  }
}

// ==============================================================================
// AUDIO STATE UPDATE
// ==============================================================================

message AudioStateUpdate {
  optional bool is_playing = 1;
  optional float current_time = 2;              // Playback position in seconds
  optional float volume = 3;
  optional float pitch = 4;
  optional bool is_looping = 5;
}

// ==============================================================================
// BATCH STATE UPDATES
// ==============================================================================
// For efficiently sending multiple entity updates at once

message BatchEntityStateUpdate {
  repeated EntityStateUpdate updates = 1;
  uint64 batch_timestamp = 2;
  uint32 batch_sequence = 3;
}

// ==============================================================================
// STATE SNAPSHOT
// ==============================================================================
// Complete state of an entity (for initialization or synchronization)

message EntityStateSnapshot {
  string entity_id = 1;
  uint64 timestamp = 2;

  // Complete transform
  common.CryoTransform local_transform = 10;
  common.CryoTransform world_transform = 11;

  // Complete animation state
  AnimationStateSnapshot animation = 20;

  // Complete visual state
  VisualStateSnapshot visual = 30;

  // Complete physics state
  PhysicsStateSnapshot physics = 40;

  // Complete audio state
  AudioStateSnapshot audio = 50;

  // Component states
  repeated ComponentStateSnapshot components = 60;
}

message AnimationStateSnapshot {
  string current_clip = 1;
  float normalized_time = 2;
  float playback_speed = 3;
  repeated AnimationLayerState layers = 4;
  repeated IKTargetState ik_targets = 5;
}

message VisualStateSnapshot {
  bool visible = 1;
  float opacity = 2;
  map<string, MaterialState> materials = 3;
  repeated ActiveEffect effects = 4;
  int32 lod_level = 5;
  map<string, float> morph_targets = 6;
}

message MaterialState {
  string material_uri = 1;
  map<string, common.CryoUniformValue> properties = 2;
}

message PhysicsStateSnapshot {
  common.CryoVec3 velocity = 1;
  common.CryoVec3 angular_velocity = 2;
  bool is_sleeping = 3;
  bool is_grounded = 4;
  float mass = 5;
  bool is_kinematic = 6;
}

message AudioStateSnapshot {
  string current_clip_uri = 1;
  bool is_playing = 2;
  float current_time = 3;
  float volume = 4;
  float pitch = 5;
  bool is_looping = 6;
}

message ComponentStateSnapshot {
  string component_id = 1;
  entity.ComponentType type = 2;
  map<string, string> state_data = 3;          // Component-specific state
}

// ==============================================================================
// STATE INTERPOLATION HINTS
// ==============================================================================
// For smooth interpolation on the client side

message InterpolationHint {
  string entity_id = 1;
  InterpolationMode mode = 2;
  float interpolation_time = 3;                 // Time to interpolate in seconds

  enum InterpolationMode {
    NONE = 0;                                   // Snap to new state
    LINEAR = 1;                                 // Linear interpolation
    SMOOTH = 2;                                 // Smooth interpolation (ease in/out)
    CUBIC = 3;                                  // Cubic interpolation
  }
}

// ==============================================================================
// STATE DELTA COMPRESSION
// ==============================================================================
// For bandwidth optimization - only send what changed

message EntityStateDelta {
  string entity_id = 1;
  uint64 timestamp = 2;
  uint32 sequence_number = 3;
  uint32 base_sequence_number = 4;              // Sequence this delta is based on

  // Bitmask indicating which fields changed
  uint64 changed_fields = 10;

  // Only changed values are included
  optional TransformUpdate transform = 20;
  optional AnimationStateUpdate animation = 21;
  optional VisualStateUpdate visual = 22;
  optional PhysicsStateUpdate physics = 23;
  optional AudioStateUpdate audio = 24;
}

// ==============================================================================
// STATE CHANGE EVENTS
// ==============================================================================
// Discrete state changes (not continuous updates)

message EntityStateChangeEvent {
  string entity_id = 1;
  uint64 timestamp = 2;
  StateChangeType change_type = 3;

  oneof change {
    EntityEnabledChange enabled_change = 10;
    EntityVisibilityChange visibility_change = 11;
    ComponentStateChange component_change = 12;
    AnimationTrigger animation_trigger = 13;
    EffectTrigger effect_trigger = 14;
  }

  enum StateChangeType {
    ENABLED_CHANGED = 0;
    VISIBILITY_CHANGED = 1;
    COMPONENT_STATE_CHANGED = 2;
    ANIMATION_TRIGGERED = 3;
    EFFECT_TRIGGERED = 4;
  }
}

message EntityEnabledChange {
  bool enabled = 1;
}

message EntityVisibilityChange {
  bool visible = 1;
}

message ComponentStateChange {
  string component_id = 1;
  entity.ComponentType type = 2;
  bool enabled = 3;
}

message AnimationTrigger {
  string trigger_name = 1;
  map<string, float> parameters = 2;
}

message EffectTrigger {
  string effect_type = 1;
  float duration = 2;
  map<string, float> parameters = 3;
}

// ==============================================================================
// STATE SYNCHRONIZATION
// ==============================================================================
// For keeping client and server in sync

message StateSync {
  repeated EntityStateSnapshot snapshots = 1;
  uint64 sync_timestamp = 2;
  uint32 sync_id = 3;
}

message StateSyncRequest {
  repeated string entity_ids = 1;               // Request sync for specific entities
  bool full_scene = 2;                          // Request sync for entire scene
}

message StateSyncResponse {
  bool success = 1;
  StateSync state = 2;
  string error_message = 3;
}