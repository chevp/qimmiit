// cryo_entity.proto - Entity definitions for Cryo scene graph
// Defines what an entity is, its components, and how it's structured
syntax = "proto3";

package cryo.entity;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";

// ==============================================================================
// ENTITY DEFINITION
// ==============================================================================
// An entity is a container for components that define behavior and appearance
// Entities can have children (forming a scene graph hierarchy)

message Entity {
  string entity_id = 1;                         // Unique identifier for this entity
  string name = 2;                              // Human-readable name (e.g., "Player", "Tree_01")
  EntityType type = 3;                          // Type hint for systems

  // Transform in local space (relative to parent)
  common.CryoTransform local_transform = 10;

  // Transform in world space (computed from hierarchy)
  common.CryoTransform world_transform = 11;

  // Hierarchy
  string parent_id = 20;                        // Empty string if root entity
  repeated string child_ids = 21;               // Children of this entity

  // Components define what this entity can do
  repeated EntityComponent components = 30;

  // Visual representation
  VisualRepresentation visual = 40;

  // Metadata
  EntityMetadata metadata = 50;

  // Entity enabled/disabled state
  bool enabled = 60;
  bool visible = 61;

  // Tags for grouping and filtering
  repeated string tags = 70;
}

// ==============================================================================
// ENTITY TYPE
// ==============================================================================

enum EntityType {
  ENTITY_TYPE_UNKNOWN = 0;
  ENTITY_TYPE_EMPTY = 1;                        // Empty node (for grouping)
  ENTITY_TYPE_MESH = 2;                         // 3D mesh
  ENTITY_TYPE_LIGHT = 3;                        // Light source
  ENTITY_TYPE_CAMERA = 4;                       // Camera
  ENTITY_TYPE_PARTICLE_SYSTEM = 5;              // Particle emitter
  ENTITY_TYPE_AUDIO_SOURCE = 6;                 // Audio emitter
  ENTITY_TYPE_PHYSICS_BODY = 7;                 // Physics object
  ENTITY_TYPE_TRIGGER = 8;                      // Trigger volume
  ENTITY_TYPE_TERRAIN = 9;                      // Terrain
  ENTITY_TYPE_WATER = 10;                       // Water plane
  ENTITY_TYPE_DECAL = 11;                       // Decal projector
  ENTITY_TYPE_LOD_GROUP = 12;                   // LOD group
  ENTITY_TYPE_PREFAB_INSTANCE = 13;             // Instance of a prefab
  ENTITY_TYPE_CHARACTER = 14;                   // Animated character
  ENTITY_TYPE_VEHICLE = 15;                     // Vehicle
  ENTITY_TYPE_BUILDING = 16;                    // Building/structure
  ENTITY_TYPE_PROP = 17;                        // Generic prop
  ENTITY_TYPE_UI_ELEMENT = 18;                  // UI element (3D space)
}

// ==============================================================================
// ENTITY COMPONENT
// ==============================================================================
// Components add functionality to entities (ECS-style)

message EntityComponent {
  string component_id = 1;                      // Unique ID for this component instance
  ComponentType type = 2;                       // What kind of component
  bool enabled = 3;                             // Component can be disabled

  // Component-specific data
  oneof data {
    MeshComponent mesh = 10;
    LightComponent light = 11;
    CameraComponent camera = 12;
    AudioComponent audio = 13;
    PhysicsComponent physics = 14;
    ScriptComponent script = 15;
    AnimationComponent animation = 16;
    ParticleSystemComponent particle_system = 17;
    ColliderComponent collider = 18;
    RigidbodyComponent rigidbody = 19;
    CharacterControllerComponent character_controller = 20;
    NavMeshAgentComponent navmesh_agent = 21;
    TerrainComponent terrain = 22;
    DecalComponent decal = 23;
  }

  // Custom properties (for game-specific components)
  map<string, string> properties = 100;
}

enum ComponentType {
  COMPONENT_TYPE_UNKNOWN = 0;
  COMPONENT_TYPE_MESH = 1;
  COMPONENT_TYPE_LIGHT = 2;
  COMPONENT_TYPE_CAMERA = 3;
  COMPONENT_TYPE_AUDIO = 4;
  COMPONENT_TYPE_PHYSICS = 5;
  COMPONENT_TYPE_SCRIPT = 6;
  COMPONENT_TYPE_ANIMATION = 7;
  COMPONENT_TYPE_PARTICLE_SYSTEM = 8;
  COMPONENT_TYPE_COLLIDER = 9;
  COMPONENT_TYPE_RIGIDBODY = 10;
  COMPONENT_TYPE_CHARACTER_CONTROLLER = 11;
  COMPONENT_TYPE_NAVMESH_AGENT = 12;
  COMPONENT_TYPE_TERRAIN = 13;
  COMPONENT_TYPE_DECAL = 14;
}

// ==============================================================================
// COMPONENT DEFINITIONS
// ==============================================================================

message MeshComponent {
  string mesh_asset_uri = 1;                    // Asset URI (e.g., "asset://models/tree.gltf")
  repeated string material_asset_uris = 2;      // Materials to apply
  bool cast_shadows = 3;
  bool receive_shadows = 4;
  int32 render_queue = 5;                       // Draw order
  int32 layer_mask = 6;                         // Rendering layers
}

message LightComponent {
  common.CryoLight light = 1;
  bool cast_shadows = 2;
  float shadow_bias = 3;
  int32 shadow_resolution = 4;
}

message CameraComponent {
  common.CryoCamera camera = 1;
  int32 render_order = 2;                       // Camera priority
  int32 culling_mask = 3;                       // Which layers to render
  string target_texture = 4;                    // Render to texture (empty = screen)
}

message AudioComponent {
  string audio_clip_uri = 1;                    // Audio file URI
  bool loop = 2;
  float volume = 3;
  float pitch = 4;
  float spatial_blend = 5;                      // 0 = 2D, 1 = 3D
  float min_distance = 6;
  float max_distance = 7;
  bool play_on_start = 8;
}

message PhysicsComponent {
  float mass = 1;
  float drag = 2;
  float angular_drag = 3;
  bool use_gravity = 4;
  bool is_kinematic = 5;
  CollisionDetectionMode collision_detection = 6;

  enum CollisionDetectionMode {
    DISCRETE = 0;
    CONTINUOUS = 1;
    CONTINUOUS_DYNAMIC = 2;
  }
}

message ScriptComponent {
  string script_name = 1;                       // Script identifier
  string script_uri = 2;                        // Script asset URI
  map<string, string> parameters = 3;           // Script parameters
}

message AnimationComponent {
  string animation_controller_uri = 1;          // Animation controller asset
  repeated string available_animations = 2;     // Available animation clips
  string default_animation = 3;                 // Animation to play on start
  bool play_automatically = 4;
}

message ParticleSystemComponent {
  string particle_texture_uri = 1;
  int32 max_particles = 2;
  float emission_rate = 3;
  float lifetime = 4;
  common.CryoVec3 start_velocity = 5;
  common.CryoColor start_color = 6;
  float start_size = 7;
  bool looping = 8;
}

message ColliderComponent {
  ColliderType type = 1;
  bool is_trigger = 2;
  common.CryoVec3 center = 3;

  // Type-specific parameters
  common.CryoVec3 size = 10;                    // For box collider
  float radius = 11;                            // For sphere/capsule collider
  float height = 12;                            // For capsule collider
  string mesh_uri = 13;                         // For mesh collider

  enum ColliderType {
    BOX = 0;
    SPHERE = 1;
    CAPSULE = 2;
    MESH = 3;
  }
}

message RigidbodyComponent {
  float mass = 1;
  float drag = 2;
  float angular_drag = 3;
  bool use_gravity = 4;
  bool is_kinematic = 5;
  int32 collision_detection_mode = 6;
  RigidbodyConstraints constraints = 7;

  message RigidbodyConstraints {
    bool freeze_position_x = 1;
    bool freeze_position_y = 2;
    bool freeze_position_z = 3;
    bool freeze_rotation_x = 4;
    bool freeze_rotation_y = 5;
    bool freeze_rotation_z = 6;
  }
}

message CharacterControllerComponent {
  float height = 1;
  float radius = 2;
  float step_offset = 3;
  float slope_limit = 4;
  common.CryoVec3 center = 5;
}

message NavMeshAgentComponent {
  float speed = 1;
  float angular_speed = 2;
  float acceleration = 3;
  float stopping_distance = 4;
  bool auto_braking = 5;
  float radius = 6;
  float height = 7;
  int32 area_mask = 8;
}

message TerrainComponent {
  string heightmap_uri = 1;
  common.CryoVec3 size = 2;
  int32 heightmap_resolution = 3;
  repeated string texture_uris = 4;             // Terrain textures (splat maps)
}

message DecalComponent {
  string texture_uri = 1;
  common.CryoVec3 size = 2;
  float opacity = 3;
  int32 render_queue = 4;
}

// ==============================================================================
// VISUAL REPRESENTATION
// ==============================================================================

message VisualRepresentation {
  // Primary visual asset (could be mesh, sprite, particle system, etc.)
  string primary_asset_uri = 1;

  // Materials
  repeated string material_uris = 2;

  // LOD (Level of Detail) settings
  LODSettings lod = 3;

  // Rendering settings
  RenderSettings render_settings = 4;

  // Bounds (for culling)
  common.CryoAABB bounds = 5;
}

message LODSettings {
  int32 current_lod_level = 1;                  // Current LOD (0 = highest quality)
  repeated LODLevel levels = 2;
}

message LODLevel {
  int32 level = 1;                              // 0, 1, 2, etc.
  string mesh_uri = 2;                          // Mesh for this LOD
  float screen_relative_height = 3;             // When to switch (0.0 - 1.0)
}

message RenderSettings {
  bool cast_shadows = 1;
  bool receive_shadows = 2;
  int32 layer = 3;                              // Rendering layer
  int32 render_queue = 4;                       // Draw order
  bool motion_vectors = 5;                      // For motion blur
  bool static_batching = 6;
  bool dynamic_batching = 7;
}

// ==============================================================================
// ENTITY METADATA
// ==============================================================================

message EntityMetadata {
  common.CryoMetadata cryo_metadata = 1;        // Standard Cryo metadata

  // Entity-specific metadata
  string prefab_uri = 10;                       // If this is a prefab instance
  bool is_prefab_root = 11;                     // Is this the root of a prefab?
  repeated string groups = 12;                  // Groups this entity belongs to
  map<string, string> custom_data = 20;         // Custom key-value data
}

// ==============================================================================
// ENTITY QUERY/FILTER
// ==============================================================================
// For searching/filtering entities in the scene graph

message EntityQuery {
  repeated string entity_ids = 1;               // Specific entity IDs
  repeated string names = 2;                    // Entity names (supports wildcards)
  repeated EntityType types = 3;                // Entity types
  repeated string tags = 4;                     // Tags
  repeated ComponentType component_types = 5;   // Must have these components

  // Spatial query
  SpatialQuery spatial = 10;

  // Hierarchy query
  string parent_id = 20;                        // Direct children of this parent
  bool include_descendants = 21;                // Include all descendants (recursive)
}

message SpatialQuery {
  oneof query_type {
    common.CryoAABB bounding_box = 1;           // Entities within this AABB
    common.CryoBoundingSphere bounding_sphere = 2; // Entities within this sphere
    RayQuery ray = 3;                           // Entities intersecting this ray
  }
}

message RayQuery {
  common.CryoVec3 origin = 1;
  common.CryoVec3 direction = 2;
  float max_distance = 3;
}