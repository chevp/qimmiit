// cryo_create_entity.proto - Entity creation commands and operations
// Defines messages for creating new entities in the scene graph
syntax = "proto3";

package cryo.entity.create;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "ecs/cryo_entity.proto";

// ==============================================================================
// ENTITY CREATION COMMANDS
// ==============================================================================

// Command to create a single entity
message CreateEntityCommand {
  string entity_id = 1;                         // If empty, server generates one
  string name = 2;                              // Entity name
  entity.EntityType type = 3;                   // Entity type

  common.CryoTransform initial_transform = 10;  // Initial transform

  string parent_id = 20;                        // Parent entity (empty = root)

  // Initial components
  repeated entity.EntityComponent components = 30;

  // Visual representation
  entity.VisualRepresentation visual = 40;

  // Tags
  repeated string tags = 50;

  // Metadata
  map<string, string> metadata = 60;

  // Initial state
  bool enabled = 70;
  bool visible = 71;
}

// Response for entity creation
message CreateEntityResponse {
  bool success = 1;
  string entity_id = 2;                         // Created entity ID
  entity.Entity created_entity = 3;             // The full created entity
  string error_message = 4;                     // If success = false
}

// ==============================================================================
// BATCH ENTITY CREATION
// ==============================================================================

// Command to create multiple entities at once
message BatchCreateEntitiesCommand {
  repeated CreateEntityCommand create_commands = 1;
  bool stop_on_error = 2;                       // Stop if any creation fails
}

// Response for batch entity creation
message BatchCreateEntitiesResponse {
  bool success = 1;
  repeated CreateEntityResponse results = 2;
  int32 successful_count = 3;
  int32 failed_count = 4;
  string error_message = 5;
}

// ==============================================================================
// ENTITY CREATION FROM TEMPLATES
// ==============================================================================

// Create entity from a template/prefab
message CreateEntityFromTemplateCommand {
  string template_uri = 1;                      // Template asset URI
  string entity_name = 2;                       // Override entity name
  common.CryoTransform spawn_transform = 3;
  string parent_id = 4;
  map<string, string> parameter_overrides = 5;  // Override template parameters
}

message CreateEntityFromTemplateResponse {
  bool success = 1;
  string root_entity_id = 2;                    // Root entity of template instance
  repeated string all_entity_ids = 3;           // All entities created
  string error_message = 4;
}

// ==============================================================================
// SPECIALIZED ENTITY CREATION
// ==============================================================================

// Create an empty entity (container)
message CreateEmptyEntityCommand {
  string name = 1;
  string parent_id = 2;
  common.CryoTransform transform = 3;
}

// Create a mesh entity
message CreateMeshEntityCommand {
  string name = 1;
  string parent_id = 2;
  common.CryoTransform transform = 3;
  string mesh_asset_uri = 4;
  repeated string material_asset_uris = 5;
  bool cast_shadows = 6;
  bool receive_shadows = 7;
}

// Create a light entity
message CreateLightEntityCommand {
  string name = 1;
  string parent_id = 2;
  common.CryoTransform transform = 3;
  common.CryoLight light = 4;
  bool cast_shadows = 5;
}

// Create a camera entity
message CreateCameraEntityCommand {
  string name = 1;
  string parent_id = 2;
  common.CryoTransform transform = 3;
  common.CryoCamera camera = 4;
  int32 render_order = 5;
}

// ==============================================================================
// ENTITY SPAWNING
// ==============================================================================

// Spawn entity at runtime with additional spawn parameters
message SpawnEntityCommand {
  string prefab_uri = 1;                        // Prefab to spawn
  common.CryoVec3 spawn_position = 2;
  common.CryoVec3 spawn_rotation = 3;           // Euler angles
  common.CryoVec3 spawn_scale = 4;
  string parent_id = 5;

  // Spawn-specific parameters
  float spawn_delay = 10;                       // Delay before spawn (seconds)
  bool spawn_with_effects = 11;                 // Play spawn effects
  string spawn_effect_uri = 12;                 // Custom spawn effect
}

message SpawnEntityResponse {
  bool success = 1;
  string entity_id = 2;
  repeated string all_spawned_ids = 3;
  string error_message = 4;
}
