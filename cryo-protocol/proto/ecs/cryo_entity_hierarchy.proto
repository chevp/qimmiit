// cryo_entity_hierarchy.proto - Scene graph hierarchy and traversal
// Manages parent-child relationships and scene graph structure
syntax = "proto3";

package cryo.entity.hierarchy;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "ecs/cryo_entity.proto";

// ==============================================================================
// SCENE GRAPH NODE
// ==============================================================================
// Represents a node in the scene graph hierarchy

message SceneGraphNode {
  string entity_id = 1;
  string parent_id = 2;                         // Empty if root
  repeated string child_ids = 3;

  // Hierarchy metadata
  int32 depth = 10;                             // Distance from root (0 = root)
  string path = 11;                             // Full path from root (e.g., "/root/parent/child")
  int32 sibling_index = 12;                     // Index among siblings

  // Transform chain
  common.CryoTransform local_transform = 20;
  common.CryoTransform world_transform = 21;

  // Hierarchy flags
  bool is_root = 30;
  bool is_leaf = 31;                            // Has no children
  bool is_prefab_root = 32;                     // Root of a prefab instance
  bool is_prefab_child = 33;                    // Part of a prefab instance
}

// ==============================================================================
// SCENE GRAPH
// ==============================================================================
// Complete scene graph structure

message SceneGraph {
  repeated SceneGraphNode nodes = 1;
  repeated string root_entity_ids = 2;          // Top-level entities

  // Graph metadata
  int32 total_entities = 10;
  int32 max_depth = 11;

  // Spatial organization
  repeated SpatialPartition spatial_partitions = 20;
}

message SpatialPartition {
  string partition_id = 1;
  common.CryoAABB bounds = 2;
  repeated string entity_ids = 3;               // Entities in this partition
}

// ==============================================================================
// HIERARCHY QUERY
// ==============================================================================

message GetHierarchyCommand {
  oneof query {
    string entity_id = 1;                       // Get hierarchy starting from this entity
    bool entire_scene = 2;                      // Get entire scene hierarchy
  }

  int32 max_depth = 10;                         // Max depth to traverse (0 = unlimited)
  bool include_disabled = 11;                   // Include disabled entities
}

message GetHierarchyResponse {
  bool success = 1;
  repeated SceneGraphNode nodes = 2;
  string error_message = 3;
}

message GetChildrenCommand {
  string parent_id = 1;
  bool recursive = 2;                           // Get all descendants
  int32 max_depth = 3;                          // For recursive queries
}

message GetChildrenResponse {
  bool success = 1;
  repeated string child_ids = 2;
  string error_message = 3;
}

message GetParentCommand {
  string entity_id = 1;
}

message GetParentResponse {
  bool success = 1;
  string parent_id = 2;
  string error_message = 3;
}

message GetAncestorsCommand {
  string entity_id = 1;
  bool include_self = 2;
}

message GetAncestorsResponse {
  bool success = 1;
  repeated string ancestor_ids = 2;             // Ordered from immediate parent to root
  string error_message = 3;
}

message GetDescendantsCommand {
  string entity_id = 1;
  bool include_self = 2;
  int32 max_depth = 3;
}

message GetDescendantsResponse {
  bool success = 1;
  repeated string descendant_ids = 2;
  string error_message = 3;
}

message GetSiblingsCommand {
  string entity_id = 1;
  bool include_self = 2;
}

message GetSiblingsResponse {
  bool success = 1;
  repeated string sibling_ids = 2;
  string error_message = 3;
}

// ==============================================================================
// HIERARCHY TRAVERSAL
// ==============================================================================

message TraverseHierarchyCommand {
  string start_entity_id = 1;
  TraversalOrder order = 2;
  TraversalDirection direction = 3;
  entity.EntityQuery filter = 4;               // Optional filter

  enum TraversalOrder {
    DEPTH_FIRST = 0;
    BREADTH_FIRST = 1;
  }

  enum TraversalDirection {
    TOP_DOWN = 0;                               // From root to leaves
    BOTTOM_UP = 1;                              // From leaves to root
  }
}

message TraverseHierarchyResponse {
  bool success = 1;
  repeated string entity_ids = 2;               // In traversal order
  string error_message = 3;
}

// ==============================================================================
// HIERARCHY VALIDATION
// ==============================================================================

message ValidateHierarchyCommand {
  oneof scope {
    string entity_id = 1;                       // Validate subtree
    bool entire_scene = 2;                      // Validate entire scene
  }

  // Validation checks
  bool check_cycles = 10;                       // Check for circular references
  bool check_orphans = 11;                      // Check for orphaned entities
  bool check_transforms = 12;                   // Validate transform chain
  bool check_prefabs = 13;                      // Validate prefab instances
}

message ValidateHierarchyResponse {
  bool success = 1;
  bool is_valid = 2;
  repeated HierarchyValidationError errors = 3;
  repeated HierarchyValidationWarning warnings = 4;
}

message HierarchyValidationError {
  ErrorType type = 1;
  string entity_id = 2;
  string description = 3;

  enum ErrorType {
    CIRCULAR_REFERENCE = 0;
    INVALID_PARENT = 1;
    ORPHANED_ENTITY = 2;
    INVALID_TRANSFORM = 3;
    BROKEN_PREFAB = 4;
    MISSING_ENTITY = 5;
  }
}

message HierarchyValidationWarning {
  WarningType type = 1;
  string entity_id = 2;
  string description = 3;

  enum WarningType {
    DEEP_HIERARCHY = 0;                         // Very deep nesting
    MANY_CHILDREN = 1;                          // Entity has many children
    DUPLICATE_NAME = 2;                         // Multiple entities with same name
    UNUSED_ENTITY = 3;                          // Entity not referenced
  }
}

// ==============================================================================
// HIERARCHY MODIFICATION EVENTS
// ==============================================================================
// Events broadcasted when hierarchy changes

message HierarchyChangeEvent {
  uint64 timestamp = 1;
  ChangeType change_type = 2;

  oneof change {
    EntityAdded entity_added = 10;
    EntityRemoved entity_removed = 11;
    EntityReparented entity_reparented = 12;
    ChildrenReordered children_reordered = 13;
  }

  enum ChangeType {
    ENTITY_ADDED = 0;
    ENTITY_REMOVED = 1;
    ENTITY_REPARENTED = 2;
    CHILDREN_REORDERED = 3;
  }
}

message EntityAdded {
  string entity_id = 1;
  string parent_id = 2;
  int32 sibling_index = 3;
}

message EntityRemoved {
  string entity_id = 1;
  string parent_id = 2;
}

message EntityReparented {
  string entity_id = 1;
  string old_parent_id = 2;
  string new_parent_id = 3;
}

message ChildrenReordered {
  string parent_id = 1;
  repeated string new_child_order = 2;
}

// ==============================================================================
// HIERARCHY BATCH OPERATIONS
// ==============================================================================

message BatchReparentCommand {
  repeated ReparentOperation operations = 1;

  message ReparentOperation {
    string entity_id = 1;
    string new_parent_id = 2;
    int32 sibling_index = 3;                    // -1 = append to end
    bool keep_world_transform = 4;
  }
}

message BatchReparentResponse {
  bool success = 1;
  int32 successful_count = 2;
  repeated string failed_entity_ids = 3;
  string error_message = 4;
}

message ReorderChildrenCommand {
  string parent_id = 1;
  repeated string new_child_order = 2;          // Complete new ordering
}

message ReorderChildrenResponse {
  bool success = 1;
  string error_message = 2;
}

message SetSiblingIndexCommand {
  string entity_id = 1;
  int32 new_index = 2;
}

message SetSiblingIndexResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// TRANSFORM PROPAGATION
// ==============================================================================
// For updating world transforms when hierarchy changes

message PropagateTransformCommand {
  string entity_id = 1;                         // Start propagation from here
  bool recursive = 2;                           // Propagate to all descendants
}

message PropagateTransformResponse {
  bool success = 1;
  repeated string updated_entity_ids = 2;       // Entities whose transforms were updated
  string error_message = 3;
}

message TransformPropagationEvent {
  string entity_id = 1;
  common.CryoTransform old_world_transform = 2;
  common.CryoTransform new_world_transform = 3;
  uint64 timestamp = 4;
}

// ==============================================================================
// HIERARCHY SNAPSHOT
// ==============================================================================
// Complete snapshot of hierarchy state

message HierarchySnapshot {
  uint64 timestamp = 1;
  repeated SceneGraphNode nodes = 2;
  repeated string root_ids = 3;
  map<string, common.CryoTransform> world_transforms = 4;
}

message SaveHierarchySnapshotCommand {
  string snapshot_id = 1;                       // Optional ID for the snapshot
  oneof scope {
    bool entire_scene = 2;
    string root_entity_id = 3;                  // Snapshot subtree
  }
}

message SaveHierarchySnapshotResponse {
  bool success = 1;
  string snapshot_id = 2;
  string error_message = 3;
}

message RestoreHierarchySnapshotCommand {
  string snapshot_id = 1;
  bool clear_existing = 2;                      // Clear scene before restoring
}

message RestoreHierarchySnapshotResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// HIERARCHY SEARCH
// ==============================================================================

message FindEntityByPathCommand {
  string path = 1;                              // e.g., "/Root/Player/Head"
  string start_entity_id = 2;                   // Start search from here (empty = roots)
}

message FindEntityByPathResponse {
  bool success = 1;
  string entity_id = 2;
  string error_message = 3;
}

message FindEntitiesByNameCommand {
  string name = 1;                              // Exact match or pattern
  bool use_pattern = 2;                         // Use wildcard matching
  oneof scope {
    bool entire_scene = 3;
    string parent_id = 4;                       // Search within subtree
  }
}

message FindEntitiesByNameResponse {
  bool success = 1;
  repeated string entity_ids = 2;
  string error_message = 3;
}

message GetEntityPathCommand {
  string entity_id = 1;
  PathFormat format = 2;

  enum PathFormat {
    FULL = 0;                                   // "/Root/Parent/Child"
    RELATIVE = 1;                               // "Parent/Child"
    IDS = 2;                                    // List of IDs
  }
}

message GetEntityPathResponse {
  bool success = 1;
  oneof result {
    string path = 2;                            // For FULL and RELATIVE
    RepeatedString id_path = 3;                 // For IDS
  }
  string error_message = 4;

  message RepeatedString {
    repeated string values = 1;
  }
}

// ==============================================================================
// HIERARCHY STATISTICS
// ==============================================================================

message GetHierarchyStatsCommand {
  oneof scope {
    bool entire_scene = 1;
    string entity_id = 2;                       // Stats for subtree
  }
}

message GetHierarchyStatsResponse {
  bool success = 1;
  HierarchyStats stats = 2;
  string error_message = 3;
}

message HierarchyStats {
  int32 total_entities = 1;
  int32 root_entities = 2;
  int32 leaf_entities = 3;
  int32 max_depth = 4;
  float average_depth = 5;
  int32 max_children = 6;
  float average_children = 7;

  // Type distribution
  map<int32, int32> entities_by_type = 10;      // EntityType -> count

  // Component distribution
  map<int32, int32> entities_by_component = 11; // ComponentType -> count
}