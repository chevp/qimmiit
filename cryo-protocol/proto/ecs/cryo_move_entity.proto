import "cryo_common.proto";

// Move action for entities and GLTF nodes
message MoveAction {
  oneof target {
    cryo.common.EntityTarget entity = 1;
    cryo.common.GltfNodeTarget gltf_node = 2;
  }
  cryo.common.CryoVec3 position = 3;
  bool relative = 4;  // If true, position is relative to current position
}
