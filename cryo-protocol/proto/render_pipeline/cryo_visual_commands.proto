// cryo_visual_commands.proto - Visual/graphical command verbs
// Central collection of all graphical operations and visual effects
syntax = "proto3";

package cryo.visual;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";

// ==============================================================================
// TARGET SPECIFICATION
// ==============================================================================

message VisualTarget {
  oneof target {
    string entity_id = 1;                       // Scene entity
    string ui_element_id = 2;                   // UI element
    string gltf_node_path = 3;                  // GLTF node path
  }
}

// ==============================================================================
// MOVEMENT COMMANDS
// ==============================================================================

message MoveCommand {
  VisualTarget target = 1;
  common.CryoVec3 position = 2;
  bool relative = 3;                            // Relative to current position
  float duration = 4;                           // 0 = instant
  string easing = 5;                            // Easing function name
}

message MoveToCommand {
  VisualTarget target = 1;
  common.CryoVec3 destination = 2;
  float speed = 3;                              // Units per second (0 = instant)
  string easing = 4;
}

message MoveAlongPathCommand {
  VisualTarget target = 1;
  repeated common.CryoVec3 path_points = 2;
  float duration = 3;
  bool loop = 4;
  string easing = 5;
}

// ==============================================================================
// ROTATION COMMANDS
// ==============================================================================

message RotateCommand {
  VisualTarget target = 1;
  common.CryoVec4 rotation = 2;                 // Quaternion
  bool relative = 3;
  float duration = 4;
  string easing = 5;
}

message RotateEulerCommand {
  VisualTarget target = 1;
  common.CryoVec3 euler_angles = 2;             // Degrees (pitch, yaw, roll)
  bool relative = 3;
  float duration = 4;
  string easing = 5;
}

message RotateAroundCommand {
  VisualTarget target = 1;
  common.CryoVec3 axis = 2;                     // Rotation axis
  float angle = 3;                              // Degrees
  common.CryoVec3 pivot_point = 4;              // Point to rotate around
  float duration = 5;
  string easing = 6;
}

message SpinCommand {
  VisualTarget target = 1;
  common.CryoVec3 axis = 2;                     // Rotation axis (normalized)
  float angular_velocity = 3;                   // Degrees per second
  float duration = 4;                           // 0 = infinite
}

// ==============================================================================
// SCALE COMMANDS
// ==============================================================================

message ScaleCommand {
  VisualTarget target = 1;
  common.CryoVec3 scale = 2;
  bool relative = 3;
  float duration = 4;
  string easing = 5;
}

message ScaleUniformCommand {
  VisualTarget target = 1;
  float scale_factor = 2;
  bool relative = 3;
  float duration = 4;
  string easing = 5;
}

message PulseScaleCommand {
  VisualTarget target = 1;
  float min_scale = 2;
  float max_scale = 3;
  float frequency = 4;                          // Pulses per second
  float duration = 5;                           // 0 = infinite
  string easing = 6;
}

// ==============================================================================
// ANIMATION COMMANDS
// ==============================================================================

message PlayAnimationCommand {
  VisualTarget target = 1;
  string animation_name = 2;
  float playback_speed = 3;                     // 1.0 = normal speed
  bool loop = 4;
  float blend_duration = 5;                     // Blend from current animation
  float start_time = 6;                         // Start at specific time (normalized 0-1)
}

message StopAnimationCommand {
  VisualTarget target = 1;
  string animation_name = 2;                    // Empty = stop all
  float blend_out_duration = 3;                 // Blend out time
}

message PauseAnimationCommand {
  VisualTarget target = 1;
  string animation_name = 2;                    // Empty = pause all
}

message ResumeAnimationCommand {
  VisualTarget target = 1;
  string animation_name = 2;                    // Empty = resume all
}

message SetAnimationSpeedCommand {
  VisualTarget target = 1;
  string animation_name = 2;
  float speed = 3;                              // Playback speed multiplier
}

message BlendAnimationsCommand {
  VisualTarget target = 1;
  string from_animation = 2;
  string to_animation = 3;
  float blend_duration = 4;
}

// ==============================================================================
// VISUAL EFFECT COMMANDS
// ==============================================================================

message TriggerEffectCommand {
  VisualTarget target = 1;
  string effect_type = 2;                       // "explosion", "damage_flash", "heal_glow", etc.
  float intensity = 3;                          // 0.0 to 1.0
  float duration = 4;                           // Effect duration in seconds
  map<string, float> parameters = 5;            // Effect-specific parameters
  common.CryoVec3 effect_position = 6;          // Optional position override
}

message StopEffectCommand {
  VisualTarget target = 1;
  string effect_id = 2;                         // Specific effect instance ID
  bool fade_out = 3;                            // Fade out smoothly
  float fade_duration = 4;
}

message UpdateEffectCommand {
  VisualTarget target = 1;
  string effect_id = 2;
  optional float intensity = 3;
  map<string, float> parameters = 4;
}

// ==============================================================================
// PARTICLE COMMANDS
// ==============================================================================

message SpawnParticleCommand {
  string particle_system_id = 1;
  string particle_type = 2;                     // Type of particle system
  common.CryoVec3 position = 3;
  common.CryoVec3 direction = 4;                // Emission direction
  float duration = 5;                           // 0 = infinite
  int32 max_particles = 6;
  map<string, float> parameters = 7;            // System-specific parameters
  string parent_entity_id = 8;                  // Optional parent
}

message DespawnParticleCommand {
  string particle_system_id = 1;
  bool immediate = 2;                           // true = instant, false = let particles die out
}

message UpdateParticleCommand {
  string particle_system_id = 1;
  optional float emission_rate = 2;
  optional float particle_lifetime = 3;
  optional common.CryoVec3 gravity = 4;
  map<string, float> parameters = 5;
}

message ParticleBurstCommand {
  string particle_system_id = 1;
  int32 particle_count = 2;
  common.CryoVec3 position = 3;
  float spread_angle = 4;                       // Emission cone angle
}

// ==============================================================================
// ICON COMMANDS
// ==============================================================================

message ShowIconCommand {
  string icon_id = 1;
  string icon_type = 2;                         // "buff", "debuff", "status", "indicator", etc.
  string icon_texture_uri = 3;
  common.CryoVec3 world_position = 4;           // For 3D icons
  common.CryoVec2 screen_position = 5;          // For 2D/UI icons
  string parent_entity_id = 6;                  // Optional: attach to entity
  float duration = 7;                           // 0 = permanent
  float fade_in_duration = 8;
  float scale = 9;
}

message HideIconCommand {
  string icon_id = 1;
  float fade_out_duration = 2;
}

message UpdateIconCommand {
  string icon_id = 1;
  optional string icon_texture_uri = 2;
  optional common.CryoVec3 world_position = 3;
  optional common.CryoVec2 screen_position = 4;
  optional float scale = 5;
  optional common.CryoColor tint = 6;
}

message PulseIconCommand {
  string icon_id = 1;
  float min_scale = 2;
  float max_scale = 3;
  float frequency = 4;
  float duration = 5;                           // 0 = infinite
}

// ==============================================================================
// TEXT COMMANDS
// ==============================================================================

message UpdateTextCommand {
  string text_element_id = 1;
  string new_text = 2;
  float transition_duration = 3;                // 0 = instant
  TextTransitionType transition = 4;

  enum TextTransitionType {
    INSTANT = 0;
    FADE = 1;
    TYPEWRITER = 2;
    NUMBER_COUNT = 3;                           // For numbers
  }
}

message UpdateTextColorCommand {
  string text_element_id = 1;
  common.CryoColor new_color = 2;
  float transition_duration = 3;
}

message UpdateTextSizeCommand {
  string text_element_id = 1;
  float new_size = 2;
  float transition_duration = 3;
}

message TypewriterTextCommand {
  string text_element_id = 1;
  string text = 2;
  float characters_per_second = 3;
  string typing_sound_uri = 4;                  // Optional
}

// ==============================================================================
// FADE COMMANDS
// ==============================================================================

message FadeInCommand {
  VisualTarget target = 1;
  float duration = 2;
  float target_opacity = 3;                     // Default: 1.0
  string easing = 4;
}

message FadeOutCommand {
  VisualTarget target = 1;
  float duration = 2;
  float target_opacity = 3;                     // Default: 0.0
  string easing = 4;
}

message FadeToCommand {
  VisualTarget target = 1;
  float target_opacity = 2;
  float duration = 3;
  string easing = 4;
}

message CrossfadeCommand {
  VisualTarget fade_out_target = 1;
  VisualTarget fade_in_target = 2;
  float duration = 3;
}

// ==============================================================================
// HIGHLIGHT COMMANDS
// ==============================================================================

message HighlightCommand {
  VisualTarget target = 1;
  HighlightType type = 2;
  common.CryoColor highlight_color = 3;
  float intensity = 4;                          // 0.0 to 1.0
  float pulse_frequency = 5;                    // 0 = no pulse
  float duration = 6;                           // 0 = permanent

  enum HighlightType {
    OUTLINE = 0;
    GLOW = 1;
    SILHOUETTE = 2;
    COLOR_TINT = 3;
    PULSE = 4;
  }
}

message UnhighlightCommand {
  VisualTarget target = 1;
  float fade_duration = 2;
}

message UpdateHighlightCommand {
  VisualTarget target = 1;
  optional common.CryoColor highlight_color = 2;
  optional float intensity = 3;
  optional float pulse_frequency = 4;
}

// ==============================================================================
// FLASH COMMANDS
// ==============================================================================

message FlashCommand {
  VisualTarget target = 1;
  common.CryoColor flash_color = 2;
  float intensity = 3;                          // 0.0 to 1.0
  float duration = 4;
  int32 flash_count = 5;                        // Number of flashes
  string easing = 6;
}

message DamageFlashCommand {
  VisualTarget target = 1;
  float intensity = 2;                          // 0.0 to 1.0
  float duration = 3;                           // Default: 0.2 seconds
}

message HealFlashCommand {
  VisualTarget target = 1;
  float intensity = 2;
  float duration = 3;
}

// ==============================================================================
// VISIBILITY COMMANDS
// ==============================================================================

message SetVisibilityCommand {
  VisualTarget target = 1;
  bool visible = 2;
  float transition_duration = 3;                // 0 = instant
  VisibilityTransition transition_type = 4;

  enum VisibilityTransition {
    INSTANT = 0;
    FADE = 1;
    SCALE = 2;
    DISSOLVE = 3;
  }
}

message ShowCommand {
  VisualTarget target = 1;
  float transition_duration = 2;
  string transition_type = 3;                   // "fade", "scale", "slide", etc.
}

message HideCommand {
  VisualTarget target = 1;
  float transition_duration = 2;
  string transition_type = 3;
}

message ToggleVisibilityCommand {
  VisualTarget target = 1;
  float transition_duration = 2;
}

// ==============================================================================
// LAYERING COMMANDS
// ==============================================================================

message MoveToFrontCommand {
  string ui_element_id = 1;                     // UI-specific
  bool preserve_sibling_order = 2;              // Move entire sibling group
}

message MoveToBackCommand {
  string ui_element_id = 1;
  bool preserve_sibling_order = 2;
}

message SetLayerCommand {
  VisualTarget target = 1;
  int32 layer = 2;                              // Rendering/UI layer
}

message SetRenderOrderCommand {
  VisualTarget target = 1;
  int32 render_order = 2;
}

// ==============================================================================
// SHAKE COMMANDS
// ==============================================================================

message ShakeCommand {
  VisualTarget target = 1;
  common.CryoVec3 intensity = 2;                // Shake intensity per axis
  float frequency = 3;                          // Shakes per second
  float duration = 4;
  bool decay = 5;                               // Decay over time
  ShakeType shake_type = 6;

  enum ShakeType {
    POSITIONAL = 0;
    ROTATIONAL = 1;
    BOTH = 2;
  }
}

message ScreenShakeCommand {
  float intensity = 1;
  float frequency = 2;
  float duration = 3;
  bool decay = 4;
}

message DamageShakeCommand {
  VisualTarget target = 1;
  float damage_amount = 2;                      // Scales shake intensity
  float duration = 3;
}

// ==============================================================================
// PROGRESS COMMANDS
// ==============================================================================

message UpdateProgressCommand {
  string progress_element_id = 1;
  float progress = 2;                           // 0.0 to 1.0
  float transition_duration = 3;
  string easing = 4;
}

message UpdateProgressBarCommand {
  string progress_bar_id = 1;
  float current_value = 2;
  float max_value = 3;
  float transition_duration = 4;
  optional common.CryoColor bar_color = 5;
}

message UpdateCooldownCommand {
  string cooldown_element_id = 1;
  float remaining_time = 2;
  float total_time = 3;
  bool show_numbers = 4;
}

message PulseProgressCommand {
  string progress_element_id = 1;
  float frequency = 2;
  float duration = 3;                           // 0 = infinite
}

// ==============================================================================
// COLOR COMMANDS
// ==============================================================================

message SetColorCommand {
  VisualTarget target = 1;
  common.CryoColor color = 2;
  float transition_duration = 3;
  string easing = 4;
}

message TintCommand {
  VisualTarget target = 1;
  common.CryoColor tint_color = 2;
  float intensity = 3;                          // 0.0 to 1.0
  float duration = 4;
}

message ColorCycleCommand {
  VisualTarget target = 1;
  repeated common.CryoColor colors = 2;
  float cycle_duration = 3;
  bool loop = 4;
}

message ColorPulseCommand {
  VisualTarget target = 1;
  common.CryoColor color_a = 2;
  common.CryoColor color_b = 3;
  float frequency = 4;
  float duration = 5;                           // 0 = infinite
}

// ==============================================================================
// MATERIAL COMMANDS
// ==============================================================================

message SetMaterialPropertyCommand {
  VisualTarget target = 1;
  string material_slot = 2;                     // Material name or index
  string property_name = 3;                     // "roughness", "metallic", etc.
  common.CryoUniformValue value = 4;
  float transition_duration = 5;
}

message SwapMaterialCommand {
  VisualTarget target = 1;
  string material_slot = 2;
  string new_material_uri = 3;
  float transition_duration = 4;
}

message DissolveCommand {
  VisualTarget target = 1;
  float duration = 2;
  string dissolve_texture_uri = 3;              // Dissolve pattern
  common.CryoColor edge_color = 4;              // Edge glow color
}

// ==============================================================================
// AUDIO-VISUAL COUPLED COMMANDS
// ==============================================================================

message PlaySoundCommand {
  string sound_id = 1;
  string audio_clip_uri = 2;
  common.CryoVec3 world_position = 3;           // For 3D audio
  float volume = 4;
  float pitch = 5;
  bool loop = 6;
  string parent_entity_id = 7;                  // Optional: attach to entity
}

message StopSoundCommand {
  string sound_id = 1;
  float fade_out_duration = 2;
}

message PlaySoundEffectCommand {
  string sfx_type = 1;                          // "hit", "explosion", "heal", etc.
  common.CryoVec3 position = 2;
  float volume = 3;
}

// ==============================================================================
// COMPOSITE VISUAL COMMANDS
// ==============================================================================

message VisualSequence {
  string sequence_id = 1;
  repeated VisualCommandWrapper commands = 2;
  bool loop = 3;
}

message VisualCommandWrapper {
  float delay = 1;                              // Delay before this command

  oneof command {
    MoveCommand move = 10;
    RotateCommand rotate = 11;
    ScaleCommand scale = 12;
    PlayAnimationCommand play_animation = 13;
    TriggerEffectCommand trigger_effect = 14;
    FadeInCommand fade_in = 15;
    FadeOutCommand fade_out = 16;
    HighlightCommand highlight = 17;
    FlashCommand flash = 18;
    ShakeCommand shake = 19;
    SetVisibilityCommand set_visibility = 20;
    UpdateTextCommand update_text = 21;
    UpdateProgressCommand update_progress = 22;
    SetColorCommand set_color = 23;
    ShowIconCommand show_icon = 24;
    SpawnParticleCommand spawn_particle = 25;
    PlaySoundCommand play_sound = 26;
  }
}

message VisualGroup {
  string group_id = 1;
  repeated VisualCommandWrapper commands = 2;   // Execute in parallel
  bool wait_for_all = 3;                        // Wait for all to complete
}

// ==============================================================================
// BATCH VISUAL COMMANDS
// ==============================================================================

message BatchVisualCommands {
  repeated VisualCommandWrapper commands = 1;
  uint64 timestamp = 2;
}