// cryo_project.proto - Project-level manifest and asset organization
// NO GAME LOGIC - Only visual asset management and scene composition
syntax = "proto3";

package cryo.project;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "google/protobuf/timestamp.proto";

// ============================================================================
// CRYO PROJECT (Root manifest for visual assets and scenes)
// ============================================================================

message CryoProject {
  string project_id = 1;
  string name = 2;
  string version = 3;

  // Project settings (RENDERING ONLY - NO GAME LOGIC)
  ProjectSettings settings = 10;

  // Asset registry (index of all visual assets)
  AssetRegistry asset_registry = 20;

  // Scene manifests (entry points for loading scenes)
  repeated SceneManifest scenes = 30;

  // Prefab library (reusable visual templates)
  repeated PrefabManifest prefabs = 40;

  // Material library
  repeated MaterialManifest materials = 50;

  // Shader graph library
  repeated ShaderGraphManifest shader_graphs = 60;

  // Metadata
  google.protobuf.Timestamp created_at = 70;
  google.protobuf.Timestamp modified_at = 71;
  string author = 72;
  repeated string tags = 73;
}

// ============================================================================
// PROJECT SETTINGS (Visual/Rendering Configuration Only)
// ============================================================================

message ProjectSettings {
  // Storage backend for assets
  StorageBackend storage = 1;

  // Default scene to load in editor
  string default_scene_id = 10;

  // Asset paths (e.g., "models" -> "assets/models")
  map<string, string> asset_roots = 20;

  // Default camera settings for editor
  common.CryoCamera default_editor_camera = 30;

  // Project-wide rendering settings
  RenderingDefaults rendering_defaults = 40;
}

message RenderingDefaults {
  common.CryoColor clear_color = 1;
  float ambient_intensity = 2;
  bool enable_shadows = 3;
  bool enable_post_processing = 4;
  int32 msaa_samples = 5;            // 0, 2, 4, 8, 16
}

message StorageBackend {
  enum BackendType {
    FILE_SYSTEM = 0;    // Local file system
    SQLITE = 1;         // SQLite database
    REMOTE_HTTP = 2;    // HTTP REST API (cryo-studio-server)
    S3 = 3;             // AWS S3 or compatible
    GIT_LFS = 4;        // Git Large File Storage
  }

  BackendType type = 1;

  oneof config {
    FileSystemConfig filesystem = 10;
    SqliteConfig sqlite = 11;
    RemoteHttpConfig remote = 12;
    S3Config s3 = 13;
    GitLfsConfig git_lfs = 14;
  }
}

message FileSystemConfig {
  string root_path = 1;              // e.g., "C:/Projects/MyGame"
  bool watch_for_changes = 2;        // Hot-reload support
}

message SqliteConfig {
  string database_path = 1;          // e.g., ".cryo/assets.db"
  bool in_memory = 2;                // For testing
}

message RemoteHttpConfig {
  string base_url = 1;               // e.g., "http://localhost:8080/api/assets"
  string auth_token = 2;             // Optional authentication
  int32 timeout_seconds = 3;
  bool use_tls = 4;
}

message S3Config {
  string bucket_name = 1;
  string region = 2;
  string access_key_id = 3;
  string secret_access_key = 4;
  string endpoint = 5;               // For S3-compatible services
}

message GitLfsConfig {
  string repository_url = 1;
  string branch = 2;
  string lfs_server_url = 3;
}

// ============================================================================
// ASSET REGISTRY (Index of all visual assets with dependency graph)
// ============================================================================

message AssetRegistry {
  repeated AssetEntry assets = 1;
  repeated AssetDependency dependencies = 2;
  AssetIndex index = 3;              // For fast lookups
}

message AssetEntry {
  string asset_id = 1;               // Unique ID (e.g., "scene_level_01")
  string asset_path = 2;             // Relative path (e.g., "scenes/Level_01.scene.pbtxt")
  AssetType asset_type = 3;

  // Storage location
  oneof storage_location {
    string file_path = 10;           // For FILE_SYSTEM backend
    int64 db_rowid = 11;             // For SQLITE backend
    string remote_url = 12;          // For REMOTE_HTTP backend
    string s3_key = 13;              // For S3 backend
    string git_lfs_oid = 14;         // For GIT_LFS backend
  }

  // Metadata
  int64 file_size = 20;
  google.protobuf.Timestamp last_modified = 21;
  string content_hash = 22;          // SHA256 for change detection
  repeated string tags = 23;
  string thumbnail_path = 24;

  // Load priority
  AssetPriority priority = 30;
}

enum AssetType {
  ASSET_TYPE_UNSPECIFIED = 0;
  SCENE = 1;
  PREFAB = 2;
  MATERIAL = 3;
  SHADER_GRAPH = 4;
  MESH = 5;
  TEXTURE = 6;
  AUDIO = 7;
  ANIMATION = 8;
  PARTICLE_SYSTEM = 9;
  UI_LAYOUT = 10;
  SCRIPT = 11;
}

enum AssetPriority {
  PRIORITY_LOWEST = 0;
  PRIORITY_LOW = 1;
  PRIORITY_NORMAL = 2;
  PRIORITY_HIGH = 3;
  PRIORITY_CRITICAL = 4;
}

message AssetDependency {
  string asset_id = 1;
  repeated string depends_on = 2;    // List of asset_ids this depends on
  DependencyType type = 3;
}

enum DependencyType {
  HARD = 0;                          // Must be loaded
  SOFT = 1;                          // Optional
  WEAK = 2;                          // Only for reference
}

message AssetIndex {
  map<string, string> by_id = 1;    // asset_id -> asset_path
  map<string, string> by_path = 2;  // asset_path -> asset_id
  map<string, AssetTypeIndex> by_type = 3;  // type -> list of asset_ids
}

message AssetTypeIndex {
  repeated string asset_ids = 1;
}

// ============================================================================
// SCENE MANIFEST (Entry point for loading a scene)
// ============================================================================

message SceneManifest {
  string scene_id = 1;
  string name = 2;
  string scene_file = 3;             // e.g., "scenes/Level_01.scene.pbtxt"

  // Explicitly listed dependencies (for preloading)
  repeated string required_scenes = 10;    // Embedded sub-scenes
  repeated string required_prefabs = 11;   // Prefabs used in scene
  repeated string required_materials = 12;
  repeated string required_meshes = 13;
  repeated string required_textures = 14;
  repeated string required_shaders = 15;

  // Tags for filtering
  repeated string tags = 20;         // e.g., ["main-menu", "level", "test-scene"]

  // Load mode
  LoadMode load_mode = 30;

  // Thumbnail for editor
  string thumbnail_path = 40;        // e.g., "thumbnails/Level_01.png"

  // Scene metadata
  SceneMetadata metadata = 50;
}

message SceneMetadata {
  string description = 1;
  string author = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp modified_at = 4;
  int32 entity_count = 5;
  int32 triangle_count = 6;
  int32 draw_call_estimate = 7;
}

enum LoadMode {
  LAZY = 0;                          // Load dependencies on-demand
  EAGER = 1;                         // Preload all dependencies
  STREAMING = 2;                     // Stream in during rendering (for large scenes)
  PROGRESSIVE = 3;                   // Load in multiple passes (LOD-based)
}

// ============================================================================
// PREFAB MANIFEST (Reusable visual entity templates)
// ============================================================================

message PrefabManifest {
  string prefab_id = 1;
  string name = 2;
  string prefab_file = 3;            // e.g., "prefabs/characters/Player.prefab.pbtxt"

  // Dependencies (visual assets only)
  repeated string required_materials = 10;
  repeated string required_meshes = 11;
  repeated string required_textures = 12;
  repeated string required_animations = 13;

  // Prefab metadata
  repeated string tags = 20;         // e.g., ["character", "npc", "prop"]
  string thumbnail = 21;             // e.g., "thumbnails/Player.png"
  string category = 22;              // e.g., "characters", "props", "ui"

  // Prefab properties
  PrefabProperties properties = 30;
}

message PrefabProperties {
  bool is_physics_enabled = 1;
  common.CryoAABB bounding_box = 2;
  int32 lod_count = 3;
  float estimated_memory_mb = 4;
}

// ============================================================================
// MATERIAL MANIFEST
// ============================================================================

message MaterialManifest {
  string material_id = 1;
  string name = 2;
  string material_file = 3;          // e.g., "materials/grass_and_dirt.material.pbtxt"

  // Dependencies
  repeated string required_shader_graphs = 10;
  repeated string required_textures = 11;

  // Metadata
  repeated string tags = 20;
  string thumbnail = 21;
  string category = 22;              // e.g., "terrain", "character", "ui"

  // Material properties
  MaterialProperties properties = 30;
}

message MaterialProperties {
  bool is_transparent = 1;
  bool casts_shadows = 2;
  bool receives_shadows = 3;
  string render_queue = 4;          // "opaque", "transparent", "overlay"
}

// ============================================================================
// SHADER GRAPH MANIFEST
// ============================================================================

message ShaderGraphManifest {
  string shader_graph_id = 1;
  string name = 2;
  string shader_graph_file = 3;     // e.g., "shaders/terrain_blend.shadergraph.pbtxt"

  // Dependencies
  repeated string required_includes = 10;  // Other shader graph includes

  // Metadata
  repeated string tags = 20;
  string category = 21;              // e.g., "terrain", "water", "character"
  string thumbnail = 22;
  string description = 23;

  // Shader properties
  ShaderGraphProperties properties = 30;
}

message ShaderGraphProperties {
  repeated string supported_platforms = 1;  // "vulkan", "d3d12", "metal", etc.
  repeated string shader_keywords = 2;      // "USE_NORMAL_MAP", "ENABLE_SHADOWS"
  int32 estimated_instruction_count = 3;
  string complexity = 4;                    // "low", "medium", "high"
}

// ============================================================================
// PROJECT QUERIES
// ============================================================================

message FindAssetsRequest {
  oneof query {
    FindByType by_type = 1;
    FindByTags by_tags = 2;
    FindByPath by_path = 3;
    FindByDependency by_dependency = 4;
  }

  int32 limit = 10;
  int32 offset = 11;
}

message FindByType {
  AssetType asset_type = 1;
}

message FindByTags {
  repeated string tags = 1;
  TagMatchMode mode = 2;

  enum TagMatchMode {
    ANY = 0;                         // Match any tag
    ALL = 1;                         // Match all tags
    EXACT = 2;                       // Exact tag set
  }
}

message FindByPath {
  string path_pattern = 1;           // Glob pattern
}

message FindByDependency {
  string asset_id = 1;
  bool transitive = 2;               // Include transitive dependencies
}

message FindAssetsResponse {
  repeated AssetEntry assets = 1;
  int32 total_count = 2;
  bool has_more = 3;
}

// ============================================================================
// PROJECT VALIDATION
// ============================================================================

message ValidateProjectRequest {
  string project_id = 1;
  ValidationOptions options = 2;
}

message ValidationOptions {
  bool check_dependencies = 1;
  bool check_file_existence = 2;
  bool check_content_hash = 3;
  bool check_circular_deps = 4;
}

message ValidateProjectResponse {
  bool is_valid = 1;
  repeated ValidationError errors = 2;
  repeated ValidationWarning warnings = 3;
}

message ValidationError {
  string asset_id = 1;
  string error_type = 2;
  string description = 3;
}

message ValidationWarning {
  string asset_id = 1;
  string warning_type = 2;
  string description = 3;
}
