// cryo_asset_gltf_commands.proto - Runtime glTF model manipulation commands
// Semantic verbs for modifying glTF models at runtime (compatible with tinygltf and cryo_asset_gltf.proto)
syntax = "proto3";

package cryo.asset;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "asset_management/cryo_asset_gltf.proto";

// ============================================================================
// GLTF COMMAND DISPATCHER
// ============================================================================

// Main command message for all glTF operations
// Compatible with cryo_asset_gltf.proto definitions
message GltfCommand {
  string asset_id = 1;  // Target GLTF asset identifier
  int64 timestamp_ms = 2;

  oneof command {
    // NODE OPERATIONS
    UpdateNodeTransformCommand update_node_transform = 10;
    AddNodeCommand add_node = 11;
    RemoveNodeCommand remove_node = 12;
    UpdateNodeHierarchyCommand update_node_hierarchy = 13;

    // MESH OPERATIONS
    ReplaceMeshCommand replace_mesh = 20;
    UpdateMeshPrimitiveCommand update_mesh_primitive = 21;

    // MATERIAL OPERATIONS
    UpdateMaterialCommand update_material = 30;
    ApplyMaterialToNodeCommand apply_material_to_node = 31;

    // TEXTURE OPERATIONS
    AddTextureCommand add_texture = 40;
    UpdateTextureCommand update_texture = 41;
    RemoveTextureCommand remove_texture = 42;

    // ANIMATION OPERATIONS
    AddAnimationCommand add_animation = 50;
    RemoveAnimationCommand remove_animation = 51;
    PlayAnimationCommand play_animation = 52;
    StopAnimationCommand stop_animation = 53;
    SetAnimationTimeCommand set_animation_time = 54;

    // SKIN/SKELETON OPERATIONS
    UpdateSkinCommand update_skin = 60;

    // CAMERA OPERATIONS
    UpdateCameraCommand update_camera = 70;

    // ACCESSOR/BUFFER OPERATIONS
    SetAccessorDataCommand set_accessor_data = 80;

    // SCENE OPERATIONS
    SetActiveSceneCommand set_active_scene = 90;
  }

  // Execution metadata
  bool executed = 3;
  int64 execution_time_ms = 4;
  string error_message = 5;
}

// ============================================================================
// NODE OPERATIONS
// ============================================================================

message UpdateNodeTransformCommand {
  int32 node_index = 1;
  string node_name = 2;  // Alternative: find by name

  // Transform components (only set what you want to change)
  oneof transform_update {
    cryo.common.CryoTransform trs = 10;  // Translation, Rotation, Scale
    cryo.common.CryoMat4 matrix = 11;    // Full matrix
  }

  // Flags to indicate which TRS components are being updated
  bool update_translation = 20;
  bool update_rotation = 21;
  bool update_scale = 22;

  bool animated = 30;
  float duration = 31;
}

message AddNodeCommand {
  string node_name = 1;
  int32 parent_node_index = 2;  // -1 = root node

  // Initial transform
  cryo.common.CryoVec3 translation = 10;
  cryo.common.CryoVec4 rotation = 11;  // Quaternion
  cryo.common.CryoVec3 scale = 12;

  // Optional: Attach to node
  optional int32 mesh_index = 20;
  optional int32 camera_index = 21;
  optional int32 skin_index = 22;
  repeated float weights = 23;  // Morph target weights
}

message RemoveNodeCommand {
  int32 node_index = 1;
  string node_name = 2;

  bool remove_children = 10;  // Also remove all child nodes
}

message UpdateNodeHierarchyCommand {
  int32 node_index = 1;
  int32 new_parent_index = 2;  // -1 = move to root
  int32 child_position = 3;    // Position in parent's children array
}

// ============================================================================
// MESH OPERATIONS
// ============================================================================

message ReplaceMeshCommand {
  int32 node_index = 1;
  int32 mesh_index = 2;  // New mesh to assign to node
}

message UpdateMeshPrimitiveCommand {
  int32 mesh_index = 1;
  int32 primitive_index = 2;

  // What to update
  oneof update {
    int32 material_index = 10;
    bytes vertex_data = 11;  // New vertex buffer data
    bytes index_data = 12;   // New index buffer data
  }
}

// ============================================================================
// MATERIAL OPERATIONS
// ============================================================================

message UpdateMaterialCommand {
  int32 material_index = 1;
  string material_name = 2;

  // PBR properties
  PbrMetallicRoughnessUpdate pbr = 10;

  // Texture updates
  optional int32 normal_texture_index = 20;
  optional float normal_scale = 21;

  optional int32 occlusion_texture_index = 22;
  optional float occlusion_strength = 23;

  optional int32 emissive_texture_index = 24;
  cryo.common.CryoVec3 emissive_factor = 25;

  // Alpha mode
  optional gltf.AlphaMode alpha_mode = 30;
  optional float alpha_cutoff = 31;
  optional bool double_sided = 32;
}

message PbrMetallicRoughnessUpdate {
  cryo.common.CryoVec4 base_color_factor = 1;
  optional int32 base_color_texture_index = 2;

  optional float metallic_factor = 10;
  optional float roughness_factor = 11;
  optional int32 metallic_roughness_texture_index = 12;
}

message ApplyMaterialToNodeCommand {
  int32 node_index = 1;
  int32 material_index = 2;
  int32 primitive_index = 3;  // -1 = all primitives
}

// ============================================================================
// TEXTURE OPERATIONS
// ============================================================================

message AddTextureCommand {
  string texture_name = 1;

  // Image source
  oneof image_source {
    bytes image_data = 10;  // Embedded image data
    string image_uri = 11;  // External image URI
  }

  string mime_type = 12;  // "image/png", "image/jpeg", etc.

  // Sampler settings
  GltfSamplerSettings sampler = 20;
}

message UpdateTextureCommand {
  int32 texture_index = 1;

  // New image data
  oneof image_source {
    bytes image_data = 10;
    string image_uri = 11;
  }

  string mime_type = 12;

  // Update sampler
  GltfSamplerSettings sampler = 20;
}

message RemoveTextureCommand {
  int32 texture_index = 1;
}

message GltfSamplerSettings {
  GltfWrapMode wrap_s = 1;
  GltfWrapMode wrap_t = 2;
  GltfFilterMode min_filter = 3;
  GltfFilterMode mag_filter = 4;
}

enum GltfWrapMode {
  WRAP_REPEAT = 10497;
  WRAP_CLAMP_TO_EDGE = 33071;
  WRAP_MIRRORED_REPEAT = 33648;
}

enum GltfFilterMode {
  FILTER_NEAREST = 9728;
  FILTER_LINEAR = 9729;
  FILTER_NEAREST_MIPMAP_NEAREST = 9984;
  FILTER_LINEAR_MIPMAP_NEAREST = 9985;
  FILTER_NEAREST_MIPMAP_LINEAR = 9986;
  FILTER_LINEAR_MIPMAP_LINEAR = 9987;
}

// ============================================================================
// ANIMATION OPERATIONS
// ============================================================================

message AddAnimationCommand {
  string animation_name = 1;
  repeated GltfAnimationChannelData channels = 2;
  repeated GltfAnimationSamplerData samplers = 3;
}

message GltfAnimationChannelData {
  int32 sampler_index = 1;
  int32 target_node_index = 2;
  gltf.GltfTarget.AnimationPath target_path = 3;
}

message GltfAnimationSamplerData {
  repeated float input_times = 1;   // Keyframe times
  repeated float output_values = 2; // Keyframe values
  AnimationInterpolation interpolation = 3;
}

enum AnimationInterpolation {
  INTERPOLATION_LINEAR = 0;
  INTERPOLATION_STEP = 1;
  INTERPOLATION_CUBICSPLINE = 2;
}

message RemoveAnimationCommand {
  int32 animation_index = 1;
  string animation_name = 2;
}

message PlayAnimationCommand {
  int32 animation_index = 1;
  string animation_name = 2;

  float speed = 10;          // Playback speed multiplier
  bool loop = 11;            // Loop animation
  float blend_weight = 12;   // Blend with other animations (0-1)
  float start_time = 13;     // Start at specific time
}

message StopAnimationCommand {
  int32 animation_index = 1;
  string animation_name = 2;

  float fade_out_duration = 10;  // Seconds to fade out
}

message SetAnimationTimeCommand {
  int32 animation_index = 1;
  float time = 2;  // Time in seconds
}

// ============================================================================
// SKIN/SKELETON OPERATIONS
// ============================================================================

message UpdateSkinCommand {
  int32 skin_index = 1;

  repeated int32 joint_indices = 10;
  optional int32 skeleton_root_index = 11;

  // Inverse bind matrices (as flat array of mat4)
  repeated float inverse_bind_matrices = 20;
}

// ============================================================================
// CAMERA OPERATIONS
// ============================================================================

message UpdateCameraCommand {
  int32 camera_index = 1;
  string camera_name = 2;

  oneof camera_projection {
    PerspectiveCameraUpdate perspective = 10;
    OrthographicCameraUpdate orthographic = 11;
  }
}

message PerspectiveCameraUpdate {
  optional float aspect_ratio = 1;
  optional float yfov = 2;          // Vertical FOV in radians
  optional float znear = 3;
  optional float zfar = 4;
}

message OrthographicCameraUpdate {
  float xmag = 1;
  float ymag = 2;
  float znear = 3;
  float zfar = 4;
}

// ============================================================================
// ACCESSOR/BUFFER OPERATIONS
// ============================================================================

message SetAccessorDataCommand {
  int32 accessor_index = 1;

  bytes data = 10;  // Raw binary data

  // Accessor properties (if creating new accessor)
  optional gltf.GltfComponentType component_type = 20;
  optional int32 count = 21;
  optional bool normalized = 22;

  // Min/max bounds (optional)
  repeated float min = 30;
  repeated float max = 31;
}

// ============================================================================
// SCENE OPERATIONS
// ============================================================================

message SetActiveSceneCommand {
  int32 scene_index = 1;
}

// ============================================================================
// BATCH OPERATIONS
// ============================================================================

message BatchGltfCommands {
  string asset_id = 1;
  repeated GltfCommand commands = 2;

  enum ExecutionMode {
    SEQUENTIAL = 0;
    PARALLEL = 1;
  }
  ExecutionMode mode = 3;

  bool atomic = 4;  // All succeed or all fail
  bool stop_on_error = 5;
}

// ============================================================================
// QUERY OPERATIONS
// ============================================================================

message GetNodeStateQuery {
  string asset_id = 1;
  int32 node_index = 2;
  string node_name = 3;
}

message NodeStateResponse {
  int32 node_index = 1;
  string node_name = 2;

  cryo.common.CryoVec3 translation = 10;
  cryo.common.CryoVec4 rotation = 11;
  cryo.common.CryoVec3 scale = 12;
  cryo.common.CryoMat4 world_matrix = 13;

  optional int32 mesh_index = 20;
  optional int32 camera_index = 21;
  optional int32 skin_index = 22;

  repeated int32 child_indices = 30;
}

message GetAssetInfoQuery {
  string asset_id = 1;
}

message AssetInfoResponse {
  string asset_id = 1;

  int32 scene_count = 10;
  int32 node_count = 11;
  int32 mesh_count = 12;
  int32 material_count = 13;
  int32 texture_count = 14;
  int32 animation_count = 15;
  int32 skin_count = 16;
  int32 camera_count = 17;

  repeated string scene_names = 20;
  repeated string node_names = 21;
  repeated string animation_names = 22;
  repeated string material_names = 23;
}

// ============================================================================
// COMMAND RESPONSES
// ============================================================================

message GltfCommandResponse {
  bool success = 1;
  string asset_id = 2;
  string error_message = 3;

  oneof result {
    int32 new_index = 10;        // For add operations
    bytes result_data = 11;      // For query operations
    NodeStateResponse node_state = 12;
    AssetInfoResponse asset_info = 13;
  }

  int64 execution_time_ms = 20;
  map<string, string> debug_info = 21;
}

message BatchGltfCommandsResponse {
  bool success = 1;
  repeated GltfCommandResponse responses = 2;
  string error_message = 3;
  int32 successful_count = 4;
  int32 failed_count = 5;
}