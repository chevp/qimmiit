// cryo_asset_texture.proto - Texture asset definitions
// Defines messages for texture loading, management, and manipulation
syntax = "proto3";

package cryo.asset.texture;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";

// ==============================================================================
// TEXTURE ASSET
// ==============================================================================

message TextureAsset {
  string asset_id = 1;
  string uri = 2;                               // Asset URI
  TextureFormat format = 3;
  bytes data = 4;                               // Texture data (if embedded)

  // Dimensions
  int32 width = 10;
  int32 height = 11;
  int32 depth = 12;                             // For 3D textures
  int32 array_layers = 13;                      // For texture arrays
  int32 mip_levels = 14;

  // Texture type
  TextureType type = 20;

  // Sampling parameters
  SamplerSettings sampler = 30;

  // Compression
  CompressionFormat compression = 40;

  // Color space
  ColorSpace color_space = 50;

  // Metadata
  common.CryoMetadata metadata = 60;
}

enum TextureType {
  TEXTURE_2D = 0;
  TEXTURE_3D = 1;
  TEXTURE_CUBE = 2;
  TEXTURE_2D_ARRAY = 3;
  TEXTURE_CUBE_ARRAY = 4;
}

enum TextureFormat {
  FORMAT_UNKNOWN = 0;
  FORMAT_R8 = 1;
  FORMAT_RG8 = 2;
  FORMAT_RGB8 = 3;
  FORMAT_RGBA8 = 4;
  FORMAT_R16 = 5;
  FORMAT_RG16 = 6;
  FORMAT_RGB16 = 7;
  FORMAT_RGBA16 = 8;
  FORMAT_R16F = 9;
  FORMAT_RG16F = 10;
  FORMAT_RGB16F = 11;
  FORMAT_RGBA16F = 12;
  FORMAT_R32F = 13;
  FORMAT_RG32F = 14;
  FORMAT_RGB32F = 15;
  FORMAT_RGBA32F = 16;
  FORMAT_DEPTH16 = 20;
  FORMAT_DEPTH24 = 21;
  FORMAT_DEPTH32 = 22;
  FORMAT_DEPTH24_STENCIL8 = 23;
  FORMAT_DEPTH32F_STENCIL8 = 24;
}

enum CompressionFormat {
  COMPRESSION_NONE = 0;
  COMPRESSION_DXT1 = 1;                         // BC1
  COMPRESSION_DXT3 = 2;                         // BC2
  COMPRESSION_DXT5 = 3;                         // BC3
  COMPRESSION_BC4 = 4;
  COMPRESSION_BC5 = 5;
  COMPRESSION_BC6H = 6;
  COMPRESSION_BC7 = 7;
  COMPRESSION_ETC2_RGB = 10;
  COMPRESSION_ETC2_RGBA = 11;
  COMPRESSION_ASTC = 12;
  COMPRESSION_PVRTC = 13;
}

enum ColorSpace {
  COLOR_SPACE_LINEAR = 0;
  COLOR_SPACE_SRGB = 1;
}

// ==============================================================================
// SAMPLER SETTINGS
// ==============================================================================

message SamplerSettings {
  FilterMode min_filter = 1;
  FilterMode mag_filter = 2;
  WrapMode wrap_u = 3;
  WrapMode wrap_v = 4;
  WrapMode wrap_w = 5;
  float max_anisotropy = 6;                     // 1.0 to 16.0
  CompareFunction compare_function = 7;         // For shadow maps
  float mip_lod_bias = 8;
  float min_lod = 9;
  float max_lod = 10;
  common.CryoColor border_color = 11;

  enum FilterMode {
    FILTER_NEAREST = 0;
    FILTER_LINEAR = 1;
    FILTER_NEAREST_MIPMAP_NEAREST = 2;
    FILTER_LINEAR_MIPMAP_NEAREST = 3;
    FILTER_NEAREST_MIPMAP_LINEAR = 4;
    FILTER_LINEAR_MIPMAP_LINEAR = 5;
  }

  enum WrapMode {
    WRAP_REPEAT = 0;
    WRAP_CLAMP_TO_EDGE = 1;
    WRAP_CLAMP_TO_BORDER = 2;
    WRAP_MIRRORED_REPEAT = 3;
    WRAP_MIRROR_CLAMP_TO_EDGE = 4;
  }

  enum CompareFunction {
    COMPARE_NEVER = 0;
    COMPARE_LESS = 1;
    COMPARE_EQUAL = 2;
    COMPARE_LESS_OR_EQUAL = 3;
    COMPARE_GREATER = 4;
    COMPARE_NOT_EQUAL = 5;
    COMPARE_GREATER_OR_EQUAL = 6;
    COMPARE_ALWAYS = 7;
  }
}

// ==============================================================================
// TEXTURE LOADING
// ==============================================================================

message LoadTextureCommand {
  string uri = 1;
  TextureLoadOptions options = 2;
}

message TextureLoadOptions {
  bool generate_mipmaps = 1;
  bool flip_y = 2;
  bool premultiply_alpha = 3;
  TextureFormat desired_format = 4;             // Convert to this format
  CompressionFormat compression = 5;
  ColorSpace color_space = 6;
  SamplerSettings sampler = 7;
  int32 max_texture_size = 8;                   // Downscale if larger
}

message LoadTextureResponse {
  bool success = 1;
  TextureAsset texture = 2;
  string error_message = 3;
}

// ==============================================================================
// TEXTURE CREATION
// ==============================================================================

message CreateTextureCommand {
  string name = 1;
  int32 width = 2;
  int32 height = 3;
  TextureFormat format = 4;
  TextureType type = 5;
  bytes initial_data = 6;                       // Optional initial data
  int32 mip_levels = 7;
  SamplerSettings sampler = 8;
}

message CreateTextureResponse {
  bool success = 1;
  string texture_id = 2;
  string error_message = 3;
}

// ==============================================================================
// TEXTURE UPDATE
// ==============================================================================

message UpdateTextureCommand {
  string texture_id = 1;
  TextureRegion region = 2;
  bytes data = 3;
  int32 mip_level = 4;
}

message TextureRegion {
  int32 x = 1;
  int32 y = 2;
  int32 z = 3;
  int32 width = 4;
  int32 height = 5;
  int32 depth = 6;
}

message UpdateTextureResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// RENDER TEXTURE
// ==============================================================================

message RenderTextureDescriptor {
  string name = 1;
  int32 width = 2;
  int32 height = 3;
  TextureFormat color_format = 4;
  TextureFormat depth_format = 5;
  int32 multisample_count = 6;                  // 1, 2, 4, 8, etc.
  bool enable_mipmap = 7;
  bool auto_generate_mips = 8;
  RenderTextureUsage usage = 9;

  enum RenderTextureUsage {
    USAGE_RENDER_TARGET = 0;
    USAGE_DEPTH_STENCIL = 1;
    USAGE_SHADOW_MAP = 2;
    USAGE_CUBEMAP = 3;
  }
}

message CreateRenderTextureCommand {
  RenderTextureDescriptor descriptor = 1;
}

message CreateRenderTextureResponse {
  bool success = 1;
  string texture_id = 2;
  string error_message = 3;
}

// ==============================================================================
// TEXTURE MANIPULATION
// ==============================================================================

message GenerateMipmapsCommand {
  string texture_id = 1;
  MipmapFilter filter = 2;

  enum MipmapFilter {
    MIPMAP_FILTER_BOX = 0;
    MIPMAP_FILTER_TRIANGLE = 1;
    MIPMAP_FILTER_LANCZOS = 2;
  }
}

message GenerateMipmapsResponse {
  bool success = 1;
  int32 mip_levels = 2;
  string error_message = 3;
}

message ResizeTextureCommand {
  string texture_id = 1;
  int32 new_width = 2;
  int32 new_height = 3;
  ResizeFilter filter = 4;

  enum ResizeFilter {
    RESIZE_NEAREST = 0;
    RESIZE_LINEAR = 1;
    RESIZE_CUBIC = 2;
    RESIZE_LANCZOS = 3;
  }
}

message ResizeTextureResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// TEXTURE QUERIES
// ==============================================================================

message GetTextureInfoCommand {
  string texture_id = 1;
}

message GetTextureInfoResponse {
  bool success = 1;
  TextureAsset texture = 2;
  string error_message = 3;
}

message ReadTexturePixelsCommand {
  string texture_id = 1;
  TextureRegion region = 2;
  int32 mip_level = 3;
}

message ReadTexturePixelsResponse {
  bool success = 1;
  bytes pixel_data = 2;
  TextureFormat format = 3;
  string error_message = 4;
}

// ==============================================================================
// TEXTURE ATLASING
// ==============================================================================

message TextureAtlas {
  string atlas_id = 1;
  string texture_id = 2;
  int32 width = 3;
  int32 height = 4;
  repeated AtlasSprite sprites = 5;
}

message AtlasSprite {
  string name = 1;
  TextureRegion region = 2;
  common.CryoVec2 pivot = 3;                    // Normalized (0-1)
  float pixels_per_unit = 4;
}

message CreateTextureAtlasCommand {
  string name = 1;
  repeated string texture_uris = 2;
  AtlasOptions options = 3;
}

message AtlasOptions {
  int32 max_width = 1;
  int32 max_height = 2;
  int32 padding = 3;                            // Pixels between sprites
  bool allow_rotation = 4;
  bool power_of_two = 5;
}

message CreateTextureAtlasResponse {
  bool success = 1;
  TextureAtlas atlas = 2;
  string error_message = 3;
}
