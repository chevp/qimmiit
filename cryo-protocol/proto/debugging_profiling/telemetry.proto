// telemetry.proto - Telemetry and monitoring data collection
// Defines messages for performance monitoring, metrics, and analytics
syntax = "proto3";

package cryo.telemetry;

// ==============================================================================
// Copyright (c) 2025 Patrice Chevillat
// All Rights Reserved
// ==============================================================================

import "cryo_common.proto";
import "google/protobuf/timestamp.proto";

// ==============================================================================
// PERFORMANCE METRICS
// ==============================================================================

message PerformanceMetrics {
  google.protobuf.Timestamp timestamp = 1;
  int32 frame_number = 2;

  // Frame timing
  float frame_time_ms = 10;
  float fps = 11;
  float min_fps = 12;
  float max_fps = 13;
  float average_fps = 14;

  // CPU metrics
  CPUMetrics cpu = 20;

  // GPU metrics
  GPUMetrics gpu = 30;

  // Memory metrics
  MemoryMetrics memory = 40;

  // Rendering metrics
  RenderingMetrics rendering = 50;

  // Physics metrics
  PhysicsMetrics physics = 60;

  // Network metrics
  NetworkMetrics network = 70;
}

message CPUMetrics {
  float usage_percent = 1;                      // Overall CPU usage
  float frame_time_ms = 2;                      // CPU frame time
  repeated ThreadMetrics threads = 3;
}

message ThreadMetrics {
  string thread_name = 1;
  string thread_id = 2;
  float cpu_time_ms = 3;
  float usage_percent = 4;
}

message GPUMetrics {
  float usage_percent = 1;
  float frame_time_ms = 2;
  uint64 memory_used_bytes = 3;
  uint64 memory_total_bytes = 4;
  float temperature_celsius = 5;
}

message MemoryMetrics {
  uint64 total_allocated_bytes = 1;
  uint64 used_bytes = 2;
  uint64 free_bytes = 3;
  uint64 peak_bytes = 4;
  repeated MemoryPoolMetrics pools = 5;
}

message MemoryPoolMetrics {
  string pool_name = 1;
  uint64 allocated_bytes = 2;
  uint64 used_bytes = 3;
  int32 allocation_count = 4;
}

message RenderingMetrics {
  int32 draw_calls = 1;
  int32 triangles = 2;
  int32 vertices = 3;
  int32 batched_calls = 4;
  int32 texture_switches = 5;
  int32 shader_switches = 6;
  int32 visible_entities = 7;
  int32 culled_entities = 8;
  float render_time_ms = 9;
}

message PhysicsMetrics {
  float simulation_time_ms = 1;
  int32 active_bodies = 2;
  int32 sleeping_bodies = 3;
  int32 collision_pairs = 4;
  int32 trigger_pairs = 5;
  float collision_detection_time_ms = 6;
  float constraint_solving_time_ms = 7;
}

message NetworkMetrics {
  uint64 bytes_sent = 1;
  uint64 bytes_received = 2;
  uint64 packets_sent = 3;
  uint64 packets_received = 4;
  float latency_ms = 5;
  int32 active_connections = 6;
  float bandwidth_usage_mbps = 7;
}

// ==============================================================================
// SYSTEM METRICS
// ==============================================================================

message SystemMetrics {
  google.protobuf.Timestamp timestamp = 1;

  // Operating system
  string os_name = 10;
  string os_version = 11;

  // Hardware
  HardwareInfo hardware = 20;

  // Process info
  ProcessInfo process = 30;
}

message HardwareInfo {
  string cpu_model = 1;
  int32 cpu_cores = 2;
  int32 cpu_threads = 3;
  string gpu_model = 4;
  uint64 gpu_memory_bytes = 5;
  uint64 system_memory_bytes = 6;
}

message ProcessInfo {
  int32 process_id = 1;
  float uptime_seconds = 2;
  uint64 memory_usage_bytes = 3;
  float cpu_usage_percent = 4;
  int32 thread_count = 5;
}

// ==============================================================================
// EVENT TRACKING
// ==============================================================================

message TelemetryEvent {
  string event_name = 1;
  google.protobuf.Timestamp timestamp = 2;
  EventCategory category = 3;
  map<string, string> properties = 4;
  float duration_ms = 5;                        // For timed events

  enum EventCategory {
    CATEGORY_UNKNOWN = 0;
    CATEGORY_GAMEPLAY = 1;
    CATEGORY_UI = 2;
    CATEGORY_RENDERING = 3;
    CATEGORY_PHYSICS = 4;
    CATEGORY_AUDIO = 5;
    CATEGORY_NETWORKING = 6;
    CATEGORY_LOADING = 7;
    CATEGORY_ERROR = 8;
  }
}

message TrackEventCommand {
  TelemetryEvent event = 1;
}

message TrackEventResponse {
  bool success = 1;
  string error_message = 2;
}

// ==============================================================================
// METRIC COLLECTION
// ==============================================================================

message StartMetricsCollectionCommand {
  float sample_interval_seconds = 1;            // How often to sample metrics
  repeated MetricType metrics = 2;              // Which metrics to collect
}

enum MetricType {
  METRIC_TYPE_ALL = 0;
  METRIC_TYPE_PERFORMANCE = 1;
  METRIC_TYPE_CPU = 2;
  METRIC_TYPE_GPU = 3;
  METRIC_TYPE_MEMORY = 4;
  METRIC_TYPE_RENDERING = 5;
  METRIC_TYPE_PHYSICS = 6;
  METRIC_TYPE_NETWORK = 7;
}

message StartMetricsCollectionResponse {
  bool success = 1;
  string collection_id = 2;
  string error_message = 3;
}

message StopMetricsCollectionCommand {
  string collection_id = 1;
}

message StopMetricsCollectionResponse {
  bool success = 1;
  MetricsReport report = 2;
  string error_message = 3;
}

message MetricsReport {
  string collection_id = 1;
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;
  float duration_seconds = 4;
  int32 sample_count = 5;
  repeated PerformanceMetrics samples = 6;
  MetricsSummary summary = 7;
}

message MetricsSummary {
  float average_fps = 1;
  float min_fps = 2;
  float max_fps = 3;
  float average_frame_time_ms = 4;
  float average_cpu_usage_percent = 5;
  float average_gpu_usage_percent = 6;
  uint64 peak_memory_bytes = 7;
  int32 average_draw_calls = 8;
}

// ==============================================================================
// HEALTH MONITORING
// ==============================================================================

message HealthCheckCommand {}

message HealthCheckResponse {
  bool healthy = 1;
  HealthStatus status = 2;
  repeated HealthIssue issues = 3;
  SystemMetrics current_metrics = 4;
}

enum HealthStatus {
  HEALTH_STATUS_HEALTHY = 0;
  HEALTH_STATUS_DEGRADED = 1;
  HEALTH_STATUS_UNHEALTHY = 2;
  HEALTH_STATUS_CRITICAL = 3;
}

message HealthIssue {
  IssueSeverity severity = 1;
  string category = 2;
  string description = 3;
  string recommendation = 4;

  enum IssueSeverity {
    INFO = 0;
    WARNING = 1;
    ERROR = 2;
    CRITICAL = 3;
  }
}

// ==============================================================================
// ANALYTICS
// ==============================================================================

message SessionInfo {
  string session_id = 1;
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;
  float duration_seconds = 4;
  string application_version = 5;
  string platform = 6;
  map<string, string> custom_properties = 7;
}

message StartSessionCommand {
  string session_id = 1;                        // Optional, generated if empty
  map<string, string> properties = 2;
}

message StartSessionResponse {
  bool success = 1;
  string session_id = 2;
  string error_message = 3;
}

message EndSessionCommand {
  string session_id = 1;
}

message EndSessionResponse {
  bool success = 1;
  SessionInfo session = 2;
  string error_message = 3;
}

// ==============================================================================
// CRASH REPORTING
// ==============================================================================

message CrashReport {
  google.protobuf.Timestamp timestamp = 1;
  string crash_reason = 2;
  string exception_type = 3;
  string exception_message = 4;
  repeated StackFrame stack_trace = 5;
  SystemMetrics system_state = 6;
  PerformanceMetrics performance_state = 7;
  map<string, string> custom_data = 8;
}

message StackFrame {
  string function_name = 1;
  string file_path = 2;
  int32 line_number = 3;
  string module_name = 4;
}

message SubmitCrashReportCommand {
  CrashReport report = 1;
}

message SubmitCrashReportResponse {
  bool success = 1;
  string report_id = 2;
  string error_message = 3;
}

// ==============================================================================
// CUSTOM METRICS
// ==============================================================================

message CustomMetric {
  string name = 1;
  google.protobuf.Timestamp timestamp = 2;
  oneof value {
    float numeric_value = 10;
    string string_value = 11;
    bool boolean_value = 12;
  }
  map<string, string> tags = 20;
}

message RecordCustomMetricCommand {
  CustomMetric metric = 1;
}

message RecordCustomMetricResponse {
  bool success = 1;
  string error_message = 2;
}
